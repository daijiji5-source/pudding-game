<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プリン統合版 - 3Dアクション</title>
  <!-- 8bit風の日本語フォントを読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background-color: #cfe8ff;
      overflow: hidden;
      color: #1d2b3f;
      font-family: 'DotGothic16', sans-serif;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }

    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      text-align: center;
      z-index: 10;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      padding: 44px 50px;
      border: 2px solid #d6e3ff;
      box-shadow: 0 20px 50px rgba(90, 130, 200, 0.25);
      pointer-events: auto;
      backdrop-filter: blur(8px);
      transition: all 0.4s;
    }

    h1 {
      font-size: 3rem;
      color: #2a3f6d;
      text-shadow: 0 6px 16px rgba(70, 120, 200, 0.3);
      margin: 0 0 18px 0;
      letter-spacing: 3px;
    }

    p {
      font-size: 1.05rem;
      margin-bottom: 26px;
      color: #3c4a68;
      line-height: 1.7;
      text-shadow: none;
    }

    button {
      font-family: 'DotGothic16', sans-serif;
      font-size: 1.2rem;
      padding: 12px 34px;
      background: #ffe27a;
      color: #2a3f6d;
      border: 2px solid #f3c74e;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
      box-shadow: 0 8px 18px rgba(255, 210, 100, 0.4);
    }

    button:hover {
      background: #ffd24d;
      color: #1e2c4b;
      box-shadow: 0 12px 24px rgba(255, 210, 100, 0.5);
      border-color: #f2b937;
      transform: translateY(-2px);
    }

    .hidden {
      display: none !important;
      opacity: 0;
      pointer-events: none;
    }

    #bloodScreen,
    #vignette {
      display: none;
    }

    /* 画面グリッチエフェクト */
    .glitch {
      animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
    }

    @keyframes glitch-skew {
      0% {
        transform: skew(0deg);
      }

      20% {
        transform: skew(-20deg);
        filter: hue-rotate(90deg);
      }

      40% {
        transform: skew(20deg);
        filter: hue-rotate(-90deg);
      }

      60% {
        transform: skew(0deg);
        opacity: 0.8;
      }

      80% {
        transform: skew(5deg);
      }

      100% {
        transform: skew(0deg);
      }
    }
  </style>
</head>

<body>
  <div id="vignette"></div>
  <div id="bloodScreen"></div>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div id="startScreen" class="panel">
      <h1>プリン統合版</h1>
      <p>
        WASD / 方向キー：移動　Space：ジャンプ（短押しで低く）<br>
        J/Z：コマンド技　F：たたかう　Q：回避/ガード　E：ロックオン<br>
        K/L/X：コマンド回転　O：振動テスト　P：振動パターン<br>
        [ / ]：カメラ回転　, / .：カメラ上下<br>
        ゲームパッド：左スティック移動　右スティックカメラ　A/✕ジャンプ　B/○たたかう　X/□回避　Y/△コマンド　RBロックオン
      </p>
      <button id="startBtn">はじめる</button>
      <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
        <label style="cursor: pointer; font-size: 1.2rem;">
          <input type="checkbox" id="highResCheck" checked style="transform: scale(1.5); margin-right: 10px;"> 高画質モード（ドット感をなくす）
        </label>
        <label style="cursor: pointer; font-size: 1.2rem;">
          <input type="checkbox" id="bloomCheck" checked style="transform: scale(1.5); margin-right: 10px;">
          ブルーム（光の溢れ出し）
        </label>
        <label style="cursor: pointer; font-size: 1.2rem;">
          <input type="checkbox" id="perspectiveCheck" style="transform: scale(1.5); margin-right: 10px;"> 透視投影モード
        </label>
      </div>
    </div>
    <div id="gameOverScreen" class="panel hidden">
      <h1>YOU DIED</h1>
      <p>消化された......</p>
      <button id="restartBtn">もう一度ループする</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const shadowCanvas = document.createElement('canvas');
    const sCtx = shadowCanvas.getContext('2d');
    const sunShadowCanvas = document.createElement('canvas');
    const sunCtx = sunShadowCanvas.getContext('2d');
    const bloodScreen = document.getElementById('bloodScreen');

    // ==== 音響システム (Web Audio API) ====
    let audioCtx;
    let masterGain;
    let masterComp;
    const COIN_SFX_FILE = 'coin.mp3';
    const CUSTOM_SFX_FILES = {
      slash: '斬撃.mp3',
      rush: 'ラッシュ.mp3',
      spin: 'スピン.mp3',
      heal: 'ヒール.mp3',
      hit: 'ヒット.mp3',
      hurt: 'ダメージ.mp3',
      dodge: '回避.mp3',
      guard: 'ガード.mp3',
      guardStart: 'ガード発動.mp3',
      jump: 'ジャンプ.mp3',
      land: '着地.mp3',
      rotate: 'コマンド回転.mp3',
      basic: 'たたかう.mp3',
      fire: 'ファイア.mp3',
      thunder: 'サンダー.mp3',
      ice: 'ブリザド.mp3',
      aero: 'エアロ.mp3',
      lockon: 'ロックオン.mp3',
      lockoff: 'ロック解除.mp3',
      lockfail: 'ロック失敗.mp3',
      coin: COIN_SFX_FILE,
      gameover: 'ゲームオーバー効果音.mp3'
    };
    const CUSTOM_SFX_EXTS = ['.mp3', '.wav'];
    const BGM_FILE = '背景音楽.mp3';
    const GAMEOVER_BGM_FILE = 'ゲームオーバーBGM.mp3';
    const BGM_VOLUME = 0.45;
    const GAMEOVER_BGM_VOLUME = 0.5;
    const CUSTOM_SFX_VOLUME = {
      coin: 0.35
    };
    const customSfx = {};
    const customSfxState = {};
    let customSfxLoaded = false;
    let bgmAudio = null;
    let bgmState = 'idle';
    let bgmAutoStart = false;
    let bgmFade = 1;
    let bgmFadeOut = false;
    let gameOverBgmAudio = null;
    let gameOverBgmState = 'idle';
    let gameOverBgmAutoStart = false;
    let gameOverBgmStarted = false;

    function buildSfxCandidates(name) {
      const base = name.replace(/\.(mp3|wav)$/i, '');
      return CUSTOM_SFX_EXTS.map(ext => `${base}${ext}`);
    }
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0.72, audioCtx.currentTime);
        masterComp = audioCtx.createDynamicsCompressor();
        masterComp.threshold.setValueAtTime(-18, audioCtx.currentTime);
        masterComp.knee.setValueAtTime(18, audioCtx.currentTime);
        masterComp.ratio.setValueAtTime(4, audioCtx.currentTime);
        masterComp.attack.setValueAtTime(0.003, audioCtx.currentTime);
        masterComp.release.setValueAtTime(0.12, audioCtx.currentTime);
        masterGain.connect(masterComp);
        masterComp.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      initCustomSfx();
      initBgm();
      startBgm();
    }

    function initCustomSfx() {
      if (customSfxLoaded) return;
      customSfxLoaded = true;
      Object.entries(CUSTOM_SFX_FILES).forEach(([key, filename]) => {
        const audio = new Audio();
        audio.preload = 'auto';
        audio.volume = CUSTOM_SFX_VOLUME[key] ?? 1;
        const candidates = buildSfxCandidates(filename);
        let idx = 0;
        customSfxState[key] = 'loading';
        const tryNext = () => {
          if (customSfxState[key] === 'ready') return;
          if (idx >= candidates.length) {
            customSfxState[key] = 'error';
            return;
          }
          audio.src = candidates[idx++];
          audio.load();
        };
        audio.addEventListener('canplaythrough', () => {
          customSfxState[key] = 'ready';
        }, { once: true });
        audio.addEventListener('error', () => {
          if (customSfxState[key] === 'ready') return;
          tryNext();
        });
        tryNext();
        customSfx[key] = audio;
      });
    }

    function initBgm() {
      if (bgmAudio) return;
      bgmAudio = new Audio();
      bgmAudio.preload = 'auto';
      bgmAudio.loop = true;
      bgmAudio.volume = BGM_VOLUME;
      const candidates = buildSfxCandidates(BGM_FILE);
      let idx = 0;
      bgmState = 'loading';
      const tryNext = () => {
        if (bgmState === 'ready') return;
        if (idx >= candidates.length) {
          bgmState = 'error';
          return;
        }
        bgmAudio.src = candidates[idx++];
        bgmAudio.load();
      };
      bgmAudio.addEventListener('canplaythrough', () => {
        bgmState = 'ready';
        if (bgmAutoStart) startBgm();
      }, { once: true });
      bgmAudio.addEventListener('error', () => {
        if (bgmState === 'ready') return;
        tryNext();
      });
      tryNext();
    }

    function startBgm() {
      if (!bgmAudio) {
        bgmAutoStart = true;
        initBgm();
        return;
      }
      if (bgmState !== 'ready') {
        bgmAutoStart = true;
        return;
      }
      bgmAutoStart = false;
      try {
        if (bgmAudio) bgmAudio.volume = BGM_VOLUME * bgmFade;
        const p = bgmAudio.play();
        if (p && p.catch) p.catch(() => {});
      } catch (_) {}
    }

    function initGameOverBgm() {
      if (gameOverBgmAudio) return;
      gameOverBgmAudio = new Audio();
      gameOverBgmAudio.preload = 'auto';
      gameOverBgmAudio.loop = true;
      gameOverBgmAudio.volume = GAMEOVER_BGM_VOLUME;
      const candidates = buildSfxCandidates(GAMEOVER_BGM_FILE);
      let idx = 0;
      gameOverBgmState = 'loading';
      const tryNext = () => {
        if (gameOverBgmState === 'ready') return;
        if (idx >= candidates.length) {
          gameOverBgmState = 'error';
          return;
        }
        gameOverBgmAudio.src = candidates[idx++];
        gameOverBgmAudio.load();
      };
      gameOverBgmAudio.addEventListener('canplaythrough', () => {
        gameOverBgmState = 'ready';
        if (gameOverBgmAutoStart) startGameOverBgm();
      }, { once: true });
      gameOverBgmAudio.addEventListener('error', () => {
        if (gameOverBgmState === 'ready') return;
        tryNext();
      });
      tryNext();
    }

    function startGameOverBgm() {
      if (!gameOverBgmAudio) {
        gameOverBgmAutoStart = true;
        initGameOverBgm();
        return;
      }
      if (gameOverBgmState !== 'ready') {
        gameOverBgmAutoStart = true;
        return;
      }
      gameOverBgmAutoStart = false;
      gameOverBgmAudio.volume = GAMEOVER_BGM_VOLUME;
      try {
        gameOverBgmAudio.currentTime = 0;
        const p = gameOverBgmAudio.play();
        if (p && p.catch) p.catch(() => {});
      } catch (_) {}
    }

    function stopGameOverBgm() {
      if (!gameOverBgmAudio) return;
      gameOverBgmAudio.pause();
      gameOverBgmAudio.currentTime = 0;
      gameOverBgmStarted = false;
      gameOverBgmAutoStart = false;
    }

    function updateBgmFade() {
      if (!bgmAudio) return;
      if (!gameOver && gameOverBgmStarted) {
        stopGameOverBgm();
      }
      if (bgmFadeOut) {
        bgmFade = Math.max(0, bgmFade - 0.02);
        bgmAudio.volume = BGM_VOLUME * bgmFade;
        if (bgmFade === 0) {
          bgmAudio.pause();
          if (gameOver && !gameOverBgmStarted) {
            gameOverBgmStarted = true;
            startGameOverBgm();
          }
        }
      } else if (!gameOver && bgmFade < 1) {
        bgmFade = Math.min(1, bgmFade + 0.03);
        bgmAudio.volume = BGM_VOLUME * bgmFade;
      }
    }

    function triggerGameOverAudio() {
      playSfx('gameover');
      bgmFadeOut = true;
    }

    function playCustomSfx(name, options = {}) {
      const audio = customSfx[name];
      if (!audio) return false;
      if (customSfxState[name] === 'error') return false;
      if (audio.readyState < 2) return false;
      try {
        const inst = audio.cloneNode();
        inst.volume = options.volume ?? audio.volume ?? 1;
        inst.playbackRate = options.rate ?? 1;
        inst.play().catch(() => {});
        return true;
      } catch (e) {
        return false;
      }
    }

    function playTone(freq, duration, type, gain, detune = 0) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type || 'sawtooth';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      osc.detune.setValueAtTime(detune, audioCtx.currentTime);
      g.gain.setValueAtTime(gain, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(g);
      g.connect(masterGain || audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration + 0.02);
    }

    function playSweepTone(freqStart, freqEnd, duration, type, gain, detune = 0) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      const now = audioCtx.currentTime;
      const safeEnd = Math.max(40, freqEnd);
      osc.type = type || 'sawtooth';
      osc.frequency.setValueAtTime(Math.max(40, freqStart), now);
      osc.frequency.exponentialRampToValueAtTime(safeEnd, now + duration);
      osc.detune.setValueAtTime(detune, now);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(Math.max(freqStart, safeEnd) * 2.2, now);
      g.gain.setValueAtTime(gain, now);
      g.gain.exponentialRampToValueAtTime(0.0008, now + duration);
      osc.connect(filter);
      filter.connect(g);
      g.connect(masterGain || audioCtx.destination);
      osc.start();
      osc.stop(now + duration + 0.03);
    }

    function playNoise(duration, gain, filterType = 'highpass', freq = 800, freqEnd = null) {
      if (!audioCtx) return;
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.6;
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = filterType;
      const now = audioCtx.currentTime;
      filter.frequency.setValueAtTime(freq, now);
      if (freqEnd !== null) {
        filter.frequency.exponentialRampToValueAtTime(Math.max(60, freqEnd), now + duration);
      }
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(gain, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + duration);
      src.connect(filter);
      filter.connect(g);
      g.connect(masterGain || audioCtx.destination);
      src.start();
      src.stop(now + duration + 0.02);
    }

    function playSfx(name) {
      if (!audioCtx) initAudio();
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (playCustomSfx(name)) return;
      const det = (Math.random() - 0.5) * 120;
      switch (name) {
        case 'slash':
          playSweepTone(1400, 260, 0.12, 'sawtooth', 0.22, det - 200);
          playSweepTone(900, 420, 0.08, 'triangle', 0.12, det + 100);
          playNoise(0.08, 0.1, 'highpass', 3200, 1500);
          playTone(180, 0.08, 'sine', 0.08, det);
          break;
        case 'rush':
          playSweepTone(1000, 220, 0.14, 'square', 0.2, det);
          playSweepTone(520, 180, 0.12, 'sawtooth', 0.12, det - 200);
          playNoise(0.12, 0.12, 'highpass', 2400, 1200);
          playTone(140, 0.08, 'sine', 0.07, det - 40);
          break;
        case 'spin':
          playSweepTone(980, 160, 0.24, 'sawtooth', 0.22, det - 120);
          playSweepTone(620, 140, 0.18, 'square', 0.16, det - 80);
          playTone(760, 0.16, 'triangle', 0.12, det + 120);
          playNoise(0.14, 0.12, 'bandpass', 1400, 700);
          playTone(90, 0.16, 'sine', 0.08, det - 60);
          break;
        case 'fire':
          playSweepTone(1200, 300, 0.14, 'sawtooth', 0.2, det + 60);
          playSweepTone(640, 240, 0.1, 'triangle', 0.12, det - 80);
          playNoise(0.12, 0.12, 'highpass', 2600, 1400);
          playTone(220, 0.08, 'sine', 0.08, det - 60);
          break;
        case 'thunder':
          playNoise(0.18, 0.16, 'bandpass', 1200, 320);
          playSweepTone(480, 80, 0.22, 'square', 0.24, det - 120);
          playTone(70, 0.22, 'sine', 0.11, det - 160);
          break;
        case 'ice':
          playTone(1320, 0.12, 'triangle', 0.14, det + 80);
          playTone(1760, 0.1, 'sine', 0.1, det + 20);
          playNoise(0.08, 0.06, 'highpass', 4200, 2600);
          break;
        case 'aero':
          playNoise(0.16, 0.12, 'highpass', 2000, 900);
          playSweepTone(520, 1280, 0.14, 'triangle', 0.12, det + 60);
          playTone(900, 0.1, 'sine', 0.08, det - 40);
          break;
        case 'heal':
          playTone(520, 0.22, 'sine', 0.16, det);
          playTone(780, 0.2, 'sine', 0.12, det + 40);
          playTone(1040, 0.16, 'triangle', 0.1, det - 60);
          playNoise(0.12, 0.05, 'highpass', 3000, 2000);
          break;
        case 'hit':
          playSweepTone(240, 90, 0.12, 'square', 0.2, det);
          playTone(60, 0.18, 'sine', 0.08, det - 120);
          playNoise(0.08, 0.12, 'bandpass', 900, 520);
          break;
        case 'hurt':
          playSweepTone(200, 70, 0.2, 'sawtooth', 0.22, det - 180);
          playNoise(0.14, 0.12, 'bandpass', 520, 320);
          break;
        case 'dodge':
          playNoise(0.12, 0.11, 'highpass', 2400, 1400);
          playSweepTone(600, 260, 0.1, 'triangle', 0.12, det + 80);
          break;
        case 'guard':
          playNoise(0.08, 0.12, 'bandpass', 1800, 900);
          playTone(360, 0.1, 'sawtooth', 0.08, det - 40);
          break;
        case 'guardStart':
          playNoise(0.06, 0.1, 'bandpass', 1600, 900);
          playSweepTone(400, 120, 0.12, 'sawtooth', 0.12, det + 20);
          break;
        case 'jump':
          playSweepTone(420, 780, 0.08, 'triangle', 0.13, det + 60);
          playTone(660, 0.05, 'sine', 0.08, det);
          break;
        case 'land':
          playSweepTone(180, 80, 0.12, 'square', 0.16, det - 80);
          playNoise(0.08, 0.08, 'lowpass', 520, 220);
          break;
        case 'rotate':
          playTone(880, 0.05, 'sine', 0.09, det);
          playTone(1320, 0.05, 'triangle', 0.07, det + 60);
          playNoise(0.04, 0.03, 'highpass', 2500, 1800);
          break;
        case 'basic':
          playSweepTone(1200, 220, 0.12, 'sawtooth', 0.2, det + 40);
          playTone(160, 0.1, 'sine', 0.08, det - 120);
          playNoise(0.08, 0.09, 'highpass', 2600, 1400);
          break;
        case 'lockon':
          playTone(980, 0.09, 'sine', 0.14, det);
          playTone(1470, 0.06, 'triangle', 0.1, det + 30);
          break;
        case 'lockoff':
          playSweepTone(720, 260, 0.1, 'sine', 0.12, det - 80);
          break;
        case 'lockfail':
          playTone(220, 0.08, 'square', 0.08, det - 100);
          break;
        case 'coin':
          playTone(1320, 0.06, 'triangle', 0.08, det + 40);
          playTone(1860, 0.05, 'sine', 0.06, det + 80);
          playNoise(0.035, 0.03, 'highpass', 3200, 2000);
          break;
        case 'gameover':
          playSweepTone(680, 160, 0.26, 'sawtooth', 0.2, det - 120);
          playTone(120, 0.35, 'sine', 0.12, det - 200);
          playNoise(0.12, 0.18, 'bandpass', 520, 260);
          break;
        default:
          break;
      }
    }

    // ホラー演出は無効化（昼間固定）
    function playScreech() {}
    function playHeartbeat() {}

    // ==== 描画・スケール ====
    let PIXEL_SCALE = 1;
    const highResCheck = document.getElementById('highResCheck');
    const bloomCheck = document.getElementById('bloomCheck');
    const perspectiveCheck = document.getElementById('perspectiveCheck');
    const HIGHRES_ZOOM = 1.28;
    let resolutionZoom = highResCheck.checked ? HIGHRES_ZOOM : 1;

    PIXEL_SCALE = highResCheck.checked ? 1 : 2;

    highResCheck.addEventListener('change', () => {
      const prevZoom = resolutionZoom;
      PIXEL_SCALE = highResCheck.checked ? 1 : 2;
      resolutionZoom = highResCheck.checked ? HIGHRES_ZOOM : 1;
      if (prevZoom !== resolutionZoom) {
        const ratio = resolutionZoom / prevZoom;
        targetCamScale *= ratio;
        camScale *= ratio;
      }
      resize();
    });

    function resize() {
      canvas.width = Math.floor(window.innerWidth / PIXEL_SCALE);
      canvas.height = Math.floor(window.innerHeight / PIXEL_SCALE);
      shadowCanvas.width = canvas.width;
      shadowCanvas.height = canvas.height;
      sunShadowCanvas.width = canvas.width;
      sunShadowCanvas.height = canvas.height;
      ctx.imageSmoothingEnabled = highResCheck.checked;
      sCtx.imageSmoothingEnabled = highResCheck.checked;
      sunCtx.imageSmoothingEnabled = highResCheck.checked;
    }
    window.addEventListener('resize', resize);
    resize();

    // 俯瞰用パラメータ（カメラ回転対応、慣性付き）
    let targetCamAngle = Math.PI / 4;
    let camAngle = targetCamAngle;
    let targetCamPitch = 0.6;
    let camPitch = targetCamPitch; // 見下ろしの圧縮率（0で真横、1で真上）
    let targetCamPitch3d = 0.28;
    let camPitch3d = targetCamPitch3d;

    // --- 追加：一人称・ズーム用変数 ---
    let targetCamScale = 1.0;
    let camScale = targetCamScale;
    let isFPS = false;
    let currentEyeZ = 0;

    const PERSPECTIVE_NEAR = 5;
    const PERSPECTIVE_FOV = 900;
    const CAMERA_DISTANCE = 1100;
    const PERSPECTIVE_MIN_Z = 30;
    const CAMERA_AHEAD_OFFSET = 80;
    const LOCKON_CAM_SHIFT = 0.45;
    const LOCKON_CAM_MAX = 260;
    const LOCKON_ANGLE_ASSIST = 2.2;

    let perspectiveMix = 0; // 0: 完全並行, 1: 完全透視
    const PURE_PERSPECTIVE_THRESHOLD = 0.995;
    const PERSPECTIVE_PIPELINE_START = 0.75;
    const PERSPECTIVE_PIPELINE_END = 0.98;
    const PITCH_LINK_RATIO = 2.15; // 俯瞰ピッチと透視ピッチを相互変換する係数
    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    function isPerspective() {
      return perspectiveMix > 0.01;
    }
    function usePerspectivePipeline() {
      return perspectiveMix >= PURE_PERSPECTIVE_THRESHOLD;
    }
    function getPerspectiveBlend() {
      if (perspectiveMix <= PERSPECTIVE_PIPELINE_START) return 0;
      if (perspectiveMix >= PERSPECTIVE_PIPELINE_END) return 1;
      const t = (perspectiveMix - PERSPECTIVE_PIPELINE_START) / (PERSPECTIVE_PIPELINE_END - PERSPECTIVE_PIPELINE_START);
      return t * t * (3 - 2 * t);
    }
    function getPerspectiveYaw() {
      return camAngle;
    }

    function getPerspectivePitchMin() {
      const anchorZ = (player ? player.z + (isFPS ? 80 : 60) : 80);
      const ratio = (PERSPECTIVE_MIN_Z - anchorZ) / CAMERA_DISTANCE;
      return Math.asin(Math.max(-1, Math.min(1, ratio)));
    }

    window.addEventListener('wheel', e => {
      targetCamScale -= e.deltaY * 0.002;
      const minScale = lerp(0.1, 0.75, perspectiveMix);
      const maxScale = lerp(15.0, 1.6, perspectiveMix);
      targetCamScale = clamp(targetCamScale, minScale, maxScale);
    });

    function getCamBasis() {
      const D = CAMERA_DISTANCE;
      const a = camAngle;
      const pitch = camPitch3d;

      // ISO の座標系規約に基づいてカメラ基底を構築する：
      // ISO screen right = (cos(a), -sin(a), 0)
      // ISO depth        = (sin(a),  cos(a), 0)
      //
      // 透視カメラもこれと同じ規約にする:
      // right   = (cos(a), -sin(a), 0)       ← ISO screen-X と完全一致
      // forward = depth方向をpitchで下に傾けた方向
      //         = (sin(a)*cos(pitch), cos(a)*cos(pitch), -sin(pitch))
      const right = { x: Math.cos(a), y: -Math.sin(a), z: 0 };
      const forward = {
        x: Math.sin(a) * Math.cos(pitch),
        y: Math.cos(a) * Math.cos(pitch),
        z: -Math.sin(pitch)
      };

      const anchorZ = (player ? player.z + (isFPS ? 80 : 60) : 80);
      const camPos = {
        x: camWorldX - forward.x * D,
        y: camWorldY - forward.y * D,
        z: anchorZ - forward.z * D
      };
      camPos.z = Math.max(PERSPECTIVE_MIN_Z, camPos.z);

      // trueUp = right × forward  (右手系で上方向を構築)
      const trueUp = {
        x: right.y * forward.z - right.z * forward.y,
        y: right.z * forward.x - right.x * forward.z,
        z: right.x * forward.y - right.y * forward.x
      };

      return { camPos, forward, right, trueUp };
    }

    function worldToCamera(x, y, z) {
      const basis = getCamBasis();
      const relX = x - basis.camPos.x;
      const relY = y - basis.camPos.y;
      const relZ = z - basis.camPos.z;
      return {
        cx: relX * basis.right.x + relY * basis.right.y + relZ * basis.right.z,
        cy: relX * basis.trueUp.x + relY * basis.trueUp.y + relZ * basis.trueUp.z,
        cz: relX * basis.forward.x + relY * basis.forward.y + relZ * basis.forward.z
      };
    }

    function camDepth(x, y, z = 0) {
      return worldToCamera(x, y, z).cz;
    }

    function faceVisibleToCamera(center, normal) {
      if (perspectiveMix <= 0) return true;
      const { camPos } = getCamBasis();
      const vx = camPos.x - center.x;
      const vy = camPos.y - center.y;
      const vz = camPos.z - center.z;
      return (vx * normal.x + vy * normal.y + vz * normal.z) > 0.001;
    }

    function isAxisFaceVisible(bx, by, bw, bd, bz, bh, axis, positive) {
      const isoVisible = (() => {
        if (axis === 'x') return positive ? Math.sin(camAngle) >= 0 : Math.sin(camAngle) < 0;
        return positive ? Math.cos(camAngle) >= 0 : Math.cos(camAngle) < 0;
      })();
      if (perspectiveMix < 0.05) return isoVisible;

      const center = { x: bx + bw * 0.5, y: by + bd * 0.5, z: bz + bh * 0.5 };
      const normal = { x: 0, y: 0, z: 0 };
      if (axis === 'x') {
        center.x = positive ? bx + bw : bx;
        normal.x = positive ? 1 : -1;
      } else {
        center.y = positive ? by + bd : by;
        normal.y = positive ? 1 : -1;
      }
      const perspVisible = faceVisibleToCamera(center, normal);
      const blended = lerp(isoVisible ? 1 : 0, perspVisible ? 1 : 0, perspectiveMix);
      return blended > 0.5;
    }

    function clipPolygonNear(poly, nearZ = PERSPECTIVE_NEAR) {
      const out = [];
      for (let i = 0; i < poly.length; i++) {
        const a = poly[i];
        const b = poly[(i + 1) % poly.length];
        const aIn = a.cz >= nearZ;
        const bIn = b.cz >= nearZ;

        if (aIn && bIn) {
          out.push(b);
        } else if (aIn && !bIn) {
          const t = (nearZ - a.cz) / (b.cz - a.cz);
          out.push({
            cx: a.cx + (b.cx - a.cx) * t,
            cy: a.cy + (b.cy - a.cy) * t,
            cz: nearZ
          });
        } else if (!aIn && bIn) {
          const t = (nearZ - a.cz) / (b.cz - a.cz);
          out.push({
            cx: a.cx + (b.cx - a.cx) * t,
            cy: a.cy + (b.cy - a.cy) * t,
            cz: nearZ
          });
          out.push(b);
        }
      }
      return out;
    }

    function projectCamToScreen(p) {
      const scale = PERSPECTIVE_FOV / p.cz;
      return { sx: p.cx * scale, sy: -p.cy * scale, cz: p.cz };
    }

    function projectCamPolygon(camPoly) {
      const clipped = clipPolygonNear(camPoly);
      if (clipped.length < 3) return null;
      let depth = 0;
      const points = clipped.map(p => {
        depth += p.cz;
        return projectCamToScreen(p);
      });
      return { points, depth: depth / clipped.length };
    }

    function fillProjectedPolygon(ctx, points, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(points[0].sx, points[0].sy);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].sx, points[i].sy);
      ctx.closePath();
      ctx.fill();
    }

    function isoScale(x, y, z) {
      const cA = Math.cos(camAngle);
      const sA = Math.sin(camAngle);
      const rx = x * cA - y * sA;
      const ry = x * sA + y * cA;
      const iso = { sx: rx, sy: ry * camPitch - z, cz: Infinity, rawCz: Infinity };

      const { cx, cy, cz } = worldToCamera(x, y, z);
      const safeZ = Math.max(PERSPECTIVE_NEAR, cz);
      const scale = PERSPECTIVE_FOV / safeZ;
      const persp = { sx: cx * scale, sy: -cy * scale, cz: safeZ, rawCz: cz };

      const mix = getPerspectiveBlend();
      if (mix <= 0.0001) return iso;
      if (mix >= 0.9999) return persp;
      return {
        sx: iso.sx * (1 - mix) + persp.sx * mix,
        sy: iso.sy * (1 - mix) + persp.sy * mix,
        cz: persp.cz,
        rawCz: persp.rawCz
      };
    }

    function clippedNear(rawCz) {
      const clipZ = PERSPECTIVE_NEAR * perspectiveMix;
      return clipZ > 0 && rawCz < clipZ;
    }

    // ==== 状態管理 ====
    let gameState = 'start'; // start, play, gameover
    let lastTime = 0;
    let animationFrameId;

    let screenShake = 0;
    let deathTimer = 0;
    let gameOverTimer = 0;
    let deathSequence = false;
    let pBreatheTimer = 0;
    let stageTime = 0;
    let hitStop = 0;
    let screenFlash = 0;
    let isSafeMode = true;

    const keys = {
      w: false, a: false, s: false, d: false,
      up: false, down: false, left: false, right: false,
      ' ': false, shift: false, q: false, e: false, r: false, f: false,
      j: false, z: false, x: false, k: false, l: false, o: false, p: false,
      camLeft: false, camRight: false, camUp: false, camDown: false
    };
    const gpKeys = { Left: false, Right: false, Up: false, Down: false };
    let gpJump = false;
    let gpCamX = 0;
    let gpCamY = 0;
    let gamepadIndex = null;
    let gamepadPrevButtons = [];
    let lastRumbleAt = 0;
    let rumbleTestActive = false;
    let rumbleTestStrengthIndex = 0;
    let rumbleTestPatternIndex = 0;
    let rumbleTestClock = 0;
    let rumbleToggleQueued = false;
    let rumbleStrengthQueued = false;
    let rumblePatternQueued = false;
    let actionQueued = false;
    let rotateQueued = 0;
    let dodgeQueued = false;
    let lockQueued = false;
    let basicQueued = false;
    let restartQueued = false;

    function applyDeadzone(v, dz = 0.25) {
      const av = Math.abs(v);
      if (av < dz) return 0;
      const scaled = (av - dz) / (1 - dz);
      return Math.sign(v) * scaled;
    }

    function getActiveGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      if (gamepadIndex !== null && pads[gamepadIndex] && pads[gamepadIndex].connected) {
        return pads[gamepadIndex];
      }
      for (let i = 0; i < pads.length; i++) {
        if (pads[i] && pads[i].connected) {
          gamepadIndex = i;
          return pads[i];
        }
      }
      return null;
    }

    function pollGamepad() {
      const gp = getActiveGamepad();
      if (!gp) {
        gpKeys.Left = gpKeys.Right = gpKeys.Up = gpKeys.Down = false;
        gpJump = false;
        gamepadPrevButtons = [];
        gpCamX = 0;
        gpCamY = 0;
        return;
      }
      const buttons = gp.buttons || [];
      const pressed = (i) => !!(buttons[i] && buttons[i].pressed);
      const justPressed = (i) => pressed(i) && !gamepadPrevButtons[i];
      const isDualShock = /DualShock|Wireless Controller|PS4|DS4/i.test(gp.id || '');
      const btnMap = isDualShock ? {
        jump: 0,    // ✕
        basic: 1,   // ○
        dodge: 2,   // □
        command: 3, // △
        lock: 5,
        rotateR: 7,
        rotateL: 6,
        dpadUp: 12,
        dpadDown: 13,
        dpadLeft: 14,
        dpadRight: 15,
        start: 9
      } : {
        jump: 1,    // B
        basic: 0,   // A
        dodge: 3,   // Y
        command: 2, // X
        lock: 5,
        rotateR: 7,
        rotateL: 6,
        dpadUp: 12,
        dpadDown: 13,
        dpadLeft: 14,
        dpadRight: 15,
        start: 9
      };
      const axisX = applyDeadzone(gp.axes[0] || 0, 0.25);
      const axisY = applyDeadzone(gp.axes[1] || 0, 0.35);
      gpCamX = applyDeadzone(gp.axes[2] || 0, 0.2);
      gpCamY = applyDeadzone(gp.axes[3] || 0, 0.2);

      const jumpHeld = pressed(btnMap.jump);
      gpJump = jumpHeld;
      gpKeys.Left = axisX < -0.35 || pressed(btnMap.dpadLeft);
      gpKeys.Right = axisX > 0.35 || pressed(btnMap.dpadRight);
      gpKeys.Up = axisY < -0.6 || pressed(btnMap.dpadUp);
      gpKeys.Down = axisY > 0.6 || pressed(btnMap.dpadDown);

      if (justPressed(btnMap.jump)) gpJump = true;              // ジャンプ（即時）
      if (justPressed(btnMap.basic)) basicQueued = true;        // たたかう
      if (justPressed(btnMap.command)) actionQueued = true;     // コマンド実行
      if (justPressed(btnMap.dodge)) dodgeQueued = true;        // 回避
      if (justPressed(btnMap.dpadDown)) rotateQueued += 1;      // D-pad 下: 上向き回転
      if (justPressed(btnMap.dpadUp)) rotateQueued -= 1;        // D-pad 上: 下向き回転
      if (justPressed(btnMap.rotateR)) rotateQueued += 1;       // RT: 右回転
      if (justPressed(btnMap.rotateL)) rotateQueued -= 1;       // LT: 左回転
      if (justPressed(btnMap.lock)) lockQueued = true;          // RB: ロックオン
      if (justPressed(btnMap.start)) restartQueued = true;      // Start: リスタート
      if (justPressed(btnMap.dpadRight)) rumbleToggleQueued = true; // D-pad 右: 振動テストON/OFF
      if (justPressed(btnMap.dpadLeft)) rumbleStrengthQueued = true; // D-pad 左: 振動強度変更

      gamepadPrevButtons = buttons.map(b => b.pressed);
    }

    function rumble(strength = 0.4, duration = 90, weak = null) {
      const gp = getActiveGamepad();
      if (!gp) return;
      const now = performance.now();
      if (now - lastRumbleAt < 25) return;
      lastRumbleAt = now;
      const actuator = gp.vibrationActuator;
      if (actuator && actuator.playEffect) {
        const strong = Math.max(0, Math.min(1, strength));
        const weakMag = weak !== null ? Math.max(0, Math.min(1, weak)) : Math.max(0, Math.min(1, strength * 0.6));
        actuator.playEffect('dual-rumble', {
          duration,
          strongMagnitude: strong,
          weakMagnitude: weakMag
        }).catch(() => {});
      } else if (actuator && actuator.pulse) {
        actuator.pulse(Math.max(0, Math.min(1, strength)), duration).catch(() => {});
      }
    }

    function stopRumble() {
      const gp = getActiveGamepad();
      if (!gp) return;
      const actuator = gp.vibrationActuator;
      if (actuator && actuator.reset) {
        actuator.reset().catch(() => {});
      } else if (actuator && actuator.playEffect) {
        actuator.playEffect('dual-rumble', {
          duration: 20,
          strongMagnitude: 0,
          weakMagnitude: 0
        }).catch(() => {});
      } else if (actuator && actuator.pulse) {
        actuator.pulse(0, 20).catch(() => {});
      }
    }

    const RUMBLE_STRENGTHS = [0.2, 0.35, 0.5, 0.65, 0.8, 1.0];
    const RUMBLE_PATTERNS = [
      { name: 'steady', period: 60, sample: () => ({ strong: 1, weak: 0.6 }) },
      { name: 'pulse', period: 90, sample: (p) => {
        const s = 0.2 + 0.8 * Math.sin(p * Math.PI);
        return { strong: s, weak: s * 0.55 };
      }},
      { name: 'heartbeat', period: 120, sample: (p) => {
        let s = 0;
        if (p < 0.1) s = 1;
        else if (p < 0.18) s = 0.2;
        else if (p < 0.3) s = 0.85;
        return { strong: s, weak: s * 0.45 };
      }},
      { name: 'ramp', period: 110, sample: (p) => {
        const s = p < 0.7 ? (p / 0.7) : Math.max(0, 1 - (p - 0.7) / 0.3);
        return { strong: s, weak: s * 0.7 };
      }},
      { name: 'stutter', period: 48, sample: (p) => {
        const on = (Math.floor(p * 10) % 2) === 0;
        const s = on ? 0.9 : 0;
        return { strong: s, weak: s * 0.4 };
      }}
    ];
    const RUMBLE_TEST_INTERVAL = 3;
    const RUMBLE_TEST_DURATION = 90;

    function toggleRumbleTest() {
      rumbleTestActive = !rumbleTestActive;
      rumbleTestClock = 0;
      if (!rumbleTestActive) stopRumble();
    }

    function bumpRumbleStrength() {
      rumbleTestStrengthIndex = (rumbleTestStrengthIndex + 1) % RUMBLE_STRENGTHS.length;
    }

    function cycleRumblePattern() {
      rumbleTestPatternIndex = (rumbleTestPatternIndex + 1) % RUMBLE_PATTERNS.length;
      rumbleTestClock = 0;
    }

    function updateRumbleTest() {
      if (!rumbleTestActive) return;
      rumbleTestClock++;
      if (rumbleTestClock % RUMBLE_TEST_INTERVAL !== 0) return;
      const base = RUMBLE_STRENGTHS[rumbleTestStrengthIndex] || 0.35;
      const pattern = RUMBLE_PATTERNS[rumbleTestPatternIndex] || RUMBLE_PATTERNS[0];
      const phase = (rumbleTestClock % pattern.period) / pattern.period;
      const sample = pattern.sample(phase);
      const strong = Math.max(0, Math.min(1, base * (sample.strong ?? 0)));
      const weak = Math.max(0, Math.min(1, base * (sample.weak ?? (sample.strong ?? 0) * 0.6)));
      if (strong <= 0.02 && weak <= 0.02) {
        stopRumble();
        return;
      }
      rumble(strong, RUMBLE_TEST_DURATION, weak);
    }

    window.addEventListener('gamepadconnected', (e) => {
      gamepadIndex = e.gamepad.index;
    });
    window.addEventListener('gamepaddisconnected', () => {
      gamepadIndex = null;

    });

    window.addEventListener('keydown', e => {
      initAudio();
      const k = e.key.toLowerCase();
      if (keys.hasOwnProperty(k)) keys[k] = true;
      if (e.code === 'ArrowUp') keys.up = true;
      if (e.code === 'ArrowDown') keys.down = true;
      if (e.code === 'ArrowLeft') keys.left = true;
      if (e.code === 'ArrowRight') keys.right = true;
      if (e.code === 'Space') keys[' '] = true;
      if (e.code === 'KeyJ' || e.code === 'KeyZ') {
        keys.j = true;
        keys.z = true;
        if (!e.repeat) actionQueued = true;
      }
      if (e.code === 'KeyF') {
        keys.f = true;
        if (!e.repeat) basicQueued = true;
      }
      if (e.code === 'KeyQ') {
        keys.q = true;
        if (!e.repeat) dodgeQueued = true;
      }
      if (e.code === 'KeyE') {
        keys.e = true;
        if (!e.repeat) lockQueued = true;
      }
      if (e.code === 'KeyK') {
        keys.k = true;
        if (!e.repeat) rotateQueued += 1;
      }
      if (e.code === 'KeyX') {
        keys.x = true;
        if (!e.repeat) rotateQueued -= 1;
      }
      if (e.code === 'KeyL') {
        keys.l = true;
        if (!e.repeat) rotateQueued -= 1;
      }
      if (e.code === 'KeyO' && !e.repeat) rumbleToggleQueued = true;
      if (e.code === 'KeyP' && !e.repeat) rumblePatternQueued = true;
      if (e.code === 'KeyR' && !e.repeat) restartQueued = true;
      if (e.code === 'BracketLeft') keys.camLeft = true;
      if (e.code === 'BracketRight') keys.camRight = true;
      if (e.code === 'Comma') keys.camUp = true;
      if (e.code === 'Period') keys.camDown = true;

      // 透視/並行投影をワンタッチ切替（Tキー）
      if (k === 't' && perspectiveCheck) {
        perspectiveCheck.checked = !perspectiveCheck.checked;
        perspectiveCheck.dispatchEvent(new Event('change'));
      }
      if (k === 'v') {
        isFPS = !isFPS;
        const baseIso = isFPS ? 0.05 : 0.6;
        targetCamPitch = clamp(baseIso, 0.05, 1.0);
        const minPitch = getPerspectivePitchMin();
        const mapped = clamp(baseIso / PITCH_LINK_RATIO, minPitch, 1.0);
        targetCamPitch3d = mapped;
        camLookZ *= (1 - perspectiveMix);
        const [minS, maxS] = isFPS ? [0.6, 3.0] : [0.3, 12.0];
        targetCamScale = clamp(targetCamScale, minS, maxS);
      }
    });
    window.addEventListener('keyup', e => {
      const k = e.key.toLowerCase();
      if (keys.hasOwnProperty(k)) keys[k] = false;
      if (e.code === 'ArrowUp') keys.up = false;
      if (e.code === 'ArrowDown') keys.down = false;
      if (e.code === 'ArrowLeft') keys.left = false;
      if (e.code === 'ArrowRight') keys.right = false;
      if (e.code === 'Space') keys[' '] = false;
      if (e.code === 'KeyJ' || e.code === 'KeyZ') { keys.j = false; keys.z = false; }
      if (e.code === 'KeyK') keys.k = false;
      if (e.code === 'KeyX') keys.x = false;
      if (e.code === 'KeyL') keys.l = false;
      if (e.code === 'KeyO') keys.o = false;
      if (e.code === 'KeyP') keys.p = false;
      if (e.code === 'BracketLeft') keys.camLeft = false;
      if (e.code === 'BracketRight') keys.camRight = false;
      if (e.code === 'Comma') keys.camUp = false;
      if (e.code === 'Period') keys.camDown = false;
    });
    perspectiveCheck?.addEventListener('change', () => {
      const toPerspective = perspectiveCheck.checked;
      const minPitch = getPerspectivePitchMin();
      if (toPerspective) {
        const mapped = clamp(camPitch / PITCH_LINK_RATIO, minPitch, 1.0);
        targetCamPitch3d = mapped;
        camPitch3d = mapped;
      } else {
        const mapped = clamp(camPitch3d * PITCH_LINK_RATIO, 0.05, 1.0);
        targetCamPitch = mapped;
        camPitch = mapped;
      }
      const [minS, maxS] = toPerspective ? [0.65, 2.5] : [0.1, 15.0];
      targetCamScale = clamp(targetCamScale, minS, maxS);
    });

    let player, pudding, entities, lights, particles, trails, fog;

    function buildMap() {

          entities.push({ type: 'flat', x: x, y: y, w: BLOCK_SIZE, d: BLOCK_SIZE, color: '#2a2d30' });

          // 交差点の横断歩道（ゼブラ模様）

            entities.push({ type: 'flat', x: x - ROAD_W + 20, y: y - ROAD_W + 20 + i * 25, w: ROAD_W - 40, d: 12, color: '#6a6d75' });
            entities.push({ type: 'flat', x: x - ROAD_W + 20 + i * 25, y: y - 30, w: 12, d: 20, color: '#6a6d75' });
          }

          const wallThick = 15;
          const wallH = 25;
          const piece = 40;

          for (let wx = x; wx < x + BLOCK_SIZE; wx += piece) {
            // 玄関用の隙間（プレイヤーがブロック内へ逃げ込めるように）
            if (wx > x + BLOCK_SIZE / 2 - 30 && wx < x + BLOCK_SIZE / 2 + 30) continue;
            let w = Math.min(piece, x + BLOCK_SIZE - wx);
            entities.push({ type: 'wall', x: wx, y: y, w: w, d: wallThick, h: wallH });
            entities.push({ type: 'wall', x: wx, y: y + BLOCK_SIZE - wallThick, w: w, d: wallThick, h: wallH });
          }
          for (let wy = y + wallThick; wy < y + BLOCK_SIZE - wallThick; wy += piece) {
            // 横側の隙間
            if (wy > y + BLOCK_SIZE / 2 - 30 && wy < y + BLOCK_SIZE / 2 + 30) continue;
            let d = Math.min(piece, (y + BLOCK_SIZE - wallThick) - wy);
            entities.push({ type: 'wall', x: x, y: wy, w: wallThick, d: d, h: wallH });
            entities.push({ type: 'wall', x: x + BLOCK_SIZE - wallThick, y: wy, w: wallThick, d: d, h: wallH });

    function rebuildShadowCasters() {
      activeShadowCasters = [];
      if (!ENABLE_SUN_SHADOWS) return;
      for (const e of entities) {
        if (e.type === 'wall' || e.type === 'house' || e.type === 'vending') {
          addShadowCasterRect(e.x, e.y, e.w || 10, e.d || 10, e.h || 50);
        } else if (e.type === 'tree') {
          addShadowCasterRect(e.x + 5, e.y + 5, 20, 20, e.h || 50);
        } else if (e.type === 'pole') {
          addShadowCasterRect(e.x, e.y, 6, 6, 120);
        }

      if (player) {
        addShadowCasterRect(player.x - 8, player.y - 8, 16, 16, 56 + Math.max(0, player.z || 0));

      if (pudding) {
        const sz = (pudding.visualRadius || 28) * 1.6;

        addShadowCasterRect(pudding.x - sz * 0.5, pudding.y - sz * 0.5, sz, sz, h);
      }
    }

    function rayHitsCaster(px, py, pz, vx, vy, vz, c) {
      let tMin = 0.35;
      let tMax = 1e9;
      function clip(minV, maxV, p, v) {
        if (Math.abs(v) < 1e-6) return p >= minV && p <= maxV;
        let t1 = (minV - p) / v;
        let t2 = (maxV - p) / v;
        if (t1 > t2) { const tmp = t1; t1 = t2; t2 = tmp; }
        tMin = Math.max(tMin, t1);
        tMax = Math.min(tMax, t2);
        return tMax >= tMin;
      }
      if (!clip(c.x, c.x + c.w, px, vx)) return false;
      if (!clip(c.y, c.y + c.d, py, vy)) return false;
      if (!clip(0, c.h, pz, vz)) return false;
      return tMax >= tMin;
    }

    function getSunShadowFactorAt(x, y, z = 0) {
      if (!isSafeMode || activeShadowCasters.length === 0) return 0;
      const vx = -SUN_SHADOW_X;
      const vy = -SUN_SHADOW_Y;
      const vz = 1;
      let hits = 0;
      for (const c of activeShadowCasters) {
        if (z >= c.h - 0.5) continue;
        const sx0 = Math.min(c.x, c.x + SUN_SHADOW_X * c.h) - 20;
        const sx1 = Math.max(c.x + c.w, c.x + c.w + SUN_SHADOW_X * c.h) + 20;
        const sy0 = Math.min(c.y, c.y + SUN_SHADOW_Y * c.h) - 20;
        const sy1 = Math.max(c.y + c.d, c.y + c.d + SUN_SHADOW_Y * c.h) + 20;
        if (x < sx0 || x > sx1 || y < sy0 || y > sy1) continue;
        if (x >= c.x - 0.1 && x <= c.x + c.w + 0.1 &&
          y >= c.y - 0.1 && y <= c.y + c.d + 0.1 &&
          z <= c.h + 0.1) continue;
        if (rayHitsCaster(x, y, z, vx, vy, vz, c)) {
          hits++;
          if (hits >= 3) break;
        }
      }
      return Math.min(1, hits * 0.42);
    }

    function mixShadowColor(color, strength) {
      if (!isSafeMode || strength <= 0.001) return color;
      if (typeof color !== 'string' || color[0] !== '#') return color;
      let hex = color.slice(1);
      if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
      if (hex.length !== 6) return color;
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      const t = Math.min(1, strength * 0.78);
      const sr = DAY_SHADOW_R, sg = DAY_SHADOW_G, sb = DAY_SHADOW_B;
      const rr = Math.round(r * (1 - t) + sr * t);
      const gg = Math.round(g * (1 - t) + sg * t);
      const bb = Math.round(b * (1 - t) + sb * t);
      return `rgb(${rr}, ${gg}, ${bb})`;
    }

    function checkCollision(px, py, radius, zCheck = Infinity) {
      if (px - radius < 0 || px + radius > MAP_SIZE || py - radius < 0 || py + radius > MAP_SIZE) return true;
      for (let e of entities) {
        if (e.type === 'wall' || e.type === 'house' || e.type === 'vending') {
          if (px + radius > e.x && px - radius < e.x + e.w &&
            py + radius > e.y && py - radius < e.y + e.d) {
            const objHeight = e.h || 50;
            if (zCheck < objHeight) return true;
          }
        }
      }
      return false;
    }

    function resolveFxColor(color, fallback) {
      if (Array.isArray(color) && color.length > 0) {
        return color[Math.floor(Math.random() * color.length)];
      }
      return color || fallback;
    }

    function colorWithAlpha(color, alpha) {
      if (!color) return `rgba(255,255,255,${alpha})`;
      const c = String(color).trim();
      if (c.startsWith('#')) {
        let hex = c.slice(1);
        if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
        if (hex.length === 6) {
          const num = parseInt(hex, 16);
          const r = (num >> 16) & 255;
          const g = (num >> 8) & 255;
          const b = num & 255;
          return `rgba(${r},${g},${b},${alpha})`;
        }
      }
      if (c.startsWith('rgb')) {
        const nums = c.replace(/rgba?\(|\)|\s/g, '').split(',');
        if (nums.length >= 3) {
          return `rgba(${nums[0]},${nums[1]},${nums[2]},${alpha})`;
        }
      }
      return color;
    }

    function getFxDensity() {
      const len = effects.length;
      if (len > FX_HARD_CAP) return 0;
      if (len > FX_SOFT_CAP) return 0.4;
      if (len > FX_WARN_CAP) return 0.7;
      return 1;
    }

    function consumeFxBudget() {
      if (effects.length >= FX_HARD_CAP) return false;
      if (fxBudget <= 0) return false;
      fxBudget--;
      return true;
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, h / 2, w / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function triggerDeckRotate(dir = 1, steps = 1) {
      const stepDir = dir >= 0 ? 1 : -1;
      const stepCount = Math.max(1, Math.floor(steps || 1));
      if (commandRotateFrames <= 0) {
        commandRotateFrames = COMMAND_ROTATE_FRAMES;
        commandRotateDir = stepDir;
        commandRotateQueue = stepCount - 1;
        playSfx('rotate');
      } else {
        commandRotateQueue += stepCount;
        commandRotateDir = stepDir;
      }
    }

    function updateCommandDeck() {
      for (let cmd of commandDeck) {
        if (cmd.timer > 0) cmd.timer--;
      }
      if (commandRotateFrames > 0) {
        commandRotateFrames--;
        if (commandRotateFrames === 0) {
          if (commandRotateDir > 0) {
            commandDeck.push(commandDeck.shift());
          } else {
            commandDeck.unshift(commandDeck.pop());
          }
          if (commandRotateQueue > 0) {
            commandRotateQueue--;
            commandRotateFrames = COMMAND_ROTATE_FRAMES;
            playSfx('rotate');
          }
        }
      } else if (commandRotateQueue > 0) {
        commandRotateQueue--;
        commandRotateFrames = COMMAND_ROTATE_FRAMES;
        playSfx('rotate');
      }
    }
