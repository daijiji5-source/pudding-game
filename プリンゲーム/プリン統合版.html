    class Enemy {
      constructor(x, y, kind = 'grunt', spawnId = null) {
        const preset = ENEMY_TYPES[kind] || ENEMY_TYPES.grunt;
        this.id = Enemy.nextId++;
        this.kind = kind;
        this.spawnId = spawnId;
        this.x = x;
        this.y = y;
        this.z = 0;
        this.vx = 0;
        this.vy = 0;
        this.width = preset.width;
        this.height = preset.height;
        this.hp = preset.hp;
        this.maxHp = preset.hp;
        this.invuln = 0;
        this.hitstun = 0;
        this.attackState = 'idle';
        this.attackTimer = 0;
        this.attackCooldownBase = preset.attackCooldown;
        this.attackCooldown = preset.attackCooldown;
        this.attackHit = false;
        this.attackRange = preset.attackRange * ENEMY_ATTACK_RANGE_SCALE;
        this.damage = preset.damage;
        this.speedMul = preset.speed;
        this.facing = 1;
        this.facingX = 1;
        this.facingY = 0;
        this.renderRot = 0;
        this.spawnX = x;
        this.spawnY = y;
        this.patrolDirX = Math.random() * 2 - 1;
        this.patrolDirY = Math.random() * 2 - 1;
        const patrolLen = Math.hypot(this.patrolDirX, this.patrolDirY) || 1;
        this.patrolDirX /= patrolLen;
        this.patrolDirY /= patrolLen;
        this.patrolRange = 160 + Math.random() * 140;
        this.state = 'patrol';
        this.stateTimer = 0;
        this.strafeDir = Math.random() > 0.5 ? 1 : -1;
        this.deadTimer = 0;
        this.bodyTop = preset.bodyTop;
        this.bodyBottom = preset.bodyBottom;
        this.eyeColor = preset.eyeColor;
        this.slashColor = preset.slashColor;
        this.ringColor = preset.ringColor;
        this.style = preset.style || kind;
        this.accent = preset.accent || preset.eyeColor || '#ffffff';
        this.hpDisplay = this.hp;
        this.hpLag = this.hp;
        this.hpLagHold = 0;
        this.lastHp = this.hp;
      }

      update(player, step) {
        if (this.hp <= 0) {
          this.deadTimer++;
          this.vx *= 0.92;
          this.vy *= 0.92;
          this.x += this.vx * step;
          this.y += this.vy * step;
          return;
        }
        if (this.invuln > 0) this.invuln = Math.max(0, this.invuln - step);

        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.hypot(dx, dy) || 1;
        const faceX = dx / dist;
        const faceY = dy / dist;
        this.facingX = faceX;
        this.facingY = faceY;
        this.facing = faceX >= 0 ? 1 : -1;

        if (this.hitstun > 0) {
          this.hitstun = Math.max(0, this.hitstun - step);
          this.vx *= 0.88;
          this.vy *= 0.88;
        } else if (this.attackState !== 'idle') {
          if (this.attackState === 'windup') {
            this.attackTimer -= step;
            this.vx *= 0.8;
            this.vy *= 0.8;
            if (this.attackTimer <= 0) {
              this.attackState = 'attack';
              this.attackTimer = 12;
              this.attackHit = false;
              effects.push({
                type: 'enemySlash',
                x: this.x + faceX * 26,
                y: this.y + faceY * 26,
                life: 12,
                maxLife: 12,
                r: 70,
                facing: this.facing,
                angle: Math.atan2(faceY, faceX),
                color: this.slashColor || '#ff5b5b',
                seed: Math.random() * 10
              });
              playSfx('slash');
            }
          } else if (this.attackState === 'attack') {
            this.attackTimer -= step;
            const lunge = 0.9 * (this.speedMul || 1);
            this.vx += faceX * lunge * step;
            this.vy += faceY * lunge * step;
            if (!this.attackHit && dist < this.attackRange + PLAYER_HIT_RADIUS) {
              if (player.guardTimer > 0) {
                const guardColor = player.guardColor || '#7ee5ff';
                const guardY = player.y;
                this.attackHit = true;
                player.guardTimer = Math.max(player.guardTimer, GUARD_BONUS_DURATION);
                player.guardTimerMax = Math.max(player.guardTimerMax, GUARD_BONUS_DURATION);
                player.guardFlash = 18;
                player.guardSuccessTimer = COUNTER_WINDOW;
                player.counterTarget = this;
                effects.push({ type: 'guardPulse', x: player.x, y: guardY, life: 18, maxLife: 18, r: 130, color: guardColor });
                effects.push({ type: 'ring', x: player.x, y: guardY, life: 20, maxLife: 20, r: 120, color: guardColor, width: 4, glow: true });
                effects.push({ type: 'ring', x: player.x, y: guardY, life: 26, maxLife: 26, r: 190, color: '#ffffff', width: 2, expand: 90 });
                effects.push({ type: 'impact', x: player.x, y: guardY, life: 12, maxLife: 12, r: 60, color: '#ffffff' });
                spawnSparks(player.x, guardY, 20, [guardColor, '#ffffff'], Math.PI * 2, 8, 20);
                this.hitstun = Math.max(this.hitstun, 12);
                this.vx += Math.sign(this.x - player.x) * 4.2;
                screenShake += 1.6;
                screenFlash = Math.max(screenFlash, 0.2);
                rumble(0.45, 110, 0.32);
                playSfx('guard');
              } else {
                damagePlayer(this.damage || 12, this.x, this.y);
                this.attackHit = true;
              }
            }
            if (this.attackTimer <= 0) {
              this.attackState = 'recover';
              this.attackTimer = 16;
            }
          } else if (this.attackState === 'recover') {
            this.attackTimer -= step;
            this.vx *= 0.85;
            this.vy *= 0.85;
            if (this.attackTimer <= 0) {
              this.attackState = 'idle';
              this.attackCooldown = this.attackCooldownBase || 35;
            }
          }
        } else {
          if (this.attackCooldown > 0) this.attackCooldown = Math.max(0, this.attackCooldown - step);
          if (this.stateTimer > 0) this.stateTimer = Math.max(0, this.stateTimer - step);

          if (playerOffenseTimer > 0 && dist < 240) {
            if (this.state !== 'evade') {
              this.state = 'evade';
              this.stateTimer = 24;
              this.strafeDir = Math.random() > 0.5 ? 1 : -1;
            }
          } else if (dist > 520) {
            this.state = 'patrol';
            this.stateTimer = 0;
          } else if (this.stateTimer <= 0 && dist < 420) {
            const roll = Math.random();
            if (dist < 120 && roll < 0.7) {
              this.state = 'retreat';
              this.stateTimer = 18;
            } else if (roll < 0.35) {
              this.state = 'chase';
              this.stateTimer = 28;
            } else if (roll < 0.55) {
              this.state = 'strafe';
              this.stateTimer = 24;
              this.strafeDir = Math.random() > 0.5 ? 1 : -1;
            } else if (roll < 0.7) {
              this.state = 'feint';
              this.stateTimer = 18;
            } else {
              this.state = 'wait';
              this.stateTimer = 16;
            }
          }

          if (dist < this.attackRange && this.attackCooldown <= 0 && playerOffenseTimer <= 0 && this.state !== 'evade' && this.state !== 'retreat') {
            this.attackState = 'windup';
            this.attackTimer = 18;
            effects.push({ type: 'ring', x: this.x, y: this.y, life: 12, maxLife: 12, r: 18, color: this.ringColor || '#ff5b5b' });
          } else {
            let dirX = 0;
            let dirY = 0;
            if (this.state === 'chase') {
              dirX = faceX; dirY = faceY;
            } else if (this.state === 'strafe') {
              dirX = -faceY * this.strafeDir;
              dirY = faceX * this.strafeDir;
              if (dist < 140) {
                dirX += -faceX * 0.5;
                dirY += -faceY * 0.5;
              }
            } else if (this.state === 'retreat' || this.state === 'evade') {
              dirX = -faceX; dirY = -faceY;
            } else if (this.state === 'feint') {
              const toward = this.stateTimer > 10 ? 1 : -1;
              dirX = faceX * toward;
              dirY = faceY * toward;
            } else if (this.state === 'wait') {
              this.vx *= 0.7;
              this.vy *= 0.7;
            } else {
              const targetX = this.spawnX + this.patrolDirX * this.patrolRange;
              const targetY = this.spawnY + this.patrolDirY * this.patrolRange;
              const pdx = targetX - this.x;
              const pdy = targetY - this.y;
              const plen = Math.hypot(pdx, pdy);
              if (plen < 12 || plen > this.patrolRange * 1.6) {
                this.patrolDirX = Math.random() * 2 - 1;
                this.patrolDirY = Math.random() * 2 - 1;
                const pLen = Math.hypot(this.patrolDirX, this.patrolDirY) || 1;
                this.patrolDirX /= pLen;
                this.patrolDirY /= pLen;
              } else {
                dirX = pdx / plen;
                dirY = pdy / plen;
              }
            }
            const accel = 0.45 * (this.speedMul || 1);
            this.vx += dirX * accel * step;
            this.vy += dirY * accel * step;
          }
        }

        const maxSpeed = 3.2 * (this.speedMul || 1);
        this.vx = clamp(this.vx, -maxSpeed, maxSpeed);
        this.vy = clamp(this.vy, -maxSpeed, maxSpeed);
        this.vx *= 0.9;
        this.vy *= 0.9;

        const radius = Math.max(8, this.width * 0.18);
        const nx = this.x + this.vx * step;
        if (!checkCollision(nx, this.y, radius, 0)) {
          this.x = nx;
        } else {
          this.vx *= -0.2;
        }
        const ny = this.y + this.vy * step;
        if (!checkCollision(this.x, ny, radius, 0)) {
          this.y = ny;
        } else {
          this.vy *= -0.2;
        }

      }
    }
    Enemy.nextId = 1;

    function findFreeSpot(radius = 12) {
      for (let i = 0; i < 60; i++) {
        const x = ROAD_W + Math.random() * (MAP_SIZE - ROAD_W * 2);
        const y = ROAD_W + Math.random() * (MAP_SIZE - ROAD_W * 2);
        if (!checkCollision(x, y, radius, 0)) return { x, y };
      }
      return { x: ROAD_W + 40, y: ROAD_W + 40 };
    }

    function initEnemies() {
      enemies = [];
      enemySpawns = [];
      const count = 18;
      const kinds = ['grunt', 'scout', 'brute', 'knight', 'mage', 'stalker'];
      for (let i = 0; i < count; i++) {
        const spot = findFreeSpot(12);
        const roll = Math.random();
        let kind = 'grunt';
        if (roll < 0.12) kind = 'knight';
        else if (roll < 0.26) kind = 'brute';
        else if (roll < 0.42) kind = 'mage';
        else if (roll < 0.6) kind = 'stalker';
        else if (roll < 0.8) kind = 'scout';
        const enemy = new Enemy(spot.x, spot.y, kind, null);
        enemies.push(enemy);
      }
    }

    function updateEnemies(step) {
      for (let e of enemies) e.update(player, step);
      enemies = enemies.filter(e => e.hp > 0 || e.deadTimer < 40);
    }

    function applyHitStop(frames, flash) {
      hitStop = Math.max(hitStop, frames);
      screenFlash = Math.max(screenFlash, flash || 0);
    }

    function spawnSparks(x, y, count, color, spread = Math.PI * 2, speed = 6, life = 18) {
      const density = getFxDensity();
      if (density <= 0) return;
      for (let i = 0; i < count; i++) {
        if (density < 1 && Math.random() > density) continue;
        if (!consumeFxBudget()) break;
        const ang = (Math.random() - 0.5) * spread;
        const spd = speed * (0.4 + Math.random() * 0.8);
        const sparkColor = resolveFxColor(color, '#ffffff');
        effects.push({
          type: 'spark',
          x,
          y,
          z: 0,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          life,
          maxLife: life,
          color: sparkColor,
          size: 2 + Math.random() * 3
        });
      }
    }

    function spawnShockwave(x, y, color) {
      effects.push({ type: 'ring', x, y, life: 14, maxLife: 14, r: 30, color: resolveFxColor(color, '#fff1a8') });
    }

    function spawnImpact(x, y, color) {
      effects.push({ type: 'impact', x, y, life: 12, maxLife: 12, r: 40, color: resolveFxColor(color, '#ffffff') });
    }

    function createCoin(x, y, options = {}) {
      return {
        id: coinIdCounter++,
        x,
        y,
        z: options.z !== undefined ? options.z : 0,
        baseZ: options.baseZ !== undefined ? options.baseZ : 0,
        r: options.r !== undefined ? options.r : 30,
        vx: options.vx || 0,
        vy: options.vy || 0,
        vz: options.vz || 0,
        spin: options.spin !== undefined ? options.spin : Math.random() * Math.PI * 2,
        spinSpeed: options.spinSpeed !== undefined ? options.spinSpeed : (0.05 + Math.random() * 0.06),
        bobPhase: options.bobPhase !== undefined ? options.bobPhase : Math.random() * Math.PI * 2,
        float: options.float || false,
        dynamic: options.dynamic || false,
        bounce: options.bounce !== undefined ? options.bounce : COIN_BOUNCE,
        value: options.value !== undefined ? options.value : 1,
        restTimer: 0,
        collected: false
      };
    }

    function spawnCoin(x, y, options = {}) {
      coins.push(createCoin(x, y, options));
    }

    function spawnCoinBurst(x, y, enemy = null) {
      const hp = enemy && enemy.maxHp ? enemy.maxHp : 60;
      const base = Math.round(hp / 30);
      const count = Math.max(COIN_DROP_MIN, Math.min(COIN_DROP_MAX, base + Math.floor(Math.random() * 3)));
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const speed = 2.4 + Math.random() * 4.0;
        const vx = Math.cos(ang) * speed * (0.7 + Math.random() * 0.6);
        const vy = Math.sin(ang) * speed * (0.7 + Math.random() * 0.6);
        const vz = 2.0 + Math.random() * 3.0;
        spawnCoin(x + (Math.random() - 0.5) * 24, y + (Math.random() - 0.5) * 18, {
          dynamic: true,
          float: false,
          vx,
          vy,
          vz,
          r: 26 + Math.random() * 8,
          spinSpeed: 0.08 + Math.random() * 0.08
        });
      }
    }

    function initCoins() {
      coins = [];
      coinIdCounter = 1;
      for (let i = 0; i < 40; i++) {
        const spot = findFreeSpot(10);
        spawnCoin(spot.x, spot.y, { float: true, baseZ: 6, r: 26 + Math.random() * 8 });
      }
    }

    function collectCoin(coin) {
      if (!coin || coin.collected) return;
      coin.collected = true;
      coinCount += coin.value || 1;
      coinPulse = Math.min(1.2, coinPulse + 0.35);
      playSfx('coin');
      effects.push({ type: 'ring', x: coin.x, y: coin.y, life: 14, maxLife: 14, r: 30, color: '#ffe7a6' });
      spawnSparks(coin.x, coin.y, 10, COIN_PALETTE, Math.PI * 2, 5, 16);
    }

    function updateCoins(step) {
      const px = player.x;
      const py = player.y;
      for (let coin of coins) {
        if (coin.collected) continue;
        if (coin.dynamic) {
          coin.vz -= COIN_GRAVITY * step;
          coin.x += coin.vx * step;
          coin.y += coin.vy * step;
          coin.z += coin.vz * step;
          coin.vx *= COIN_AIR_DRAG;
          coin.vy *= COIN_AIR_DRAG;
          if (coin.z <= 0) {
            coin.z = 0;
            if (Math.abs(coin.vz) > 0.8) {
              coin.vz = -coin.vz * coin.bounce;
              coin.vx *= 0.92;
              coin.vy *= 0.92;
            } else {
              coin.vz = 0;
              coin.restTimer++;
              if (coin.restTimer > 18) {
                coin.dynamic = false;
                coin.float = true;
                coin.baseZ = 6;
                coin.vx = 0;
                coin.vy = 0;
              }
            }
          }
        }

        const bob = coin.float ? Math.sin(stageTime * COIN_FLOAT_SPEED + coin.bobPhase) * COIN_FLOAT_AMPLITUDE : 0;
        coin.renderZ = (coin.float ? coin.baseZ : coin.z) + bob;
        coin.spin += coin.spinSpeed;

        const dxp = coin.x - px;
        const dyp = coin.y - py;
        if (Math.hypot(dxp, dyp) <= COIN_COLLECT_RADIUS) {
          collectCoin(coin);
          continue;
        }
        for (let atk of attacks) {
          if (atk.delay && atk.delay > 0) continue;
          const dx = coin.x - atk.x;
          const dy = coin.y - atk.y;
          if (Math.hypot(dx, dy) <= atk.r + coin.r) {
            collectCoin(coin);
            break;
          }
        }
      }
      coins = coins.filter(c => !c.collected);
    }

    function updateHpDisplay(entity, fast = 0.24, slow = 0.06, hold = 10) {
      if (entity.hpDisplay === undefined) {
        entity.hpDisplay = entity.hp;
        entity.hpLag = entity.hp;
        entity.hpLagHold = 0;
        entity.lastHp = entity.hp;
        return;
      }
      const hp = entity.hp;
      if (hp < entity.lastHp) {
        entity.hpLagHold = hold;
      }
      entity.lastHp = hp;
      entity.hpDisplay += (hp - entity.hpDisplay) * fast;
      if (entity.hpLag > hp) {
        if (entity.hpLagHold > 0) entity.hpLagHold--;
        else entity.hpLag += (hp - entity.hpLag) * slow;
      } else {
        entity.hpLag += (hp - entity.hpLag) * fast;
      }
      entity.hpDisplay = Math.max(0, Math.min(entity.maxHp, entity.hpDisplay));
      entity.hpLag = Math.max(0, Math.min(entity.maxHp, entity.hpLag));
    }

    function damageEnemy(enemy, atk) {
      if (enemy.hp <= 0 || enemy.invuln > 0) return;
      enemy.hp = Math.max(0, enemy.hp - atk.damage);
      enemy.invuln = 8;
      enemy.hitstun = atk.hitstun || 12;
      enemy.attackState = 'idle';
      enemy.attackTimer = 0;
      enemy.attackCooldown = Math.max(enemy.attackCooldown, 20);
      const dirX = enemy.x < atk.x ? -1 : 1;
      const dirY = enemy.y < atk.y ? -1 : 1;
      enemy.vx += dirX * (atk.knockback || 6);
      enemy.vy += dirY * (atk.knockback || 6);
      if (atk.finisher) {
        enemy.hitstun = Math.max(enemy.hitstun, 18);
        spawnImpact(enemy.x, enemy.y, '#fff1a8');
        screenShake += 1.4;
        rumble(0.45, 120, 0.3);
      }
      effects.push({ type: 'hit', x: enemy.x, y: enemy.y, life: 12, maxLife: 12, r: 26 });
      spawnImpact(enemy.x, enemy.y, '#ffd3d3');
      spawnSparks(enemy.x, enemy.y, 10, '#ffb2b2', Math.PI * 2, 5, 14);
      screenShake += 1.2;
      rumble(0.22, 70, 0.18);
      applyHitStop(atk.hitStop || 2, 0.2);
      playSfx('hit');
      comboCount = comboTimer > 0 ? comboCount + 1 : 1;
      comboTimer = COMBO_WINDOW;
      if (enemy.hp <= 0) {
        spawnCoinBurst(enemy.x, enemy.y, enemy);
        effects.push({ type: 'burst', x: enemy.x, y: enemy.y, life: 20, maxLife: 20, r: 90 });
        spawnSparks(enemy.x, enemy.y, 18, '#ff7aa0', Math.PI * 2, 7, 20);
        screenShake += 3;
        applyHitStop(4, 0.35);
        rumble(0.55, 160, 0.4);
      }
    }

    function damagePlayer(amount, sourceX, sourceY) {
      if (player.invuln > 0 || gameOver || deathSequence || playerOffenseTimer > 0) return;
      player.hp = Math.max(0, player.hp - amount);
      player.invuln = 50;
      comboCount = 0;
      comboTimer = 0;
      playerOffenseTimer = 0;
      basicComboCooldown = 0;
      basicComboTimer = 0;
      basicComboStep = 0;
      basicChainQueued = false;
      player.attackTimer = 0;
      player.attackType = '';
      player.attackDashX = 0;
      player.attackDashY = 0;
      player.guardSuccessTimer = 0;
      if (player.counterActive) endCounterAttack();
      hpUiPulse = 0.7;
      hpUiShake = HP_SHAKE_FRAMES;
      const dirX = player.x < sourceX ? -1 : 1;
      const dirY = player.y < sourceY ? -1 : 1;
      player.vx += dirX * 6;
      player.vy += dirY * 6;
      player.hurtTimer = 18;
      player.hurtDir = dirX;
      effects.push({ type: 'hit', x: player.x, y: player.y, life: 14, maxLife: 14, r: 30 });
      spawnImpact(player.x, player.y, '#ffb9c8');
      spawnSparks(player.x, player.y, 12, '#ffccd0', Math.PI * 2, 6, 16);
      screenShake += 4;
      applyHitStop(4, 0.35);
      rumble(0.8, 200, 0.6);
      playSfx('hurt');
      if (player.hp <= 0) {
        const dirSign = dirX === 0 ? 1 : Math.sign(dirX);
        player.vx = dirX * 14;
        player.vy = dirY * 14;
        player.vz = 260;
        player.onGround = false;
        player.renderRot = -dirSign * 0.6;
        player.invuln = 999;
        player.hurtTimer = 0;
        player.attackTimer = 0;
        player.attackType = '';
        player.attackDashX = 0;
        player.attackDashY = 0;
        player.slamActive = false;
        player.deathFreeze = false;
        player.deathFreezeX = player.x;
        player.deathFreezeY = player.y;
        player.deathFreezeZ = player.z;
        effects.push({ type: 'burst', x: player.x, y: player.y, life: 24, maxLife: 24, r: 120 });
        spawnImpact(player.x, player.y, '#bfe7ff');
        spawnSparks(player.x, player.y, 18, ['#ffffff', '#9fd6ff'], Math.PI * 2, 7, 20);
        screenShake += 8;
        screenFlash = Math.max(screenFlash, 0.45);
        applyHitStop(6, 0.4);
        rumble(1, 280, 0.8);
        triggerDeathSequence();
      }
    }

    function spawnBasicAttack() {
      const lockTarget = lockOnActive ? lockOnTarget : softLockTarget;
      let step = 1;
      if (basicComboTimer > 0 && basicComboStep > 0) {
        step = Math.min(BASIC_COMBO_MAX, basicComboStep + 1);
      }
      basicComboStep = step;
      basicComboTimer = BASIC_COMBO_WINDOW;
      basicComboCooldown = step === BASIC_COMBO_MAX ? 16 : 0;
      const dmg = step === 1 ? 12 : step === 2 ? 16 : step === 3 ? 20 : 30;
      const radius = step === 1 ? 90 : step === 2 ? 110 : step === 3 ? 130 : 160;
      const range = step === 1 ? 110 : step === 2 ? 130 : step === 3 ? 150 : 180;
      const knock = step === 1 ? 8 : step === 2 ? 10 : step === 3 ? 12 : 18;
      const hitStopPower = step === BASIC_COMBO_MAX ? 3 : 2;
      const hitstun = step === BASIC_COMBO_MAX ? 18 : 12;

      player.attackTimer = step === BASIC_COMBO_MAX ? 22 : (10 + step * 2);
      player.attackTimerMax = player.attackTimer;
      player.attackType = 'basic';
      player.attackComboStep = step;
      let dirX = player.facingX || 1;
      let dirY = player.facingY || 0;
      if (lockTarget) {
        const dx = lockTarget.x - player.x;
        const dy = lockTarget.y - player.y;
        const dist = Math.hypot(dx, dy) || 1;
        dirX = dx / dist;
        dirY = dy / dist;
      }
      const dirLen = Math.hypot(dirX, dirY) || 1;
      dirX /= dirLen;
      dirY /= dirLen;
      player.facingX = dirX;
      player.facingY = dirY;
      const dashMag = step === BASIC_COMBO_MAX ? 3.2 : (2.4 + step * 0.4);
      player.attackDashX = dirX * dashMag;
      player.attackDashY = dirY * dashMag;
      playerOffenseTimer = Math.max(playerOffenseTimer, 10 + step * 2);

      const atk = {
        type: 'basic',
        x: player.x + dirX * (range * 0.6),
        y: player.y + dirY * (range * 0.6),
        r: radius,
        damage: dmg,
        knockback: knock,
        frames: 10,
        hitIds: new Set(),
        hitStop: hitStopPower,
        hitstun,
        finisher: step === BASIC_COMBO_MAX
      };
      attacks.push(atk);
      const facing = (dirX || player.facingX || 1) >= 0 ? 1 : -1;
      const slashPalette = step === BASIC_COMBO_MAX ? FX_PALETTES.shock : FX_PALETTES.slash;
      const stepColor = resolveFxColor(slashPalette, step === BASIC_COMBO_MAX ? '#fff2a6' : '#aee7ff');
      const stepAccent = resolveFxColor(slashPalette, stepColor);
      effects.push({
        type: 'slash',
        x: player.x,
        y: player.y,
        life: 12 + step * 2,
        maxLife: 12 + step * 2,
        r: radius,
        facing,
        color: stepColor,
        accent: stepAccent,
        angle: -0.35 + step * 0.08,
        stretch: 1.05 + step * 0.05,
        seed: Math.random() * 10
      });
      spawnSparks(player.x + dirX * 12, player.y + dirY * 12, 6 + step * 2, slashPalette, Math.PI * 0.8, 4.5, 12 + step * 2);
      spawnShockwave(player.x + dirX * 18, player.y + dirY * 18, stepAccent);
      if (step === BASIC_COMBO_MAX) {
        effects.push({ type: 'ring', x: player.x + dirX * 24, y: player.y + dirY * 24, life: 16, maxLife: 16, r: 65, color: stepAccent });
        screenFlash = Math.max(screenFlash, 0.22);
        screenShake += 2.2;
      }
      rumble(0.28, 90, 0.22);
      playSfx('basic');
    }

    function tryBasicAttack() {
      if (player.guardSuccessTimer > 0) {
        if (startCounterAttack()) return;
      }
      if (player.counterActive) return;
      if (basicComboCooldown > 0) return;
      if (player.attackTimer > 0) {
        if (basicComboTimer > 0 && basicComboStep > 0 && basicComboStep < BASIC_COMBO_MAX) {
          basicChainQueued = true;
        }
        return;
      }
      basicChainQueued = false;
      spawnBasicAttack();
    }

    function findNextReadyCommandSteps() {
      const deckLen = commandDeck.length;
      if (deckLen <= 1) return 0;
      for (let i = 1; i < deckLen; i++) {
        const idx = (COMMAND_ACTIVE_INDEX + i + deckLen) % deckLen;
        const nextCmd = commandDeck[idx];
        if (nextCmd && nextCmd.timer <= 0) return i;
      }
      return 0;
    }

    function tryUseCommand() {
      if (commandRotateFrames > 0) return;
      const cmd = commandDeck[COMMAND_ACTIVE_INDEX] || commandDeck[0];
      if (cmd.timer > 0) return;
      spawnAttack(cmd);
      cmd.timer = cmd.cooldown;
      const steps = findNextReadyCommandSteps();
      triggerDeckRotate(1, steps > 0 ? steps : 1);
    }

    function tryGuard() {
      if (!player.onGround) return false;
      if (player.guardCooldown > 0 || player.guardTimer > 0) return false;
      if (player.attackTimer > 0 || player.dodgeTimer > 0) return false;
      player.guardTimer = GUARD_DURATION;
      player.guardTimerMax = GUARD_DURATION;
      player.guardCooldown = GUARD_COOLDOWN;
      player.guardSpin = Math.random() * Math.PI * 2;
      player.guardFlash = 6;
      player.guardColor = resolveFxColor(FX_PALETTES.guard, '#7ee5ff');
      effects.push({ type: 'ring', x: player.x, y: player.y, life: 18, maxLife: 18, r: 100, color: player.guardColor });
      effects.push({ type: 'impact', x: player.x, y: player.y, life: 14, maxLife: 14, r: 52, color: '#ffffff' });
      spawnSparks(player.x, player.y, 12, [player.guardColor, '#ffffff'], Math.PI * 2, 7, 18);
      rumble(0.25, 80, 0.18);
      playSfx('guardStart');
      return true;
    }

    function tryDodge(dirX, dirY) {
      if (!player.onGround) return false;
      if (player.dodgeCooldown > 0 || player.dodgeTimer > 0) return false;
      player.dodgeTimer = 18;
      player.dodgeTimerMax = player.dodgeTimer;
      player.dodgeCooldown = 45;
      player.dodgeDirX = dirX;
      player.dodgeDirY = dirY;
      player.dodgeSpeed = PLAYER_DODGE_SPEED;
      player.dodgeColor = resolveFxColor(FX_PALETTES.dodge, '#aee7ff');
      player.invuln = Math.max(player.invuln, 22);
      player.vx += dirX * PLAYER_DODGE_BOOST;
      player.vy += dirY * PLAYER_DODGE_BOOST;
      effects.push({ type: 'dash', x: player.x, y: player.y, life: 16, maxLife: 16, color: player.dodgeColor, len: 220, angle: Math.atan2(dirY, dirX) });
      spawnShockwave(player.x + dirX * 12, player.y + dirY * 12, player.dodgeColor);
      spawnSparks(player.x, player.y, 16, FX_PALETTES.dodge, Math.PI, 6, 16);
      screenShake += 2.4;
      rumble(0.28, 90, 0.22);
      playSfx('dodge');
      return true;
    }

    function startCounterAttack() {
      if (player.guardSuccessTimer <= 0 || player.counterActive) return false;
      player.guardSuccessTimer = 0;
      player.guardTimer = 0;
      player.guardFlash = 0;
      player.counterActive = true;
      player.counterTimer = COUNTER_WINDOW;
      player.counterHitIndex = 0;
      player.counterHitDelay = 8;
      player.counterTarget = player.counterTarget || findNearestEnemy(COUNTER_TRACK_RANGE, true);
      player.attackTimer = 0;
      player.attackType = '';
      player.attackDashX = 0;
      player.attackDashY = 0;
      player.slamActive = false;
      playerOffenseTimer = Math.max(playerOffenseTimer, player.counterTimer);
      player.invuln = Math.max(player.invuln, 10);
      return true;
    }

    function endCounterAttack() {
      player.counterActive = false;
      player.counterTimer = 0;
      player.counterHitIndex = 0;
      player.counterHitDelay = 0;
      player.counterTarget = null;
      player.counterFlash = 0;
      playerOffenseTimer = 0;
    }

    function spawnCounterHit(target) {
      if (!target || target.hp <= 0) return;
      const hitIndex = player.counterHitIndex + 1;
      const dirX = target.x >= player.x ? 1 : -1;
      const baseX = target.x;
      const baseY = target.y;
      const radius = 120 + hitIndex * 6;
      const damage = 14 + hitIndex * 3;
      const knock = hitIndex === COUNTER_HIT_COUNT ? 14 : 6;
      attacks.push({
        x: baseX,
        y: baseY,
        r: radius,
        damage,
        frames: 8,
        knockback: knock,
        hitStop: hitIndex === COUNTER_HIT_COUNT ? 4 : 3,
        hitstun: 14 + hitIndex,
        finisher: hitIndex === COUNTER_HIT_COUNT,
        hitIds: new Set()
      });
      const counterColor = resolveFxColor(FX_PALETTES.guard, '#a6f0ff');
      const counterAccent = '#ffffff';
      effects.push({
        type: 'slash',
        x: baseX,
        y: baseY,
        life: 16,
        maxLife: 16,
        r: radius * 1.15,
        facing: dirX,
        color: counterColor,
        accent: counterAccent,
        angle: -0.75 + hitIndex * 0.08,
        stretch: 1.25,
        seed: Math.random() * 10
      });
      effects.push({ type: 'ring', x: baseX, y: baseY, life: 16, maxLife: 16, r: 70 + hitIndex * 8, color: counterAccent, width: 3, glow: true });
      effects.push({ type: 'guardPulse', x: baseX, y: baseY, life: 12, maxLife: 12, r: 90 + hitIndex * 6, color: counterColor });
      spawnSparks(baseX, baseY, 14 + hitIndex * 2, [counterColor, '#ffffff'], Math.PI * 2, 8, 18);
      spawnShockwave(baseX, baseY, counterColor);
      screenShake += hitIndex === COUNTER_HIT_COUNT ? 2.6 : 1.6;
      screenFlash = Math.max(screenFlash, hitIndex === COUNTER_HIT_COUNT ? 0.28 : 0.18);
      if (hitIndex === COUNTER_HIT_COUNT) {
        rumble(0.6, 160, 0.35);
      } else {
        rumble(0.35, 100, 0.25);
      }
      playSfx('slash');
      player.scaleVelX -= 0.12;
      player.scaleVelY += 0.12;
      player.counterFlash = Math.max(player.counterFlash, 12);
      player.counterHitIndex++;
      player.counterHitDelay = COUNTER_HIT_INTERVAL;
      player.invuln = Math.max(player.invuln, 10);
      if (player.counterHitIndex >= COUNTER_HIT_COUNT) {
        endCounterAttack();
      }
    }

    function updateCounterAttack(step) {
      if (!player.counterActive) return;
      if (player.counterTimer > 0) player.counterTimer -= step;
      if (player.counterFlash > 0) player.counterFlash -= step;
      if (!player.counterTarget || player.counterTarget.hp <= 0) {
        player.counterTarget = findNearestEnemy(COUNTER_TRACK_RANGE, true);
      }
      const target = player.counterTarget;
      if (!target) {
        endCounterAttack();
        return;
      }
      const dirX = target.x >= player.x ? 1 : -1;
      player.facingX = dirX;
      player.facingY = 0;
      const desiredX = target.x - dirX * 90;
      const desiredY = target.y;
      const nextX = player.x + (desiredX - player.x) * 0.35;
      if (!checkCollision(nextX, player.y, player.radius, player.z)) {
        player.x = nextX;
      }
      const nextY = player.y + (desiredY - player.y) * 0.25;
      if (!checkCollision(player.x, nextY, player.radius, player.z)) {
        player.y = nextY;
      }
      resolveCounterStuck();
      player.vx *= 0.35;
      player.vy *= 0.35;
      player.scaleVelX += dirX * 0.08;
      player.scaleVelY -= 0.06;
      player.renderRot += 0.45 * step;

      if (Math.random() < 0.7) {
        effects.push({ type: 'afterimage', x: player.x, y: player.y, life: 10, maxLife: 10, color: '#e8f7ff', scale: 1.35 });
      }
      if (stageTime % 3 === 0) {
        spawnSparks(player.x, player.y, 4, ['#ffffff', '#a6f0ff'], Math.PI * 2, 4.5, 10);
      }

      if (player.counterHitDelay > 0) player.counterHitDelay -= step;
      if (player.counterHitDelay <= 0) {
        spawnCounterHit(target);
      }
      if (!player.counterActive) return;
      if (player.counterTimer <= 0) {
        endCounterAttack();
      }
    }

    function resolveCounterStuck() {
      if (!checkCollision(player.x, player.y, player.radius, player.z)) return;
      const baseAngle = stageTime * 0.2;
      for (let r = 6; r <= 48; r += 6) {
        for (let i = 0; i < 12; i++) {
          const ang = baseAngle + (Math.PI * 2 * i) / 12;
          const nx = player.x + Math.cos(ang) * r;
          const ny = player.y + Math.sin(ang) * r;
          if (!checkCollision(nx, ny, player.radius, player.z)) {
            player.x = nx;
            player.y = ny;
            return;
          }
        }
      }
    }

    function spawnAttack(cmd) {
      basicChainQueued = false;
      if (basicComboStep > 0) {
        basicComboTimer = Math.max(basicComboTimer, 30);
      }
      const lockTarget = lockOnActive ? lockOnTarget : softLockTarget;
      let dirX = player.facingX || 1;
      let dirY = player.facingY || 0;
      if (lockTarget) {
        const dx = lockTarget.x - player.x;
        const dy = lockTarget.y - player.y;
        const dist = Math.hypot(dx, dy) || 1;
        dirX = dx / dist;
        dirY = dy / dist;
      }
      const dirLen = Math.hypot(dirX, dirY) || 1;
      dirX /= dirLen;
      dirY /= dirLen;
      player.facingX = dirX;
      player.facingY = dirY;
      const baseX = player.x;
      const baseY = player.y;
      const facing = dirX >= 0 ? 1 : -1;

      let comboStep = 1;
      if (cmd.type === 'slash') {
        if (slashComboTimer > 0) slashComboStep = (slashComboStep % 3) + 1;

        slashComboTimer = 0;

      if (cmd.type === 'heal') {

        effects.push({ type: 'fireburst', x: baseX + dirX * 36, y: baseY + dirY * 36, life: 20, maxLife: 20, r: cmd.radius * 1.6, color: fireColor, accent: fireAccent });
        effects.push({ type: 'ring', x: baseX + dirX * 28, y: baseY + dirY * 28, life: 18, maxLife: 18, r: cmd.radius * 1.2, color: fireAccent });
        effects.push({ type: 'ring', x: baseX + dirX * 28, y: baseY + dirY * 28, life: 14, maxLife: 14, r: cmd.radius * 0.8, color: fireColor });
        spawnShockwave(baseX + dirX * 18, baseY + dirY * 18, fireAccent);
        spawnShockwave(baseX + dirX * 26, baseY + dirY * 26, fireColor);

          });

        effects.push({ type: 'ring', x: baseX, y: baseY, life: 16, maxLife: 16, r: cmd.radius * 0.7, color: aeroAccent });

        for (let i = 0; i < hits; i++) {
          attacks.push({
            x: baseX + dirX * (cmd.range + i * 12),
            y: baseY + dirY * (cmd.range + i * 12),
            r: cmd.radius,
            damage: cmd.damage,
            frames: 10 + i * 2,
            delay: i * 2,
            knockback: i === hits - 1 ? cmd.knockback + 8 : cmd.knockback,
            hitStop: i === hits - 1 ? 3 : 1,
            hitstun: i === hits - 1 ? 18 : 12,
            finisher: i === hits - 1,
            hitIds: new Set()
          });
        }
        effects.push({ type: 'slash', x: baseX + dirX * 90, y: baseY + dirY * 90, life: 18, maxLife: 18, r: 140, facing, color: rushColor, accent: rushAccent, angle: -0.32, stretch: 1.3, seed: Math.random() * 10, delay: 2 });
        spawnSparks(baseX + dirX * 100, baseY + dirY * 100, 14, rushPalette, Math.PI, 7, 18);
        spawnShockwave(baseX + dirX * 80, baseY + dirY * 80, rushAccent);
        effects.push({ type: 'dash', x: baseX, y: baseY, life: 16, maxLife: 16, color: rushColor, accent: rushAccent, len: 190, angle: Math.atan2(dirY, dirX) });
        player.vx += dirX * 1.5;
        player.vy += dirY * 1.5;
        screenShake += 2.6;
        screenFlash = Math.max(screenFlash, 0.22);
        rumble(0.42, 110, 0.3);
        playSfx('rush');
        return;
      }

      if (cmd.type === 'spin') {
        player.attackTimer = 28;
        player.attackTimerMax = player.attackTimer;
        player.attackType = 'spin';
        player.attackDashX = 0;
        player.attackDashY = 0;
        playerOffenseTimer = Math.max(playerOffenseTimer, 22);
        const spinPalette = FX_PALETTES.spin;
        const spinColor = resolveFxColor(spinPalette, '#e2a6ff');
        const spinAccent = resolveFxColor(spinPalette, spinColor);
        attacks.push({
          x: baseX,
          y: baseY,
          r: cmd.radius,
          damage: cmd.damage,
          frames: 14,
          knockback: cmd.knockback,
          hitStop: 3,
          hitstun: 16,
          finisher: true,
          hitIds: new Set()
        });
        attacks.push({
          x: baseX,
          y: baseY,
          r: cmd.radius * 0.9,
          damage: Math.floor(cmd.damage * 0.7),
          frames: 12,
          delay: 8,
          knockback: cmd.knockback,
          hitStop: 2,
          hitstun: 14,
          finisher: true,
          hitIds: new Set()
        });
        effects.push({ type: 'spin', x: baseX, y: baseY, life: 24, maxLife: 24, r: cmd.radius, color: spinColor, accent: spinAccent, spin: 0.2, blades: 5 });
        effects.push({ type: 'ring', x: baseX, y: baseY, life: 16, maxLife: 16, r: cmd.radius * 0.55, color: spinAccent });
        spawnShockwave(baseX, baseY, spinAccent);
        spawnSparks(baseX, baseY, 26, spinPalette, Math.PI * 2, 8, 22);
        screenShake += 4.2;
        screenFlash = Math.max(screenFlash, 0.32);
        rumble(0.58, 150, 0.4);
        playSfx('spin');
        return;
      }

      // Slash combo
      let dmg = cmd.damage;
      let radius = cmd.radius;
      let range = cmd.range;
      let knock = cmd.knockback;
      let hitStopPower = 2;
      let hitstun = 12;
      if (comboStep === 2) {
        dmg += 4;
        radius += 20;
        knock += 3;
        hitStopPower = 3;
        hitstun = 14;
      } else if (comboStep === 3) {
        dmg += 8;
        radius += 30;
        range += 20;
        knock += 6;
        hitStopPower = 4;
        hitstun = 18;
      }

      player.attackTimer = 14 + comboStep * 2;
      player.attackTimerMax = player.attackTimer;
      player.attackType = 'slash';
      player.attackDashX = dirX * (2.4 + comboStep * 0.6);
      player.attackDashY = dirY * (2.4 + comboStep * 0.6);
      playerOffenseTimer = Math.max(playerOffenseTimer, 12 + comboStep * 2);
      const slashPalette = cmd.color ? [cmd.color, ...FX_PALETTES.slash] : FX_PALETTES.slash;
      const slashColor = resolveFxColor(slashPalette, cmd.color || '#ffc46b');
      const slashAccent = resolveFxColor(slashPalette, slashColor);
      attacks.push({
        x: baseX + dirX * range,
        y: baseY + dirY * range,
        r: radius,
        damage: dmg,
        frames: 12,
        knockback: knock,
        hitStop: hitStopPower,
        hitstun,
        finisher: comboStep === 3,
        hitIds: new Set()
      });
      effects.push({ type: 'slash', x: baseX + dirX * range, y: baseY + dirY * range, life: 18, maxLife: 18, r: radius * 1.1, facing, color: slashColor, accent: slashAccent, angle: -0.35 + comboStep * 0.1, stretch: 1.2 + comboStep * 0.08, seed: Math.random() * 10 });
      effects.push({ type: 'ring', x: baseX + dirX * range, y: baseY + dirY * range, life: 16, maxLife: 16, r: radius * 0.7, color: slashAccent });
      spawnShockwave(baseX + dirX * (range * 0.6), baseY + dirY * (range * 0.6), slashAccent);
      spawnSparks(baseX + dirX * (range * 0.8), baseY + dirY * (range * 0.8), 18, slashPalette, Math.PI * 2, 7, 20);
      screenShake += comboStep === 3 ? 3.2 : 2.0;
      screenFlash = Math.max(screenFlash, comboStep === 3 ? 0.26 : 0.18);
      rumble(comboStep === 3 ? 0.5 : 0.35, comboStep === 3 ? 140 : 100, comboStep === 3 ? 0.35 : 0.25);
      playSfx('slash');
    }

    function updateAttacks(step) {
      for (let atk of attacks) {
        if (atk.delay && atk.delay > 0) {
          atk.delay -= step;
          continue;
        }
        if (atk.follow) {
          atk.x = player.x;
          atk.y = player.y;
        }
        if (atk.type === 'projectile') {
          if (atk.target && atk.target.hp <= 0) atk.target = null;
          if (!atk.target) {
            atk.target = findNearestEnemyTo(atk.x, atk.y, atk.seekRange || 360);
          }
          if (atk.target) {
            const tx = atk.target.x;
            const ty = atk.target.y;
            const desired = Math.atan2(ty - atk.y, tx - atk.x);
            const ang = Math.atan2(atk.vy, atk.vx);
            const diff = normalizeAngle(desired - ang);
            const turn = atk.turn || 0.12;
            const speed = Math.hypot(atk.vx, atk.vy) || 7;
            const nextAng = ang + diff * turn;
            atk.vx = Math.cos(nextAng) * speed;
            atk.vy = Math.sin(nextAng) * speed;
          }
          atk.x += atk.vx * step;
          atk.y += atk.vy * step;
          const trailDensity = getFxDensity();
          const trailChance = 0.5 * trailDensity + 0.05;
          if (trailDensity > 0 && Math.random() < trailChance && consumeFxBudget()) {
            const trailColor = atk.accent || atk.color || (atk.visual === 'fire' ? '#ffb067' : (atk.visual === 'ice' ? '#cfefff' : '#bfe7ff'));
            effects.push({ type: 'spark', x: atk.x + (Math.random() - 0.5) * 6, y: atk.y + (Math.random() - 0.5) * 6, life: 10, maxLife: 10, color: trailColor, size: 2 + Math.random() * 2 });
          }
        }
        if (atk.multi && atk.frames % 6 === 0) {
          atk.hitIds.clear();
        }
        for (let e of enemies) {
          if (e.hp <= 0) continue;
          if (atk.hitIds.has(e.id)) continue;
          const dx = e.x - atk.x;
          const dy = e.y - atk.y;
          const dist = Math.hypot(dx, dy);
          const hitRadius = (atk.r || 0) * ATTACK_RADIUS_SCALE;
          if (dist <= hitRadius + ENEMY_HIT_RADIUS) {
            damageEnemy(e, atk);
            atk.hitIds.add(e.id);
            if (atk.type === 'projectile') {
              const hitColor = atk.accent || atk.color || '#bfe7ff';
              effects.push({ type: 'impact', x: atk.x, y: atk.y, life: 12, maxLife: 12, r: 40, color: hitColor });
              effects.push({ type: 'ring', x: atk.x, y: atk.y, life: 12, maxLife: 12, r: 30, color: hitColor });
              atk.frames = 0;
              break;
            }
          }
        }
        atk.frames -= step;
      }
      attacks = attacks.filter(a => a.frames > 0);
    }

    function normalizeAngle(a) {
      while (a > Math.PI) a -= Math.PI * 2;
      while (a < -Math.PI) a += Math.PI * 2;
      return a;
    }

    function findNearestEnemyTo(x, y, maxRange) {
      let best = null;
      let bestScore = maxRange;
      for (let e of enemies) {
        if (e.hp <= 0) continue;
        const dist = Math.hypot(e.x - x, e.y - y);
        if (dist > maxRange) continue;
        if (dist < bestScore) {
          bestScore = dist;
          best = e;
        }
      }
      return best;
    }

    function findNearestEnemy(maxRange, preferFront = false) {
      let best = null;
      let bestScore = maxRange;
      const px = player.x;
      const py = player.y;
      const facingX = player.facingX || 1;
      const facingY = player.facingY || 0;
      for (let e of enemies) {
        if (e.hp <= 0) continue;
        const dx = e.x - px;
        const dy = e.y - py;
        const dist = Math.hypot(dx, dy);
        if (dist > maxRange) continue;
        let score = dist;
        if (preferFront && (dx * facingX + dy * facingY) < 0) score += 120;
        if (score < bestScore) {
          bestScore = score;
          best = e;
        }
      }
      return best;
    }

    function updateLockTargets() {
      softLockTarget = findNearestEnemy(SOFT_LOCK_RANGE, true);
      if (lockOnActive) {
        if (!lockOnTarget || lockOnTarget.hp <= 0) {
          lockOnActive = false;
          lockOnTarget = null;
        } else {
          const dist = Math.hypot(lockOnTarget.x - player.x, lockOnTarget.y - player.y);
          if (dist > LOCK_BREAK_RANGE) {
            lockOnActive = false;
            lockOnTarget = null;
            playSfx('lockoff');
          }
        }
      }
    }

    function toggleLockOn() {
      if (lockOnActive) {
        lockOnActive = false;
        lockOnTarget = null;
        playSfx('lockoff');
        return;
      }
      const target = findNearestEnemy(LOCK_RANGE, false);
      if (target) {
        lockOnActive = true;
        lockOnTarget = target;
        playSfx('lockon');
      } else {
        playSfx('lockfail');
      }
    }

    function updateEffects(step) {
      for (let fx of effects) {
        if (fx.delay && fx.delay > 0) {
          fx.delay -= step;
          continue;
        }
        fx.life -= step;
        if (fx.vx || fx.vy) {
          fx.x += (fx.vx || 0) * step;
          fx.y += (fx.vy || 0) * step;
          if (fx.vx) fx.vx *= 0.9;
          if (fx.vy) fx.vy *= 0.9;
        }
        if (fx.grow) fx.r += fx.grow * step;
      }
      effects = effects.filter(fx => fx.life > 0);
    }

    function getDepthScale(origin) {
      const perspScale = Math.max(0.2, Math.min(2.2, PERSPECTIVE_FOV / Math.max(PERSPECTIVE_NEAR, origin.cz)));
      return lerp(1, perspScale, perspectiveMix);
    }

    function drawPuddingCoin(ctx, x, y, r, spin, options = {}) {
      const shadow = options.shadow !== false;
      const pulse = 0.5 + 0.5 * Math.sin(stageTime * 0.12 + (options.pulsePhase || 0));
      const tilt = Math.cos(spin || 0);
      const scaleX = 0.35 + 0.65 * Math.abs(tilt);
      const shine = 0.55 + 0.45 * Math.max(0, tilt);

      if (shadow) {
        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(x, y + r * 0.78, r * 0.9, r * 0.28, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scaleX, 1);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const glow = ctx.createRadialGradient(0, -r * 0.2, r * 0.2, 0, 0, r * 1.6);
      glow.addColorStop(0, `rgba(255,245,200,${0.6 * shine})`);
      glow.addColorStop(0.4, `rgba(255,210,130,${0.35 * shine})`);
      glow.addColorStop(1, 'rgba(255,200,120,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 1.6, r * 1.15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const topW = r * 1.1;
      const botW = r * 2.0;
      const h = r * 1.35;
      const grad = ctx.createLinearGradient(-r, -h, r, h);
      grad.addColorStop(0, '#fff7d6');
      grad.addColorStop(0.35, '#ffd98a');
      grad.addColorStop(0.65, '#d2a258');
      grad.addColorStop(1, '#8b5d20');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(-topW / 2, -h * 0.55);
      ctx.lineTo(topW / 2, -h * 0.55);
      ctx.lineTo(botW / 2, h * 0.45);
      ctx.quadraticCurveTo(0, h * 0.7, -botW / 2, h * 0.45);
      ctx.closePath();
      ctx.fill();

      ctx.lineWidth = 2.2;
      ctx.strokeStyle = `rgba(255,255,255,${0.55 + 0.2 * shine})`;
      ctx.stroke();

      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      ctx.strokeStyle = `rgba(255,255,255,${0.22 + 0.18 * pulse})`;
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const yy = -h * 0.25 + i * (h * 0.25);
        ctx.beginPath();
        ctx.moveTo(-topW * 0.45, yy);
        ctx.lineTo(topW * 0.45, yy);
        ctx.stroke();
      }
      ctx.restore();

      const iconW = r * 1.1;
      const iconH = r * 0.9;
      const iconTop = iconW * 0.5;
      const iconBot = iconW * 0.95;
      const drawIcon = (dx, dy, fill, mode = 'source-over') => {
        ctx.save();
        ctx.translate(dx, dy);
        ctx.globalCompositeOperation = mode;
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.moveTo(-iconTop / 2, -iconH * 0.45);
        ctx.lineTo(iconTop / 2, -iconH * 0.45);
        ctx.lineTo(iconBot / 2, iconH * 0.4);
        ctx.quadraticCurveTo(0, iconH * 0.62, -iconBot / 2, iconH * 0.4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      };
      drawIcon(1.2, 1.2, 'rgba(90,60,20,0.35)', 'multiply');
      drawIcon(-1.2, -1.2, `rgba(255,255,255,${0.5 * shine})`, 'screen');

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.strokeStyle = `rgba(255,255,255,${0.5 + 0.2 * pulse})`;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-r * 0.4, -h * 0.5);
      ctx.lineTo(r * 0.1, h * 0.5);
      ctx.stroke();
      ctx.restore();

      ctx.restore();
    }

    function drawEnemySprite(ctx, e) {
      const origin = isoScale(e.x, e.y, e.z || 0);
      if (clippedNear(origin.rawCz)) return;
      const depthScale = getDepthScale(origin);
      const scale = WORLD_DRAW_SCALE * depthScale;
      ctx.save();
      ctx.translate(origin.sx, origin.sy);

      // 影
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = '#1b1b1b';
      ctx.beginPath();
      ctx.ellipse(0, 2, e.width * 0.18 * scale, e.height * 0.06 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      const blink = e.invuln > 0 && Math.floor(e.invuln / 3) % 2 === 0;
      ctx.globalAlpha = blink ? 0.5 : 1.0;
      ctx.scale(scale, scale);
      ctx.translate(0, -e.height);

      const rX = e.width * 0.5;
      const rY = e.height * 0.45;
      const bodyY = e.height;

      const grad = ctx.createLinearGradient(0, bodyY - rY * 1.2, 0, bodyY + rY);
      grad.addColorStop(0, e.bodyTop || '#3b0f1a');
      grad.addColorStop(1, e.bodyBottom || '#120409');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, bodyY - rY, rX, rY, 0, 0, Math.PI * 2);
      ctx.fill();

      const accent = e.accent || e.eyeColor || '#ffffff';
      if (e.style === 'knight') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(accent, 0.9);
        ctx.fillRect(-rX * 0.65, bodyY - rY * 1.05, rX * 1.3, rY * 0.32);
        ctx.fillStyle = colorWithAlpha('#ffffff', 0.35);
        ctx.fillRect(-rX * 0.4, bodyY - rY * 0.86, rX * 0.8, rY * 0.12);
        ctx.fillStyle = colorWithAlpha(accent, 0.85);
        ctx.beginPath();
        ctx.moveTo(-rX * 0.6, bodyY - rY * 1.08);
        ctx.lineTo(-rX * 0.98, bodyY - rY * 1.42);
        ctx.lineTo(-rX * 0.38, bodyY - rY * 1.2);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(rX * 0.6, bodyY - rY * 1.08);
        ctx.lineTo(rX * 0.98, bodyY - rY * 1.42);
        ctx.lineTo(rX * 0.38, bodyY - rY * 1.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (e.style === 'mage') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(e.bodyBottom, 0.9);
        ctx.beginPath();
        ctx.moveTo(-rX * 0.9, bodyY - rY * 0.2);
        ctx.lineTo(0, bodyY + rY * 0.9);
        ctx.lineTo(rX * 0.9, bodyY - rY * 0.2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = colorWithAlpha(accent, 0.85);
        ctx.beginPath();
        ctx.arc(0, bodyY - rY * 1.05, rX * 0.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (e.style === 'stalker') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(accent, 0.85);
        for (let i = 0; i < 4; i++) {
          const sx = -rX * 0.7 + i * (rX * 0.45);
          const sy = bodyY - rY * 1.15;
          ctx.beginPath();
          ctx.moveTo(sx, sy + 8);
          ctx.lineTo(sx + 12, sy - 12);
          ctx.lineTo(sx + 24, sy + 8);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      } else if (e.style === 'brute') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(accent, 0.8);
        ctx.fillRect(-rX * 0.95, bodyY - rY * 0.7, rX * 0.42, rY * 0.35);
        ctx.fillRect(rX * 0.53, bodyY - rY * 0.7, rX * 0.42, rY * 0.35);
        ctx.restore();
      } else if (e.style === 'scout') {
        ctx.save();
        ctx.strokeStyle = colorWithAlpha(accent, 0.7);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-rX * 0.2, bodyY - rY * 1.05);
        ctx.lineTo(-rX * 0.35, bodyY - rY * 1.35);
        ctx.moveTo(rX * 0.2, bodyY - rY * 1.05);
        ctx.lineTo(rX * 0.35, bodyY - rY * 1.35);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = e.eyeColor || '#ff4d6d';
      ctx.beginPath();
      ctx.arc(-14, bodyY - rY - 8, 5, 0, Math.PI * 2);
      ctx.arc(14, bodyY - rY - 6, 4, 0, Math.PI * 2);
      ctx.fill();

      if (e.attackState === 'windup') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = 'rgba(255, 80, 80, 0.35)';
        ctx.beginPath();
        ctx.ellipse(0, bodyY - rY, rX * 0.9, rY * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const hpRatio = Math.max(0, e.hpDisplay / e.maxHp);
      const lagRatio = Math.max(0, e.hpLag / e.maxHp);
      const barW = 64;
      const barH = 6;
      const barX = -barW / 2;
      const barY = bodyY - rY - 26;
      drawKhHpBar(ctx, barX, barY, barW, barH, hpRatio, lagRatio, {
        radius: 3,
        pad: 1,
        ticks: false,
        sheen: false,
        alpha: 0.9
      });

      ctx.restore();
    }

    function drawProjectileSprite(ctx, atk) {
      if (atk.delay && atk.delay > 0) return;
      const origin = isoScale(atk.x, atk.y, 0);
      if (clippedNear(origin.rawCz)) return;
      const depthScale = getDepthScale(origin);
      const scale = WORLD_DRAW_SCALE * depthScale;
      const t = atk.maxFrames ? (atk.frames / atk.maxFrames) : 1;
      const ang = Math.atan2(atk.vy || 0, atk.vx || 1);
      const s = scale * 3.2;
      ctx.save();
      ctx.translate(origin.sx, origin.sy);
      ctx.rotate(ang);
      ctx.globalCompositeOperation = 'lighter';
      if (atk.visual === 'fire') {
        const main = atk.color || '#ffb067';
        const accent = atk.accent || '#ffd36b';
        const coreR = Math.max(10 * s, (atk.r || 40) * 0.12 * s);
        const glowR = coreR * 1.45;
        const glow = ctx.createRadialGradient(0, 0, 2 * s, 0, 0, glowR);
        glow.addColorStop(0, colorWithAlpha(accent, 1 * t));
        glow.addColorStop(1, colorWithAlpha(main, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, glowR, 0, Math.PI * 2);
        ctx.fill();
        const tailLen = coreR * 2.2;
        const tail = ctx.createLinearGradient(-tailLen, 0, 0, 0);
        tail.addColorStop(0, colorWithAlpha(main, 0));
        tail.addColorStop(1, colorWithAlpha(main, 0.95 * t));
        ctx.strokeStyle = tail;
        ctx.lineWidth = Math.max(1, 4.5 * s + coreR * 0.12);
        ctx.beginPath();
        ctx.moveTo(-tailLen * 0.9, 0);
        ctx.lineTo(2 * s, 0);
        ctx.stroke();
        ctx.fillStyle = colorWithAlpha(accent, 0.95 * t);
        ctx.beginPath();
        ctx.ellipse(3 * s, 0, coreR * 0.55, coreR * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (atk.visual === 'ice') {
        const main = atk.color || '#bfefff';
        const accent = atk.accent || '#e6fbff';
        const glow = ctx.createRadialGradient(0, 0, 2 * s, 0, 0, 16 * s);
        glow.addColorStop(0, colorWithAlpha(accent, 1 * t));
        glow.addColorStop(1, colorWithAlpha(main, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 14 * s, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = colorWithAlpha(main, 1 * t);
        ctx.beginPath();
        ctx.moveTo(-6 * s, 0);
        ctx.lineTo(0, -5 * s);
        ctx.lineTo(10 * s, 0);

        for (let i = 0; i <= steps; i++) {
          const p = i / steps;
          const ang = start + (endReveal - start) * p;
          const r = (outerBase + innerBase) * 0.55;
          const x = Math.cos(ang) * r;
          const y = Math.sin(ang) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.strokeStyle = colorWithAlpha(accent, 0.6 * t);
        ctx.lineWidth = Math.max(1, 1.6 * scale);
        for (let i = 0; i < 4; i++) {
          const p = (i + 1) / 5;
          const ang = start + (endReveal - start) * p;
          const r = outerBase * (0.68 + 0.18 * Math.sin(Math.PI * p));
          const len = (16 + (Math.sin(seed * 3 + i) + 1) * 7) * scale;
          ctx.beginPath();
          ctx.moveTo(Math.cos(ang) * (r - 10 * scale), Math.sin(ang) * (r - 10 * scale));
          ctx.lineTo(Math.cos(ang) * (r + len), Math.sin(ang) * (r + len));
          ctx.stroke();
        }
      } else if (fx.type === 'afterimage') {
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t * 0.8;
        ctx.fillStyle = fx.color || '#b9f1ff';
        const sc = fx.scale || 1;
        ctx.beginPath();
        ctx.ellipse(0, -40 * scale, 40 * sc * scale, 24 * sc * scale, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCoinCounter(ctx, cw, ch) {
      const panelW = 140;
      const panelH = 40;
      const x = 20;
      const y = 20;
      const pulse = coinPulse;

      ctx.save();
      drawRoundedRect(ctx, x, y, panelW, panelH, 10);
      const glassGrad = ctx.createLinearGradient(x, y, x, y + panelH);
      glassGrad.addColorStop(0, `rgba(255,255,255,${0.18 + 0.15 * pulse})`);
      glassGrad.addColorStop(1, 'rgba(255,255,255,0.06)');
      ctx.fillStyle = glassGrad;
      ctx.fill();
      ctx.strokeStyle = `rgba(255,255,255,${0.35 + 0.2 * pulse})`;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      ctx.save();
      drawPuddingCoin(ctx, x + 24, y + panelH / 2 + 1, 16, stageTime * 0.08, { shadow: false, pulsePhase: 1.2 });
      ctx.font = '600 16px Orbitron, sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#000000';
      ctx.fillText(`x${coinCount}`, x + 58, y + panelH / 2 + 1);
      ctx.restore();
    }

    function drawCommandDeck(ctx, cw, ch) {
      const slotW = 150;
      const slotH = COMMAND_SLOT_H;
      const slotGap = COMMAND_SLOT_GAP;
      const paddingX = 12;
      const paddingY = 12;
      const listH = slotH * 3 + slotGap * 2;
      const panelW = slotW + paddingX * 2;
      const panelH = listH + paddingY * 2;
      const deckX = 20;
      const deckY = ch - panelH - 20;
      const deckLen = commandDeck.length;
      const progress = commandRotateFrames > 0 ? (COMMAND_ROTATE_FRAMES - commandRotateFrames) / COMMAND_ROTATE_FRAMES : 0;
      const ease = progress * progress * (3 - 2 * progress);
      const offsetY = ease * (slotH + slotGap) * (commandRotateFrames > 0 ? commandRotateDir : 0);
      const pulse = 0.5 + 0.5 * Math.sin(stageTime * 0.08);

      ctx.save();
      ctx.textBaseline = 'middle';
      ctx.font = '12px Orbitron, sans-serif';

      drawRoundedRect(ctx, deckX, deckY, panelW, panelH, 10);
      const glassGrad = ctx.createLinearGradient(deckX, deckY, deckX, deckY + panelH);
      glassGrad.addColorStop(0, 'rgba(255,255,255,0.16)');
      glassGrad.addColorStop(1, 'rgba(255,255,255,0.04)');
      ctx.fillStyle = glassGrad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(180, 230, 255, 0.45)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.moveTo(deckX + 8, deckY + 8);
      ctx.lineTo(deckX + panelW - 8, deckY + 8);
      ctx.stroke();

      const listX = deckX + paddingX;
      const listY = deckY + paddingY;
      const listW = slotW;
      const listCenterY = listY + listH / 2 - slotH / 2;

      ctx.save();
      ctx.beginPath();
      ctx.rect(listX, listY, listW, listH);
      ctx.clip();

      for (let i = -1; i <= 1; i++) {
        if (deckLen <= 0) continue;
        const idx = (COMMAND_ACTIVE_INDEX + i + deckLen) % deckLen;
        const cmd = commandDeck[idx];
        const slide = offsetY / (slotH + slotGap);
        const depth = Math.abs(i - slide);
        const scale = 1 - Math.min(0.22, depth * 0.12);
        const y = listCenterY + i * (slotH + slotGap) - offsetY;
        const isSelected = i === 0;
        const w = (isSelected ? slotW + 12 : slotW) * scale;
        const h = (isSelected ? slotH + 6 : slotH) * scale;
        const x = listX + (slotW - w) / 2 + (isSelected ? -2 : 0);

        if (y < deckY - slotH * 2 || y > ch + slotH) continue;

        const glowAlpha = isSelected ? 0.18 + pulse * 0.25 : 0.05;
        ctx.globalAlpha = 0.85 - depth * 0.25;
        ctx.fillStyle = `rgba(100, 210, 255, ${glowAlpha})`;
        ctx.fillRect(x - 4, y - 4, w + 8, h + 8);

        const grad = ctx.createLinearGradient(x, y, x + w, y);
        grad.addColorStop(0, cmd.color);
        grad.addColorStop(1, '#111');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);

        if (cmd.timer > 0) {
          const coolRatio = cmd.timer / cmd.cooldown;
          ctx.fillStyle = `rgba(0,0,0,${0.4 + coolRatio * 0.4})`;
          ctx.fillRect(x, y, w, h);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(x, y + h - 4, w * (1 - coolRatio), 4);
        }

        ctx.strokeStyle = isSelected ? '#ffffff' : 'rgba(255,255,255,0.35)';
        ctx.lineWidth = isSelected ? 2 : 1;
        ctx.strokeRect(x, y, w, h);

        ctx.save();
        ctx.translate(x + 14, y + h / 2);
        ctx.fillStyle = '#ffffff';
        if (cmd.type === 'heal') {
          ctx.fillRect(-4, -10, 8, 20);
          ctx.fillRect(-10, -4, 20, 8);
        } else {
          ctx.beginPath();
          ctx.moveTo(-5, -9);
          ctx.lineTo(7, 0);
          ctx.lineTo(-5, 9);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();

        ctx.fillStyle = '#ffffff';
        ctx.font = isSelected ? '13px Orbitron, sans-serif' : '11px Orbitron, sans-serif';
        ctx.fillText(cmd.name, x + 30, y + h / 2);
      }

      ctx.restore();
      ctx.restore();
    }

    function drawKhHpBar(ctx, x, y, w, h, ratio, lagRatio, opts = {}) {
      const radius = opts.radius ?? Math.max(2.5, h * 0.5);
      const pad = opts.pad ?? Math.max(1, Math.floor(h * 0.22));
      const innerX = x + pad;
      const innerY = y + pad;
      const innerW = w - pad * 2;
      const innerH = h - pad * 2;
      if (innerW <= 1 || innerH <= 1) return;
      const innerR = Math.max(1, radius - pad);

      ctx.save();
      if (opts.alpha !== undefined) ctx.globalAlpha *= opts.alpha;

      const shellGrad = ctx.createLinearGradient(0, y, 0, y + h);
      shellGrad.addColorStop(0, HP_BAR_COLORS.shellTop);
      shellGrad.addColorStop(0.6, HP_BAR_COLORS.shellMid);
      shellGrad.addColorStop(1, HP_BAR_COLORS.shellBottom);
      ctx.fillStyle = shellGrad;
      drawRoundedRect(ctx, x, y, w, h, radius);
      ctx.fill();

      ctx.strokeStyle = HP_BAR_COLORS.border;
      ctx.lineWidth = 2;
      drawRoundedRect(ctx, x + 1, y + 1, w - 2, h - 2, Math.max(1, radius - 1));
      ctx.stroke();

      const trackGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
      trackGrad.addColorStop(0, HP_BAR_COLORS.trackTop);
      trackGrad.addColorStop(1, HP_BAR_COLORS.trackBottom);
      ctx.fillStyle = trackGrad;
      drawRoundedRect(ctx, innerX, innerY, innerW, innerH, innerR);
      ctx.fill();

      const lagW = Math.max(0, Math.min(innerW, innerW * lagRatio));
      if (lagW > 0.25) {
        const lagGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
        lagGrad.addColorStop(0, HP_BAR_COLORS.damageTop);
        lagGrad.addColorStop(1, HP_BAR_COLORS.damageBottom);
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.shadowColor = HP_BAR_COLORS.damageGlow;
        ctx.shadowBlur = 10;
        ctx.fillStyle = lagGrad;
        drawRoundedRect(ctx, innerX, innerY, lagW, innerH, innerR);
        ctx.fill();
        ctx.restore();
      }

      const hpW = Math.max(0, Math.min(innerW, innerW * ratio));
      if (hpW > 0.25) {
        const hpGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
        hpGrad.addColorStop(0, HP_BAR_COLORS.fillTop);
        hpGrad.addColorStop(1, HP_BAR_COLORS.fillBottom);
        ctx.save();
        ctx.shadowColor = HP_BAR_COLORS.fillGlow;
        ctx.shadowBlur = 8;
        ctx.fillStyle = hpGrad;
        drawRoundedRect(ctx, innerX, innerY, hpW, innerH, innerR);
        ctx.fill();
        ctx.restore();
      }

      if (opts.ticks !== false && innerW > 40) {
        ctx.save();
        drawRoundedRect(ctx, innerX, innerY, innerW, innerH, innerR);
        ctx.clip();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha *= 0.65;
        ctx.strokeStyle = HP_BAR_COLORS.tick;
        ctx.lineWidth = 1;
        ctx.beginPath();
        const segments = opts.segments || 12;
        const step = innerW / segments;
        for (let i = 1; i < segments; i++) {
          const tx = innerX + step * i;
          ctx.moveTo(tx, innerY + 0.5);
          ctx.lineTo(tx, innerY + innerH - 0.5);
        }
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore();
    }

    function drawHPGauge(ctx, cw, ch) {
      const barW = 240;
      const barH = 18;
      let x = cw - barW - 24;
      let y = ch - barH - 24;
      const hpRatio = Math.max(0, player.hpDisplay / player.maxHp);
      const lagRatio = Math.max(0, player.hpLag / player.maxHp);

      let shakeX = 0;
      if (hpUiShake > 0) {
        const t = hpUiShake / HP_SHAKE_FRAMES;
        const amp = 4 + 6 * t;
        shakeX = Math.sin(stageTime * 0.6) * amp;
      }
      x += shakeX;

      ctx.save();
      if (hpUiPulse > 0) {
        ctx.globalAlpha = Math.min(0.7, hpUiPulse);
        ctx.shadowColor = 'rgba(16, 168, 110, 0.6)';
        ctx.shadowBlur = 18;
        ctx.fillStyle = 'rgba(16, 168, 110, 0.18)';
        drawRoundedRect(ctx, x - 2, y - 2, barW + 4, barH + 4, 5);
        ctx.fill();
      }
      ctx.restore();

      drawKhHpBar(ctx, x, y, barW, barH, hpRatio, lagRatio, {
        radius: 4,
        pad: 2,
        ticks: false,
        segments: 12,
        sheen: false
      });
    }

    function drawCombo(ctx, cw, ch) {
      if (comboCount <= 1 || comboTimer <= 0) return;
      const alpha = Math.min(1, comboTimer / COMBO_WINDOW);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.font = '28px Orbitron, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillText(`COMBO x${comboCount}`, cw / 2, 70);
      ctx.font = '14px Orbitron, sans-serif';
      if (comboCount >= 3) {
        ctx.fillStyle = 'rgba(255, 220, 120, 0.95)';
        ctx.fillText('FINISHER READY', cw / 2, 92);
      } else {
        ctx.fillStyle = 'rgba(160, 220, 255, 0.9)';
        ctx.fillText('KEEP THE RHYTHM', cw / 2, 92);
      }
      ctx.restore();
      ctx.textAlign = 'left';
    }

    function drawLockOnMarker(ctx, target, strong) {
      if (!target || target.hp <= 0) return;
      const origin = isoScale(target.x, target.y, 30);
      if (clippedNear(origin.rawCz)) return;
      const depthScale = getDepthScale(origin);
      const baseR = (strong ? 42 : 30) * WORLD_DRAW_SCALE * depthScale;
      const pulse = Math.sin(stageTime * 0.12) * 2 * WORLD_DRAW_SCALE * depthScale;
      const r = baseR + pulse;
      const alpha = strong ? 0.9 : 0.45;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = strong ? `rgba(120,220,255,${alpha})` : `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = Math.max(1, (strong ? 2.4 : 1.4) * Math.max(0.8, depthScale));
      ctx.beginPath();
      ctx.arc(origin.sx, origin.sy, r + pulse, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(origin.sx, origin.sy - r * 0.42);
      ctx.lineTo(origin.sx + r * 0.42, origin.sy);
      ctx.lineTo(origin.sx, origin.sy + r * 0.42);
      ctx.lineTo(origin.sx - r * 0.42, origin.sy);
      ctx.closePath();
      ctx.stroke();

      const norm = strong ? 42 : 30;
      const scale = r / norm;
      const bracketR = r + (strong ? 6 : 5) * scale;
      const bracketLen = (strong ? 12 : 8) * scale;
      ctx.beginPath();
      ctx.moveTo(origin.sx + bracketR, origin.sy - bracketLen);
      ctx.lineTo(origin.sx + bracketR, origin.sy + bracketLen);
      ctx.moveTo(origin.sx - bracketR, origin.sy - bracketLen);
      ctx.lineTo(origin.sx - bracketR, origin.sy + bracketLen);
      ctx.moveTo(origin.sx - bracketLen, origin.sy - bracketR);
      ctx.lineTo(origin.sx + bracketLen, origin.sy - bracketR);
      ctx.moveTo(origin.sx - bracketLen, origin.sy + bracketR);
      ctx.lineTo(origin.sx + bracketLen, origin.sy + bracketR);
      ctx.stroke();
      ctx.restore();
    }

    function drawLockOn(ctx) {
      if (lockOnActive && lockOnTarget) {
        drawLockOnMarker(ctx, lockOnTarget, true);
      } else if (softLockTarget) {
        drawLockOnMarker(ctx, softLockTarget, false);
      }
    }

    function drawLockOnOverlay(ctx, camX, camY, camScale) {
      const target = lockOnActive && lockOnTarget ? lockOnTarget : softLockTarget;
      if (!target || target.hp <= 0) return;
      const strong = lockOnActive && lockOnTarget;
      const origin = isoScale(target.x, target.y, 30);
      if (clippedNear(origin.rawCz)) return;
      const depthScale = getDepthScale(origin);
      const baseR = (strong ? 42 : 30) * WORLD_DRAW_SCALE * depthScale;
      const pulse = Math.sin(stageTime * 0.12) * 2 * WORLD_DRAW_SCALE * depthScale;
      const r = (baseR + pulse) * camScale;
      const alpha = strong ? 0.9 : 0.45;
      const sx = (origin.sx - camX - canvas.width / 2) * camScale + canvas.width / 2;
      const sy = (origin.sy - camY - canvas.height / 2) * camScale + canvas.height / 2;

      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = strong ? `rgba(120,220,255,${alpha})` : `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = Math.max(1, (strong ? 2.4 : 1.4) * Math.max(0.8, depthScale) * camScale);
      ctx.beginPath();
      ctx.arc(sx, sy, r + pulse * camScale, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(sx, sy - r * 0.42);
      ctx.lineTo(sx + r * 0.42, sy);
      ctx.lineTo(sx, sy + r * 0.42);
      ctx.lineTo(sx - r * 0.42, sy);
      ctx.closePath();
      ctx.stroke();

      const norm = strong ? 42 : 30;
      const scale = r / norm;
      const bracketR = r + (strong ? 6 : 5) * scale;
      const bracketLen = (strong ? 12 : 8) * scale;
      ctx.beginPath();
      ctx.moveTo(sx + bracketR, sy - bracketLen);
      ctx.lineTo(sx + bracketR, sy + bracketLen);
      ctx.moveTo(sx - bracketR, sy - bracketLen);
      ctx.lineTo(sx - bracketR, sy + bracketLen);
      ctx.moveTo(sx - bracketLen, sy - bracketR);
      ctx.lineTo(sx + bracketLen, sy - bracketR);
      ctx.moveTo(sx - bracketLen, sy + bracketR);
      ctx.lineTo(sx + bracketLen, sy + bracketR);
      ctx.stroke();
      ctx.restore();
    }

    function drawTargetHP(ctx, cw, ch) {
      const target = lockOnActive && lockOnTarget ? lockOnTarget : softLockTarget;
      if (!target || target.hp <= 0) return;
      const strong = lockOnActive && lockOnTarget;
      const barW = 240;
      const barH = 16;
      const x = cw - barW - 24;
      const y = 20;
      const hpRatio = Math.max(0, target.hpDisplay / target.maxHp);
      const lagRatio = Math.max(0, target.hpLag / target.maxHp);

      drawKhHpBar(ctx, x, y, barW, barH, hpRatio, lagRatio, {
        radius: 4,
        pad: 2,
        ticks: false,
        segments: 12,
        sheen: false,
        alpha: strong ? 1 : 0.7
      });

      ctx.save();
      ctx.globalAlpha = strong ? 1 : 0.7;
      ctx.font = '12px Orbitron, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText(target.kind || 'ENEMY', x, y + barH + 14);
      ctx.restore();
    }

    function drawGameOver(ctx, cw, ch) {
      const t = Math.min(1, gameOverTimer / 90);
      const pulse = 0.5 + 0.5 * Math.sin(gameOverTimer * 0.05);
      const cx = cw / 2;
      const cy = ch / 2;
      ctx.save();
      ctx.fillStyle = `rgba(4,6,12,${0.6 + t * 0.28})`;
      ctx.fillRect(0, 0, cw, ch);

      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(cw, ch) * 0.65);
      glow.addColorStop(0, `rgba(80,140,255,${0.2 + 0.2 * pulse})`);
      glow.addColorStop(0.45, 'rgba(20,30,50,0)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, cw, ch);

      for (let i = 0; i < 4; i++) {
        const x = cx + (i - 1.5) * 120 + Math.sin(gameOverTimer * 0.02 + i) * 30;
        const beam = ctx.createLinearGradient(x, cy - 220, x, cy + 220);
        beam.addColorStop(0, 'rgba(120,180,255,0)');
        beam.addColorStop(0.5, `rgba(120,180,255,${0.18 + 0.12 * pulse})`);
        beam.addColorStop(1, 'rgba(120,180,255,0)');
        ctx.fillStyle = beam;
        ctx.fillRect(x - 18, cy - 220, 36, 440);
      }

      ctx.textAlign = 'center';
      ctx.fillStyle = '#e9f4ff';
      ctx.shadowColor = 'rgba(120,180,255,0.85)';
      ctx.shadowBlur = 26;
      ctx.font = '700 56px Orbitron, sans-serif';
      ctx.fillText('GAME OVER', cx, cy - 20);
      ctx.shadowBlur = 0;
      ctx.font = '16px Orbitron, sans-serif';
      ctx.fillStyle = `rgba(210,235,255,${0.75 + 0.2 * pulse})`;
      ctx.fillText('Rキーで再開', cx, cy + 22);
      ctx.restore();
      ctx.textAlign = 'left';
    }

    function drawDeathOverlay(ctx, camX, camY, camScale) {
      if (!deathSequence || gameOver) return;
      const t = Math.min(1, deathTimer / 90);
      const pulse = 0.5 + 0.5 * Math.sin(deathTimer * 0.18);
      const origin = isoScale(player.x, player.y, player.z);
      if (clippedNear(origin.rawCz)) return;
      const depthScale = getDepthScale(origin);
      const pScale = 0.22 * depthScale;
      const headOffset = 136 * pScale * 0.6;
      const sx = (origin.sx - camX - canvas.width / 2) * camScale + canvas.width / 2;
      const sy = (origin.sy - camY - canvas.height / 2) * camScale + canvas.height / 2 - headOffset * camScale;
      const ringScale = Math.max(0.8, Math.min(1.5, camScale));
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = 'screen';
      ctx.filter = `blur(${6 + 6 * t}px)`;
      const glow = ctx.createRadialGradient(sx, sy, 20, sx, sy, Math.max(canvas.width, canvas.height) * (0.35 + 0.2 * t));
      glow.addColorStop(0, `rgba(255,255,255,${0.45 + 0.25 * t})`);
      glow.addColorStop(0.4, `rgba(140,210,255,${0.35 * t})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';

      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(160,220,255,${0.25 + 0.3 * pulse})`;
      ctx.lineWidth = 2 * ringScale;
      const r0 = 60 * ringScale;
      const r1 = (220 + 80 * t) * ringScale;
      for (let i = 0; i < 4; i++) {
        const ang = (Math.PI * 2 * i) / 4 + deathTimer * 0.02;
        ctx.beginPath();
        ctx.moveTo(sx + Math.cos(ang) * r0, sy + Math.sin(ang) * r0);
        ctx.lineTo(sx + Math.cos(ang) * r1, sy + Math.sin(ang) * r1);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawUI(ctx, cw, ch) {
      const uiScale = 1 / Math.max(1, PIXEL_SCALE);
      const uiW = cw * Math.max(1, PIXEL_SCALE);
      const uiH = ch * Math.max(1, PIXEL_SCALE);
      ctx.save();
      ctx.scale(uiScale, uiScale);
      drawCoinCounter(ctx, uiW, uiH);
      drawCommandDeck(ctx, uiW, uiH);
      drawHPGauge(ctx, uiW, uiH);
      drawCombo(ctx, uiW, uiH);
      drawTargetHP(ctx, uiW, uiH);
      if (gameOver) {
        drawGameOver(ctx, uiW, uiH);
      }
      ctx.restore();
    }

    // ================= 死亡演出（プリンアクション移植） =================
    function triggerDeathSequence() {
      if (deathSequence || gameOver) return;
      deathSequence = true;
      deathTimer = 0;
      gameOverTimer = 0;
      triggerGameOverAudio();
      if (player.counterActive) endCounterAttack();
      player.deathFreeze = false;
      player.deathFreezeX = player.x;
      player.deathFreezeY = player.y;
      player.deathFreezeZ = player.z;
    }

    // ================= 各種3D・ドロー関数 =================
    function drawIsoFlatRect(ctx, bx, by, bw, bd, color) {
      const blend = getPerspectiveBlend();
      if (blend > 0) {
        ctx.save();
        ctx.globalAlpha *= blend;
        const projected = projectCamPolygon([
          worldToCamera(bx, by, 0),
          worldToCamera(bx + bw, by, 0),
          worldToCamera(bx + bw, by + bd, 0),
          worldToCamera(bx, by + bd, 0)
        ]);
        if (projected) fillProjectedPolygon(ctx, projected.points, color);
        ctx.restore();
        if (blend >= 1) return;
      }

      // 隙間（謎の線）を埋めるため、少しだけ大きく描き、strokeでアウトラインを塗りつぶす
      if (blend < 1) {
        ctx.save();
        ctx.globalAlpha *= (1 - blend);
        const p0 = isoScale(bx, by, 0);
        const p1 = isoScale(bx + bw + 0.5, by, 0);
        const p2 = isoScale(bx + bw + 0.5, by + bd + 0.5, 0);
        const p3 = isoScale(bx, by + bd + 0.5, 0);
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.moveTo(p0.sx, p0.sy); ctx.lineTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.lineTo(p3.sx, p3.sy); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawIsoBlock(ctx, bx, by, bw, bd, bz, bh, colorLeftScreen, colorRightScreen, colorTop) {
      const x0 = bx, x1 = bx + bw;
      const y0 = by, y1 = by + bd;
      const z0 = bz, z1 = bz + bh;
      const xMid = (x0 + x1) * 0.5;
      const yMid = (y0 + y1) * 0.5;
      const zMid = (z0 + z1) * 0.5;

      const blend = getPerspectiveBlend();
      if (blend > 0) {
        ctx.save();
        ctx.globalAlpha *= blend;
        const faces = [
          {
            color: colorRightScreen,
            center: { x: x0, y: yMid, z: zMid },
            normal: { x: -1, y: 0, z: 0 },
            points: [{ x: x0, y: y0, z: z0 }, { x: x0, y: y1, z: z0 }, { x: x0, y: y1, z: z1 }, { x: x0, y: y0, z: z1 }]
          },
          {
            color: colorRightScreen,
            center: { x: x1, y: yMid, z: zMid },
            normal: { x: 1, y: 0, z: 0 },
            points: [{ x: x1, y: y0, z: z0 }, { x: x1, y: y1, z: z0 }, { x: x1, y: y1, z: z1 }, { x: x1, y: y0, z: z1 }]
          },
          {
            color: colorLeftScreen,
            center: { x: xMid, y: y0, z: zMid },
            normal: { x: 0, y: -1, z: 0 },
            points: [{ x: x0, y: y0, z: z0 }, { x: x1, y: y0, z: z0 }, { x: x1, y: y0, z: z1 }, { x: x0, y: y0, z: z1 }]
          },
          {
            color: colorLeftScreen,
            center: { x: xMid, y: y1, z: zMid },
            normal: { x: 0, y: 1, z: 0 },
            points: [{ x: x0, y: y1, z: z0 }, { x: x1, y: y1, z: z0 }, { x: x1, y: y1, z: z1 }, { x: x0, y: y1, z: z1 }]
          },
          {
            color: colorTop,
            center: { x: xMid, y: yMid, z: z1 },
            normal: { x: 0, y: 0, z: 1 },
            points: [{ x: x0, y: y0, z: z1 }, { x: x1, y: y0, z: z1 }, { x: x1, y: y1, z: z1 }, { x: x0, y: y1, z: z1 }]
          }
        ];
        const projectedFaces = [];
        for (const face of faces) {
          if (!faceVisibleToCamera(face.center, face.normal)) continue;
          const projected = projectCamPolygon(face.points.map(p => worldToCamera(p.x, p.y, p.z)));
          if (!projected) continue;
