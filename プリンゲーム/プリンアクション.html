<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プリンアクションゲーム - 横スクロール</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #5D9CEC;
    font-family: 'Orbitron', sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- 簡易SFX（仮） ---
  let audioCtx;
  let masterGain;
  let masterComp;
  const COIN_SFX_FILE = 'coin.mp3';
  const CUSTOM_SFX_FILES = {
    slash: '斬撃.mp3',
    rush: 'ラッシュ.mp3',
    spin: 'スピン.mp3',
    heal: 'ヒール.mp3',
    hit: 'ヒット.mp3',
    hurt: 'ダメージ.mp3',
    dodge: '回避.mp3',
    guard: 'ガード.mp3',
    guardStart: 'ガード発動.mp3',
    jump: 'ジャンプ.mp3',
    land: '着地.mp3',
    rotate: 'コマンド回転.mp3',
    basic: 'たたかう.mp3',
    fire: 'ファイア.mp3',
    thunder: 'サンダー.mp3',
    ice: 'ブリザド.mp3',
    aero: 'エアロ.mp3',
    lockon: 'ロックオン.mp3',
    lockoff: 'ロック解除.mp3',
    lockfail: 'ロック失敗.mp3',
    coin: COIN_SFX_FILE,
    gameover: 'ゲームオーバー効果音.mp3'
  };
  const CUSTOM_SFX_EXTS = ['.mp3', '.wav'];
  const BGM_FILE = '背景音楽.mp3';
  const GAMEOVER_BGM_FILE = 'ゲームオーバーBGM.mp3';
  const BGM_VOLUME = 0.45;
  const GAMEOVER_BGM_VOLUME = 0.5;
  const CUSTOM_SFX_VOLUME = {
    coin: 0.35
  };
  const customSfx = {};
  const customSfxState = {};
  let customSfxLoaded = false;
  let bgmAudio = null;
  let bgmState = 'idle';
  let bgmAutoStart = false;
  let bgmFade = 1;
  let bgmFadeOut = false;
  let gameOverBgmAudio = null;
  let gameOverBgmState = 'idle';
  let gameOverBgmAutoStart = false;
  let gameOverBgmStarted = false;

  function buildSfxCandidates(name) {
    const base = name.replace(/\.(mp3|wav)$/i, '');
    return CUSTOM_SFX_EXTS.map(ext => `${base}${ext}`);
  }
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0.72, audioCtx.currentTime);
      masterComp = audioCtx.createDynamicsCompressor();
      masterComp.threshold.setValueAtTime(-18, audioCtx.currentTime);
      masterComp.knee.setValueAtTime(18, audioCtx.currentTime);
      masterComp.ratio.setValueAtTime(4, audioCtx.currentTime);
      masterComp.attack.setValueAtTime(0.003, audioCtx.currentTime);
      masterComp.release.setValueAtTime(0.12, audioCtx.currentTime);
      masterGain.connect(masterComp);
      masterComp.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    initCustomSfx();
    initBgm();
    startBgm();
  }

  function initCustomSfx() {
    if (customSfxLoaded) return;
    customSfxLoaded = true;
    Object.entries(CUSTOM_SFX_FILES).forEach(([key, filename]) => {
      const audio = new Audio();
      audio.preload = 'auto';
      audio.volume = CUSTOM_SFX_VOLUME[key] ?? 1;
      const candidates = buildSfxCandidates(filename);
      let idx = 0;
      customSfxState[key] = 'loading';
      const tryNext = () => {
        if (customSfxState[key] === 'ready') return;
        if (idx >= candidates.length) {
          customSfxState[key] = 'error';
          return;
        }
        audio.src = candidates[idx++];
        audio.load();
      };
      audio.addEventListener('canplaythrough', () => {
        customSfxState[key] = 'ready';
      }, { once: true });
      audio.addEventListener('error', () => {
        if (customSfxState[key] === 'ready') return;
        tryNext();
      });
      tryNext();
      customSfx[key] = audio;
    });
  }

  function initBgm() {
    if (bgmAudio) return;
    bgmAudio = new Audio();
    bgmAudio.preload = 'auto';
    bgmAudio.loop = true;
    bgmAudio.volume = BGM_VOLUME;
    const candidates = buildSfxCandidates(BGM_FILE);
    let idx = 0;
    bgmState = 'loading';
    const tryNext = () => {
      if (bgmState === 'ready') return;
      if (idx >= candidates.length) {
        bgmState = 'error';
        return;
      }
      bgmAudio.src = candidates[idx++];
      bgmAudio.load();
    };
    bgmAudio.addEventListener('canplaythrough', () => {
      bgmState = 'ready';
      if (bgmAutoStart) startBgm();
    }, { once: true });
    bgmAudio.addEventListener('error', () => {
      if (bgmState === 'ready') return;
      tryNext();
    });
    tryNext();
  }

  function startBgm() {
    if (!bgmAudio) {
      bgmAutoStart = true;
      initBgm();
      return;
    }
    if (bgmState !== 'ready') {
      bgmAutoStart = true;
      return;
    }
    bgmAutoStart = false;
    try {
      if (bgmAudio) bgmAudio.volume = BGM_VOLUME * bgmFade;
      const p = bgmAudio.play();
      if (p && p.catch) p.catch(() => {});
    } catch (_) {}
  }

  function initGameOverBgm() {
    if (gameOverBgmAudio) return;
    gameOverBgmAudio = new Audio();
    gameOverBgmAudio.preload = 'auto';
    gameOverBgmAudio.loop = true;
    gameOverBgmAudio.volume = GAMEOVER_BGM_VOLUME;
    const candidates = buildSfxCandidates(GAMEOVER_BGM_FILE);
    let idx = 0;
    gameOverBgmState = 'loading';
    const tryNext = () => {
      if (gameOverBgmState === 'ready') return;
      if (idx >= candidates.length) {
        gameOverBgmState = 'error';
        return;
      }
      gameOverBgmAudio.src = candidates[idx++];
      gameOverBgmAudio.load();
    };
    gameOverBgmAudio.addEventListener('canplaythrough', () => {
      gameOverBgmState = 'ready';
      if (gameOverBgmAutoStart) startGameOverBgm();
    }, { once: true });
    gameOverBgmAudio.addEventListener('error', () => {
      if (gameOverBgmState === 'ready') return;
      tryNext();
    });
    tryNext();
  }

  function startGameOverBgm() {
    if (!gameOverBgmAudio) {
      gameOverBgmAutoStart = true;
      initGameOverBgm();
      return;
    }
    if (gameOverBgmState !== 'ready') {
      gameOverBgmAutoStart = true;
      return;
    }
    gameOverBgmAutoStart = false;
    gameOverBgmAudio.volume = GAMEOVER_BGM_VOLUME;
    try {
      gameOverBgmAudio.currentTime = 0;
      const p = gameOverBgmAudio.play();
      if (p && p.catch) p.catch(() => {});
    } catch (_) {}
  }

  function stopGameOverBgm() {
    if (!gameOverBgmAudio) return;
    gameOverBgmAudio.pause();
    gameOverBgmAudio.currentTime = 0;
    gameOverBgmStarted = false;
    gameOverBgmAutoStart = false;
  }

  function updateBgmFade() {
    if (!bgmAudio) return;
    if (!gameOver && gameOverBgmStarted) {
      stopGameOverBgm();
    }
    if (bgmFadeOut) {
      bgmFade = Math.max(0, bgmFade - 0.02);
      bgmAudio.volume = BGM_VOLUME * bgmFade;
      if (bgmFade === 0) {
        bgmAudio.pause();
        if (gameOver && !gameOverBgmStarted) {
          gameOverBgmStarted = true;
          startGameOverBgm();
        }
      }
    } else if (!gameOver && bgmFade < 1) {
      bgmFade = Math.min(1, bgmFade + 0.03);
      bgmAudio.volume = BGM_VOLUME * bgmFade;
    }
  }

  function triggerGameOverAudio() {
    playSfx('gameover');
    bgmFadeOut = true;
  }

  function playCustomSfx(name, options = {}) {
    const audio = customSfx[name];
    if (!audio) return false;
    if (customSfxState[name] === 'error') return false;
    if (audio.readyState < 2) return false;
    try {
      const inst = audio.cloneNode();
      inst.volume = options.volume ?? audio.volume ?? 1;
      inst.playbackRate = options.rate ?? 1;
      inst.play().catch(() => {});
      return true;
    } catch (e) {
      return false;
    }
  }

  function playTone(freq, duration, type, gain, detune = 0) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.detune.setValueAtTime(detune, audioCtx.currentTime);
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(g);
    g.connect(masterGain || audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration + 0.02);
  }

  function playSweepTone(freqStart, freqEnd, duration, type, gain, detune = 0) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    const now = audioCtx.currentTime;
    const safeEnd = Math.max(40, freqEnd);
    osc.type = type || 'sawtooth';
    osc.frequency.setValueAtTime(Math.max(40, freqStart), now);
    osc.frequency.exponentialRampToValueAtTime(safeEnd, now + duration);
    osc.detune.setValueAtTime(detune, now);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(Math.max(freqStart, safeEnd) * 2.2, now);
    g.gain.setValueAtTime(gain, now);
    g.gain.exponentialRampToValueAtTime(0.0008, now + duration);
    osc.connect(filter);
    filter.connect(g);
    g.connect(masterGain || audioCtx.destination);
    osc.start();
    osc.stop(now + duration + 0.03);
  }

  function playNoise(duration, gain, filterType = 'highpass', freq = 800, freqEnd = null) {
    if (!audioCtx) return;
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.6;
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = filterType;
    const now = audioCtx.currentTime;
    filter.frequency.setValueAtTime(freq, now);
    if (freqEnd !== null) {
      filter.frequency.exponentialRampToValueAtTime(Math.max(60, freqEnd), now + duration);
    }
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(gain, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + duration);
    src.connect(filter);
    filter.connect(g);
    g.connect(masterGain || audioCtx.destination);
    src.start();
    src.stop(now + duration + 0.02);
  }

  function playSfx(name) {
    if (!audioCtx) initAudio();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (playCustomSfx(name)) return;
    const det = (Math.random() - 0.5) * 120;
    switch (name) {
      case 'slash':
        playSweepTone(1400, 260, 0.12, 'sawtooth', 0.22, det - 200);
        playSweepTone(900, 420, 0.08, 'triangle', 0.12, det + 100);
        playNoise(0.08, 0.1, 'highpass', 3200, 1500);
        playTone(180, 0.08, 'sine', 0.08, det);
        break;
      case 'rush':
        playSweepTone(1000, 220, 0.14, 'square', 0.2, det);
        playSweepTone(520, 180, 0.12, 'sawtooth', 0.12, det - 200);
        playNoise(0.12, 0.12, 'highpass', 2400, 1200);
        playTone(140, 0.08, 'sine', 0.07, det - 40);
        break;
      case 'spin':
        playSweepTone(980, 160, 0.24, 'sawtooth', 0.22, det - 120);
        playSweepTone(620, 140, 0.18, 'square', 0.16, det - 80);
        playTone(760, 0.16, 'triangle', 0.12, det + 120);
        playNoise(0.14, 0.12, 'bandpass', 1400, 700);
        playTone(90, 0.16, 'sine', 0.08, det - 60);
        break;
      case 'fire':
        playSweepTone(1200, 300, 0.14, 'sawtooth', 0.2, det + 60);
        playSweepTone(640, 240, 0.1, 'triangle', 0.12, det - 80);
        playNoise(0.12, 0.12, 'highpass', 2600, 1400);
        playTone(220, 0.08, 'sine', 0.08, det - 60);
        break;
      case 'thunder':
        playNoise(0.18, 0.16, 'bandpass', 1200, 320);
        playSweepTone(480, 80, 0.22, 'square', 0.24, det - 120);
        playTone(70, 0.22, 'sine', 0.11, det - 160);
        break;
      case 'ice':
        playTone(1320, 0.12, 'triangle', 0.14, det + 80);
        playTone(1760, 0.1, 'sine', 0.1, det + 20);
        playNoise(0.08, 0.06, 'highpass', 4200, 2600);
        break;
      case 'aero':
        playNoise(0.16, 0.12, 'highpass', 2000, 900);
        playSweepTone(520, 1280, 0.14, 'triangle', 0.12, det + 60);
        playTone(900, 0.1, 'sine', 0.08, det - 40);
        break;
      case 'heal':
        playTone(520, 0.22, 'sine', 0.16, det);
        playTone(780, 0.2, 'sine', 0.12, det + 40);
        playTone(1040, 0.16, 'triangle', 0.1, det - 60);
        playNoise(0.12, 0.05, 'highpass', 3000, 2000);
        break;
      case 'hit':
        playSweepTone(240, 90, 0.12, 'square', 0.2, det);
        playTone(60, 0.18, 'sine', 0.08, det - 120);
        playNoise(0.08, 0.12, 'bandpass', 900, 520);
        break;
      case 'hurt':
        playSweepTone(200, 70, 0.2, 'sawtooth', 0.22, det - 180);
        playNoise(0.14, 0.12, 'bandpass', 520, 320);
        break;
      case 'dodge':
        playNoise(0.12, 0.11, 'highpass', 2400, 1400);
        playSweepTone(600, 260, 0.1, 'triangle', 0.12, det + 80);
        break;
      case 'guard':
        playNoise(0.08, 0.12, 'bandpass', 1800, 900);
        playSweepTone(1400, 420, 0.1, 'square', 0.18, det + 120);
        playTone(220, 0.08, 'sine', 0.1, det - 40);
        break;
      case 'guardStart':
        playSweepTone(980, 1560, 0.08, 'triangle', 0.12, det + 40);
        playTone(520, 0.06, 'sine', 0.1, det - 20);
        playNoise(0.05, 0.05, 'highpass', 2600, 1800);
        break;
      case 'jump':
        playSweepTone(420, 780, 0.08, 'triangle', 0.13, det + 60);
        playTone(660, 0.05, 'sine', 0.08, det);
        break;
      case 'land':
        playSweepTone(180, 80, 0.12, 'square', 0.16, det - 80);
        playNoise(0.08, 0.08, 'lowpass', 520, 220);
        break;
      case 'rotate':
        playTone(880, 0.05, 'sine', 0.09, det);
        playTone(1320, 0.05, 'triangle', 0.07, det + 60);
        playNoise(0.04, 0.03, 'highpass', 2500, 1800);
        break;
      case 'basic':
        playSweepTone(1200, 220, 0.12, 'sawtooth', 0.2, det + 40);
        playTone(160, 0.1, 'sine', 0.08, det - 120);
        playNoise(0.08, 0.09, 'highpass', 2600, 1400);
        break;
      case 'lockon':
        playTone(980, 0.09, 'sine', 0.14, det);
        playTone(1470, 0.06, 'triangle', 0.1, det + 30);
        break;
      case 'lockoff':
        playSweepTone(720, 260, 0.1, 'sine', 0.12, det - 80);
        break;
      case 'lockfail':
        playTone(220, 0.08, 'square', 0.08, det - 100);
        break;
      case 'coin':
        playTone(1320, 0.06, 'triangle', 0.08, det + 40);
        playTone(1860, 0.05, 'sine', 0.06, det + 80);
        playNoise(0.035, 0.03, 'highpass', 3200, 2000);
        break;
      case 'gameover':
        playSweepTone(680, 160, 0.26, 'sawtooth', 0.2, det - 120);
        playTone(120, 0.35, 'sine', 0.12, det - 200);
        playNoise(0.12, 0.18, 'bandpass', 520, 260);
        break;
      default:
        break;
    }
  }

  window.addEventListener('pointerdown', initAudio);

  const keys = { Left: false, Right: false, Up: false, Down: false, Action: false, Rotate: false, Dodge: false, Lock: false, Basic: false };
  const gpKeys = { Left: false, Right: false, Up: false, Down: false };
  let gpJump = false;
  let gamepadIndex = null;
  let gamepadPrevButtons = [];
  let lastRumbleAt = 0;
  let rumbleTestActive = false;
  let rumbleTestStrengthIndex = 0;
  let rumbleTestPatternIndex = 0;
  let rumbleTestClock = 0;
  let rumbleToggleQueued = false;
  let rumbleStrengthQueued = false;
  let rumblePatternQueued = false;
  let actionQueued = false;
  let rotateQueued = 0;
  let dodgeQueued = false;
  let lockQueued = false;
  let basicQueued = false;
  let restartQueued = false;

  function applyDeadzone(v, dz = 0.25) {
    const av = Math.abs(v);
    if (av < dz) return 0;
    const scaled = (av - dz) / (1 - dz);
    return Math.sign(v) * scaled;
  }

  function getActiveGamepad() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    if (gamepadIndex !== null && pads[gamepadIndex] && pads[gamepadIndex].connected) {
      return pads[gamepadIndex];
    }
    for (let i = 0; i < pads.length; i++) {
      if (pads[i] && pads[i].connected) {
        gamepadIndex = i;
        return pads[i];
      }
    }
    return null;
  }

  function pollGamepad() {
    const gp = getActiveGamepad();
    if (!gp) {
      gpKeys.Left = gpKeys.Right = gpKeys.Up = gpKeys.Down = false;
      gpJump = false;
      gamepadPrevButtons = [];
      return;
    }
    const buttons = gp.buttons || [];
    const pressed = (i) => !!(buttons[i] && buttons[i].pressed);
    const justPressed = (i) => pressed(i) && !gamepadPrevButtons[i];
    const isDualShock = /DualShock|Wireless Controller|PS4|DS4/i.test(gp.id || '');
    const btnMap = isDualShock ? {
      jump: 0,    // ✕
      basic: 1,   // ○
      dodge: 2,   // □
      command: 3, // △
      lock: 5,
      rotateR: 7,
      rotateL: 6,
      dpadUp: 12,
      dpadDown: 13,
      dpadLeft: 14,
      dpadRight: 15,
      start: 9
    } : {
      jump: 1,    // B
      basic: 0,   // A
      dodge: 3,   // Y
      command: 2, // X
      lock: 5,
      rotateR: 7,
      rotateL: 6,
      dpadUp: 12,
      dpadDown: 13,
      dpadLeft: 14,
      dpadRight: 15,
      start: 9
    };
    const axisX = applyDeadzone(gp.axes[0] || 0, 0.25);
    const axisY = applyDeadzone(gp.axes[1] || 0, 0.35);

    const jumpHeld = pressed(btnMap.jump);
    gpJump = jumpHeld;
    gpKeys.Left = axisX < -0.35 || pressed(btnMap.dpadLeft);
    gpKeys.Right = axisX > 0.35 || pressed(btnMap.dpadRight);
    gpKeys.Up = axisY < -0.6 || pressed(btnMap.dpadUp);
    gpKeys.Down = axisY > 0.6 || pressed(btnMap.dpadDown);

    if (justPressed(btnMap.jump)) gpJump = true;              // ジャンプ（即時）
    if (justPressed(btnMap.basic)) basicQueued = true;        // たたかう
    if (justPressed(btnMap.command)) actionQueued = true;     // コマンド実行
    if (justPressed(btnMap.dodge)) dodgeQueued = true;        // 回避
    if (justPressed(btnMap.dpadDown)) rotateQueued += 1;      // D-pad 下: 上向き回転
    if (justPressed(btnMap.dpadUp)) rotateQueued -= 1;        // D-pad 上: 下向き回転
    if (justPressed(btnMap.rotateR)) rotateQueued += 1;       // RT: 右回転
    if (justPressed(btnMap.rotateL)) rotateQueued -= 1;       // LT: 左回転
    if (justPressed(btnMap.lock)) lockQueued = true;          // RB: ロックオン
    if (justPressed(btnMap.start)) restartQueued = true;      // Start: リスタート
    if (justPressed(btnMap.dpadRight)) rumbleToggleQueued = true; // D-pad 右: 振動テストON/OFF
    if (justPressed(btnMap.dpadLeft)) rumbleStrengthQueued = true; // D-pad 左: 振動強度変更

    gamepadPrevButtons = buttons.map(b => b.pressed);
  }

  function rumble(strength = 0.4, duration = 90, weak = null) {
    const gp = getActiveGamepad();
    if (!gp) return;
    const now = performance.now();
    if (now - lastRumbleAt < 25) return;
    lastRumbleAt = now;
    const actuator = gp.vibrationActuator;
    if (actuator && actuator.playEffect) {
      const strong = Math.max(0, Math.min(1, strength));
      const weakMag = weak !== null ? Math.max(0, Math.min(1, weak)) : Math.max(0, Math.min(1, strength * 0.6));
      actuator.playEffect('dual-rumble', {
        duration,
        strongMagnitude: strong,
        weakMagnitude: weakMag
      }).catch(() => {});
    } else if (actuator && actuator.pulse) {
      actuator.pulse(Math.max(0, Math.min(1, strength)), duration).catch(() => {});
    }
  }

  function stopRumble() {
    const gp = getActiveGamepad();
    if (!gp) return;
    const actuator = gp.vibrationActuator;
    if (actuator && actuator.reset) {
      actuator.reset().catch(() => {});
    } else if (actuator && actuator.playEffect) {
      actuator.playEffect('dual-rumble', {
        duration: 20,
        strongMagnitude: 0,
        weakMagnitude: 0
      }).catch(() => {});
    } else if (actuator && actuator.pulse) {
      actuator.pulse(0, 20).catch(() => {});
    }
  }

  const RUMBLE_STRENGTHS = [0.2, 0.35, 0.5, 0.65, 0.8, 1.0];
  const RUMBLE_PATTERNS = [
    { name: 'steady', period: 60, sample: () => ({ strong: 1, weak: 0.6 }) },
    { name: 'pulse', period: 90, sample: (p) => {
      const s = 0.2 + 0.8 * Math.sin(p * Math.PI);
      return { strong: s, weak: s * 0.55 };
    }},
    { name: 'heartbeat', period: 120, sample: (p) => {
      let s = 0;
      if (p < 0.1) s = 1;
      else if (p < 0.18) s = 0.2;
      else if (p < 0.3) s = 0.85;
      return { strong: s, weak: s * 0.45 };
    }},
    { name: 'ramp', period: 110, sample: (p) => {
      const s = p < 0.7 ? (p / 0.7) : Math.max(0, 1 - (p - 0.7) / 0.3);
      return { strong: s, weak: s * 0.7 };
    }},
    { name: 'stutter', period: 48, sample: (p) => {
      const on = (Math.floor(p * 10) % 2) === 0;
      const s = on ? 0.9 : 0;
      return { strong: s, weak: s * 0.4 };
    }}
  ];
  const RUMBLE_TEST_INTERVAL = 3;
  const RUMBLE_TEST_DURATION = 90;

  function toggleRumbleTest() {
    rumbleTestActive = !rumbleTestActive;
    rumbleTestClock = 0;
    if (!rumbleTestActive) stopRumble();
  }

  function bumpRumbleStrength() {
    rumbleTestStrengthIndex = (rumbleTestStrengthIndex + 1) % RUMBLE_STRENGTHS.length;
  }

  function cycleRumblePattern() {
    rumbleTestPatternIndex = (rumbleTestPatternIndex + 1) % RUMBLE_PATTERNS.length;
    rumbleTestClock = 0;
  }

  function updateRumbleTest() {
    if (!rumbleTestActive) return;
    rumbleTestClock++;
    if (rumbleTestClock % RUMBLE_TEST_INTERVAL !== 0) return;
    const base = RUMBLE_STRENGTHS[rumbleTestStrengthIndex] || 0.35;
    const pattern = RUMBLE_PATTERNS[rumbleTestPatternIndex] || RUMBLE_PATTERNS[0];
    const phase = (rumbleTestClock % pattern.period) / pattern.period;
    const sample = pattern.sample(phase);
    const strong = Math.max(0, Math.min(1, base * (sample.strong ?? 0)));
    const weak = Math.max(0, Math.min(1, base * (sample.weak ?? (sample.strong ?? 0) * 0.6)));
    if (strong <= 0.02 && weak <= 0.02) {
      stopRumble();
      return;
    }
    rumble(strong, RUMBLE_TEST_DURATION, weak);
  }

      const inputUp = inputEnabled && (keys.Up || gpJump);
      const inputDown = inputEnabled && (keys.Down || gpKeys.Down);
      this.isCrouching = (inputDown && this.onGround);
      const wasOnGround = this.onGround;

      let currentSpeed = SPEED;
      if (this.isCrouching) currentSpeed *= 0.5;

      if (inputLeft) this.vx -= currentSpeed;
      if (inputRight) this.vx += currentSpeed;
      
      if (!deathSequence) {
        this.vx *= FRICTION;
        this.vy += GRAVITY;
        if (this.slamActive && this.attackType === 'basic' && this.attackComboStep === BASIC_COMBO_MAX && this.vy > 0) {

      } else {

        } else {
          this.vx = 0;
          this.vy = 0;
        }

      if (this.attackTimer > 0) {
        this.attackTimer--;
        if (this.attackType === 'basic') {
          this.renderRot += 0.04;
          this.renderRot *= 0.9;
        } else if (this.attackType === 'counter') {
          this.renderRot += 0.45;
        } else if (this.attackType === 'spin') {
          this.renderRot += 0.6;
        } else if (this.attackType === 'rush') {
          this.renderRot += 0.25;
        } else if (this.attackType) {
          this.renderRot += 0.12;
        }
        if (Math.abs(this.attackDash) > 0.05) {
          this.vx += this.attackDash * PLAYER_ATTACK_DASH_SCALE;
          this.attackDash *= 0.82;
        }
        if (Math.random() < 0.25) {
          effects.push({
            type: 'spark',
            x: this.x + (Math.random() - 0.5) * 60,
            y: this.y - this.height * 0.6 + (Math.random() - 0.5) * 20,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            gravity: 0.1,
            life: 12,
            maxLife: 12,
            color: '#ffffff',
            size: 2 + Math.random() * 2
          });
        }
        if (this.attackTimer === 0) {
          this.attackType = '';
          this.attackComboStep = 0;
        }
      } else {
        if (deathSequence) {
          this.renderRot += this.vx * 0.015;
          this.renderRot *= 0.92;
        } else {
          if (this.onGround && Math.abs(this.vx) > 0.2) {
            this.renderRot += this.vx * 0.01;
          }
          this.renderRot *= 0.8;
        }
        if (Math.abs(this.renderRot) < 0.01) this.renderRot = 0;
      }

      if (this.dodgeCooldown > 0) this.dodgeCooldown--;
      if (this.dodgeTimer > 0) {
        const maxDodge = this.dodgeTimerMax || 1;
        const prog = 1 - this.dodgeTimer / maxDodge;
        const burst = Math.sin(Math.PI * prog);
        this.dodgeTimer--;
        const speed = (this.dodgeSpeed || 2.2) * (0.7 + burst * 0.65);
        this.vx += this.dodgeDir * speed;
        if (Math.random() < 0.85) {
          effects.push({
            type: 'afterimage',
            x: this.x,
            y: this.y,
            life: 10,
            maxLife: 10,
            color: this.dodgeColor || '#b9f1ff',
            scale: 1.15 + burst * 0.2
          });
        }
        if (this.dodgeTimer % 3 === 0) {
          spawnSparks(this.x, this.y - this.height * 0.55, 4, [this.dodgeColor, '#ffffff'], Math.PI * 0.8, 4.5, 10);
        }
        if (this.dodgeTimer % 4 === 0) {
          effects.push({
            type: 'dash',
            x: this.x,
            y: this.y - this.height * 0.55,
            life: 8,
            maxLife: 8,
            color: this.dodgeColor,
            len: 140,
            angle: this.dodgeDir === 1 ? 0 : Math.PI
          });
        }
        if (this.dodgeTimer === 0) {
          this.dodgeSpeed = 0;
        }
      }
      if (this.guardCooldown > 0) this.guardCooldown--;
      if (this.guardTimer > 0) {
        this.guardTimer--;
        this.guardSpin += 0.22;
        if (this.guardFlash > 0) this.guardFlash--;
        if (this.onGround) this.vx *= 0.8;
      } else if (this.guardFlash > 0) {
        this.guardFlash--;
      }
      if (this.hurtTimer > 0) this.hurtTimer--;

      const previousX = this.x;
      if (inputLeft && !inputRight) {
        this.facing = -1;
      } else if (inputRight && !inputLeft) {
        this.facing = 1;
      }
      this.x += this.vx;
      if (!inputLeft && !inputRight && Math.abs(this.vx) > 0.4) {
        this.facing = this.vx > 0 ? 1 : -1;
      }

      // 左端の壁（スタート地点から左には行けないようにする）
      if (this.x - this.width/2 < 0) {
        this.x = this.width/2;
        this.vx *= -0.5;
      }

      const previousY = this.y;
      this.y += this.vy;
      
      this.onGround = false;
      this.platform = null;

      const footWidth = 100;

      if (!deathSequence) {
        for (let p of platforms) {
          if (p.ground) continue;
          const isWithinX = (this.x + footWidth/2 > p.x) && (this.x - footWidth/2 < p.x + p.w);
          const wasAbove = previousY <= p.y + 1; 
          const isBelow = this.y >= p.y;
          
          if (this.vy > 0 && isWithinX && wasAbove && isBelow) {
            if (!this.onGround) {
              let impact = Math.min(this.vy, 20);
              this.scaleVelX += impact * 0.015;
              this.scaleVelY -= impact * 0.015;
              if (impact > 6) {
                playSfx('land');
                rumble(0.42, 110, 0.3);

              if (this.slamActive) {
                const slamY = this.y - this.height * 0.1;
                spawnShockwave(this.x + this.facing * 18, slamY, '#fff2a6');
                effects.push({ type: 'ring', x: this.x + this.facing * 6, y: slamY, life: 18, maxLife: 18, r: 90, color: '#fff2a6' });
                spawnSparks(this.x + this.facing * 10, slamY - 6, 16, '#ffe3a0', Math.PI, 6, 18);
                screenShake += 3.2;
                screenFlash = Math.max(screenFlash, 0.25);
                rumble(0.6, 140, 0.35);
                playSfx('hit');
                this.slamActive = false;
              }
            }
            this.y = p.y;
            this.vy = 0;
            this.onGround = true;
            this.platform = p;
            break;
          }
        }
        if (!this.onGround) {
          const groundPrev = groundHeightAt(previousX);
          const groundNow = groundHeightAt(this.x);
          const wasAboveGround = previousY <= groundPrev + 1;
          const isBelowGround = this.y >= groundNow - 2;
          if (this.vy > -0.2 && wasAboveGround && isBelowGround) {
            this.y = groundNow;
            this.vy = 0;
            this.onGround = true;
          }
        }
        if (!this.onGround && wasOnGround && this.vy >= -0.1) {
          let bestUpY = null;
          let bestDownY = null;
          let bestUpPlatform = null;
          let bestDownPlatform = null;
          let bestDownDelta = Infinity;
          const groundYAt = groundHeightAt(this.x);
          const groundUp = this.y - groundYAt;
          if (groundUp >= 0 && groundUp <= STEP_UP_MAX) {
            bestUpY = groundYAt;
          } else {
            const groundDown = groundYAt - this.y;
            if (groundDown >= 0 && groundDown <= STEP_DOWN_MAX) {
              bestDownY = groundYAt;
              bestDownDelta = groundDown;
            }
          }
          for (let p of platforms) {
            if (p.ground) continue;
            const isWithinX = (this.x + footWidth/2 > p.x) && (this.x - footWidth/2 < p.x + p.w);
            if (!isWithinX) continue;
            const dyUp = this.y - p.y;
            if (dyUp >= 0 && dyUp <= STEP_UP_MAX) {
              if (bestUpY === null || p.y < bestUpY) {
                bestUpY = p.y;
                bestUpPlatform = p;
              }
              continue;
            }
            const dyDown = p.y - this.y;
            if (dyDown >= 0 && dyDown <= STEP_DOWN_MAX && dyDown < bestDownDelta) {
              bestDownDelta = dyDown;
              bestDownY = p.y;
              bestDownPlatform = p;
            }
          }
          if (bestUpY !== null) {
            this.y = bestUpY;
            this.vy = 0;
            this.onGround = true;
            this.platform = bestUpPlatform;
          } else if (bestDownY !== null) {
            this.y = bestDownY;
            this.vy = 0;
            this.onGround = true;
            this.platform = bestDownPlatform;
          }
        }
        if (!this.onGround) {
          const groundNow = groundHeightAt(this.x);
          if (this.y > groundNow + 6) {
            this.y = groundNow;
            this.vy = Math.min(0, this.vy);
            this.onGround = true;
          } else if (this.y >= groundNow - STEP_DOWN_MAX && this.vy >= -2) {
            this.y = groundNow;
            this.vy = 0;
            this.onGround = true;
          }
        }
      } else if (this.deathFreeze) {
        this.y = this.deathFreezeY;
      }

      if (this.onGround) {
        this.jumpCount = 0;
        this.jumpHold = 0;
      }

      // 落下チェック（穴に落ちたらリセット）
      if (!deathSequence && this.y > window.innerHeight + 300) {
        this.reset();
      }

      if (inputUp && !this.jumpLatch && (this.onGround || this.jumpCount < this.maxJumps)) {
        const isDouble = !this.onGround;
        this.vy = isDouble ? DOUBLE_JUMP_FORCE : JUMP_FORCE;
        this.onGround = false;
        this.jumpCount = Math.min(this.maxJumps, this.jumpCount + 1);
        this.jumpLatch = true;
        this.jumpHold = isDouble ? DOUBLE_JUMP_HOLD_FRAMES : JUMP_HOLD_FRAMES;
        this.jumpCutMul = isDouble ? DOUBLE_JUMP_CUT_MULT : JUMP_CUT_MULT;
        this.scaleVelX -= isDouble ? 0.18 : 0.25;
        this.scaleVelY += isDouble ? 0.26 : 0.35;
        this.isCrouching = false;
        spawnSparks(this.x, this.y - this.height * 0.55, isDouble ? 8 : 6, isDouble ? '#bfe7ff' : '#ffffff', Math.PI * 0.9, 5, 12);
        rumble(isDouble ? 0.3 : 0.36, isDouble ? 80 : 95, isDouble ? 0.18 : 0.24);
        playSfx('jump');
      }
      if (!inputUp) this.jumpLatch = false;
      if (this.jumpHold > 0) {
        if (inputUp && this.vy < 0) {
          this.jumpHold--;
        } else {
          if (this.vy < 0) this.vy *= this.jumpCutMul;
          this.jumpHold = 0;
        }
      }

      if (this.onGround) {
        let targetTilt = 0;
        let slopeDelta = 0;
        if (!this.platform) {
          const g1 = groundHeightAt(this.x - 20);
          const g2 = groundHeightAt(this.x + 20);
          slopeDelta = g2 - g1;
          targetTilt = Math.atan2(slopeDelta, 40);
        }
        this.groundTilt += (targetTilt - this.groundTilt) * 0.25;
        if (this.isCrouching && !this.platform) {
          const slopeAbs = Math.abs(targetTilt);
          if (slopeAbs > SLOPE_SLIDE_MIN) {
            const dir = slopeDelta >= 0 ? 1 : -1;
            const power = Math.min(1, slopeAbs / 0.35);
            this.vx += dir * (SLOPE_SLIDE_ACCEL * (0.45 + 0.55 * power));
            const maxSlide = SLOPE_SLIDE_MAX + power * 1.2;
            if (Math.abs(this.vx) > maxSlide) this.vx = dir * maxSlide;
            if (stageTime % 8 === 0) {
              rumble(0.12, 70, 0.05);
            }
          }
        }
      } else {
        this.groundTilt *= 0.85;
      }

      let speedScale = Math.abs(this.vx) * 0.01;
      
      if (this.isCrouching) {
        this.targetScaleX = 1.35;
        this.targetScaleY = 0.55;
      } else {
        this.targetScaleX = 1 + (this.onGround ? speedScale : -0.15); 
        this.targetScaleY = 1 - (this.onGround ? speedScale : -0.15);
      }
      if (this.onGround) {
        const slopeAbs = Math.min(0.4, Math.abs(this.groundTilt));
        this.targetScaleX += slopeAbs * 0.25;
        this.targetScaleY -= slopeAbs * 0.18;
      }

      this.scaleVelX += (this.targetScaleX - this.scaleX) * this.springness;
      this.scaleVelY += (this.targetScaleY - this.scaleY) * this.springness;
      
      this.scaleVelX *= this.damping;
      this.scaleVelY *= this.damping;

      this.scaleX += this.scaleVelX;
      this.scaleY += this.scaleVelY;

      let targetSkew = this.onGround ? this.vx * 0.025 : this.vx * 0.01;
      this.skewC += (targetSkew - this.skewC) * 0.3;

      let targetLeft = 0;
      let targetRight = 0;

      if (!this.onGround) {
          targetLeft = 35;
          targetRight = 35;
      } else if (this.isCrouching) {
          targetLeft = -15;
          targetRight = -15;
      } else if (Math.abs(this.vx) > 0.5) {
          this.armPhase += Math.abs(this.vx) * 0.1;
          targetLeft = Math.sin(this.armPhase) * 20;
          targetRight = -Math.sin(this.armPhase) * 20;
      }

      this.leftArmOffset += (targetLeft - this.leftArmOffset) * 0.25;
      this.rightArmOffset += (targetRight - this.rightArmOffset) * 0.25;
    }

    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      if (this.guardTimer > 0) {
        const baseY = -this.height * 0.55;
        const prog = this.guardTimer / (this.guardTimerMax || 1);
        const pulse = 0.5 + 0.5 * Math.sin(stageTime * 0.2 + this.guardSpin);
        const radius = this.width * 0.68 + pulse * 6;
        const color = this.guardColor || '#7ee5ff';
        const alpha = 0.55 + 0.35 * prog;
        const flash = this.guardFlash > 0 ? Math.min(1, this.guardFlash / 12) : 0;
        ctx.save();
        ctx.translate(0, baseY);
        ctx.globalCompositeOperation = 'lighter';

        const sphere = ctx.createRadialGradient(-radius * 0.25, -radius * 0.3, radius * 0.15, 0, 0, radius);
        sphere.addColorStop(0, colorWithAlpha('#ffffff', 0.7 * alpha));
        sphere.addColorStop(0.4, colorWithAlpha(color, 0.65 * alpha));
        sphere.addColorStop(1, colorWithAlpha('#1d5fae', 0.35 * alpha));
        ctx.fillStyle = sphere;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.lineWidth = 3.5 + flash * 2;
        ctx.strokeStyle = colorWithAlpha(color, 0.7 * alpha + flash * 0.4);
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.98, 0, Math.PI * 2);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.strokeStyle = colorWithAlpha('#dff7ff', 0.4 * alpha);
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.7, this.guardSpin, this.guardSpin + Math.PI * 1.4);
        ctx.stroke();
        if (flash > 0.2) {
          ctx.strokeStyle = colorWithAlpha('#ffffff', 0.7 * flash);
          ctx.lineWidth = 2.5 + flash * 4;
          ctx.beginPath();
          ctx.arc(0, 0, radius * 1.15, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = colorWithAlpha('#ffffff', 0.35 * alpha);
        ctx.beginPath();
        ctx.ellipse(-radius * 0.25, -radius * 0.3, radius * 0.25, radius * 0.18, -0.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
      const face = this.facing < 0 ? -1 : 1;
      const hurtRatio = (!deathSequence && this.hurtTimer > 0) ? this.hurtTimer / 18 : 0;
      const hurtRot = hurtRatio * -0.35 * this.hurtDir;
      const groundTiltRaw = (this.groundTilt || 0) * face;
      const scaleXAbs = Math.max(0.001, Math.abs(this.scaleX || 1));
      const scaleYAbs = Math.max(0.001, Math.abs(this.scaleY || 1));
      const groundTilt = Math.atan(Math.tan(groundTiltRaw) * (scaleXAbs / scaleYAbs));
      ctx.scale(face * this.scaleX, this.scaleY);
      ctx.rotate(this.renderRot + hurtRot + groundTilt);
      ctx.transform(1, 0, -(this.skewC * face + groundTilt * 0.35), 1, 0, 0);
      ctx.translate(0, -this.height);
      const auraBoost = this.attackTimer > 0 ? 1 : 0;
      const counterBoost = this.counterActive ? 1 : 0;
      
      const bodyColor = '#FEF68B'; 
      const hatColor = '#A78149';  
      const outlineColor = '#433224'; 
      
      ctx.lineWidth = 14;          
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.strokeStyle = outlineColor;

      const topW = 96;   
      const botW = 180;  
      const h = 136;     
      const hatH = 28;   

      if (auraBoost || counterBoost) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const glowScale = counterBoost ? 1.45 : 1;
        const glow = ctx.createRadialGradient(0, h * 0.65, 10, 0, h * 0.65, h * 1.3 * glowScale);
        glow.addColorStop(0, counterBoost ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.6)');
        glow.addColorStop(0.4, counterBoost ? 'rgba(180,240,255,0.65)' : 'rgba(160,220,255,0.45)');
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.ellipse(0, h * 0.7, 120 * (counterBoost ? 1.2 : 1), 60 * (counterBoost ? 1.15 : 1), 0, 0, Math.PI * 2);
        ctx.fill();
        if (counterBoost) {
          const flash = this.counterFlash > 0 ? Math.min(1, this.counterFlash / 18) : 0;
          ctx.strokeStyle = `rgba(255,255,255,${0.4 + 0.4 * flash})`;
          ctx.lineWidth = 3 + flash * 3;
          ctx.beginPath();
          ctx.ellipse(0, h * 0.7, 140, 70, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      // 左腕
      ctx.beginPath();
      const leftArmBaseX = -topW/2 - ((botW/2 - topW/2) * 0.55);
      const leftArmBaseY = h * 0.55;
      ctx.moveTo(leftArmBaseX + 6, leftArmBaseY);
      ctx.lineTo(leftArmBaseX - 35, leftArmBaseY - 30 - this.leftArmOffset);
      ctx.stroke();

      // 右腕
      ctx.beginPath();
      const rightArmBaseX = topW/2 + ((botW/2 - topW/2) * 0.55);
      const rightArmBaseY = h * 0.55;
      ctx.moveTo(rightArmBaseX - 6, rightArmBaseY);
      ctx.lineTo(rightArmBaseX + 35, rightArmBaseY - 30 - this.rightArmOffset);
      ctx.stroke();

      const bodyPath = new Path2D();
      bodyPath.moveTo(-topW/2, 0);
      bodyPath.lineTo(topW/2, 0);
      bodyPath.lineTo(botW/2, h - 3);
      bodyPath.quadraticCurveTo(0, h + 10, -botW/2, h - 3);
      bodyPath.closePath();

      ctx.fillStyle = bodyColor;
      ctx.fill(bodyPath);

      const hatBotW_half = topW/2 + ((botW/2 - topW/2) * (hatH/h));
      const hatPath = new Path2D();
      hatPath.moveTo(-topW/2, 0);
      hatPath.lineTo(topW/2, 0);
      hatPath.lineTo(hatBotW_half, hatH);
      hatPath.quadraticCurveTo(0, hatH + 2, -hatBotW_half, hatH);
      hatPath.closePath();
      
      ctx.fillStyle = hatColor;
      ctx.fill(hatPath);

      ctx.stroke(bodyPath);

      ctx.beginPath();
      ctx.moveTo(-hatBotW_half, hatH);
      ctx.quadraticCurveTo(0, hatH + 2, hatBotW_half, hatH);
      ctx.stroke();

      if (this.attackType === 'basic') {
        const maxT = this.attackTimerMax || 1;
        const prog = Math.min(1, Math.max(0, 1 - this.attackTimer / maxT));
        const combo = this.attackComboStep || 1;
        const swing = getBasicSwing(combo, prog);

        ctx.save();
        const sword = getBasicSwordLocal(this, combo);
        const handX = sword.handX;
        const handY = sword.handY;
        ctx.translate(handX, handY);
        ctx.rotate(swing);
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowColor = combo === 4 ? 'rgba(255,220,140,0.6)' : 'rgba(120,200,255,0.45)';
        ctx.shadowBlur = combo === 4 ? 12 : 8;
        const bladeLen = sword.bladeLen;
        const bladeW = sword.bladeW;
        const bladeGrad = ctx.createLinearGradient(0, -bladeW, bladeLen, bladeW);
        bladeGrad.addColorStop(0, 'rgba(255,255,255,0.95)');
        bladeGrad.addColorStop(0.55, combo === 4 ? 'rgba(255,240,180,0.95)' : 'rgba(170,220,255,0.9)');
        bladeGrad.addColorStop(1, 'rgba(255,255,255,0.1)');
        ctx.fillStyle = bladeGrad;
        ctx.beginPath();
        ctx.moveTo(0, -bladeW * 0.45);
        ctx.lineTo(bladeLen - 10, -bladeW * 0.2);
        ctx.lineTo(bladeLen, 0);
        ctx.lineTo(bladeLen - 10, bladeW * 0.2);
        ctx.lineTo(0, bladeW * 0.45);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.6;
        ctx.stroke();

        ctx.strokeStyle = combo === 4 ? 'rgba(255,210,140,0.7)' : 'rgba(120,180,255,0.6)';
        ctx.lineWidth = 2.1;
        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(bladeLen - 18, 0);
        ctx.stroke();

        // 中ほどの横棒（クロスガード風）
        const guardX = bladeLen * 0.34;
        ctx.fillStyle = combo === 4 ? 'rgba(255,205,130,0.95)' : 'rgba(150,200,255,0.9)';
        ctx.fillRect(guardX - 20, -6.5, 40, 13);
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1.2;
        ctx.strokeRect(guardX - 20, -6.5, 40, 13);

        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(8, -bladeW * 0.25);
        ctx.lineTo(bladeLen - 12, -bladeW * 0.08);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#f2d08a';
        ctx.beginPath();
        ctx.moveTo(-18, -8);
        ctx.lineTo(4, -8);
        ctx.lineTo(6, 0);
        ctx.lineTo(4, 8);
        ctx.lineTo(-18, 8);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#b47a35';
        ctx.fillRect(-28, -5, 10, 10);
        ctx.fillStyle = '#5c3b21';
        ctx.fillRect(-44, -4, 16, 8);
        ctx.fillStyle = '#e4d1b1';
        ctx.beginPath();
        ctx.arc(-46, 0, 3.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = combo === 4 ? '#ffd36a' : '#8ad4ff';
        ctx.beginPath();
        ctx.arc(-6, 0, 3.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.fillStyle = outlineColor;
      
      ctx.beginPath();
      ctx.arc(-20, 56, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.arc(20, 56, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.lineWidth = 10;
      const mouthW = 32;
      ctx.moveTo(-mouthW, 94);
      
      let mouthY = 102; 
      if (this.isCrouching) mouthY = 98;
      else if (this.vy > 5) mouthY = 106;
      
      ctx.quadraticCurveTo(0, mouthY, mouthW, 94);
      ctx.stroke();

      ctx.restore();
    }
  }

  const ENEMY_TYPES = {
    grunt: {
      hp: 40,
      width: 90,
      height: 60,
      speed: 1,
      damage: 20,
      attackRange: 95,

  let groundProfile = [];
  let groundInfo = null;

  class Enemy {
    constructor(x, y, platform, kind = 'grunt', spawnId = null) {
      const preset = ENEMY_TYPES[kind] || ENEMY_TYPES.grunt;
      this.id = Enemy.nextId++;
      this.kind = kind;
      this.spawnId = spawnId;
      this.x = x;
      this.y = y;
      this.vx = 0;
      this.vy = 0;
      this.width = preset.width;
      this.height = preset.height;
      this.hp = preset.hp;
      this.maxHp = preset.hp;
      this.invuln = 0;
      this.platform = platform;
      this.groundY = platform.y;
      this.onGround = true;
      this.hitstun = 0;
      this.attackState = 'idle';
      this.attackTimer = 0;
      this.attackCooldownBase = preset.attackCooldown;
      this.attackCooldown = preset.attackCooldown;
      this.attackHit = false;
      this.attackRange = preset.attackRange * ENEMY_ATTACK_RANGE_SCALE;
      this.damage = preset.damage;
      this.speedMul = preset.speed;
      this.facing = 1;
      this.renderRot = 0;
      this.spawnX = x;
      this.patrolDir = Math.random() > 0.5 ? 1 : -1;
      this.patrolRange = 140 + Math.random() * 120;
      this.state = 'patrol';
      this.stateTimer = 0;
      this.strafeDir = Math.random() > 0.5 ? 1 : -1;
      this.deadTimer = 0;
      this.bodyTop = preset.bodyTop;
      this.bodyBottom = preset.bodyBottom;
      this.eyeColor = preset.eyeColor;
      this.slashColor = preset.slashColor;
      this.ringColor = preset.ringColor;
      this.style = preset.style || kind;
      this.accent = preset.accent || preset.eyeColor || '#ffffff';
      this.hpDisplay = this.hp;
      this.hpLag = this.hp;
      this.hpLagHold = 0;
      this.lastHp = this.hp;
    }

    update(player) {
      if (this.hp <= 0) {
        if (this.deadTimer === 0 && this.spawnId !== null && enemySpawns[this.spawnId]) {
          enemySpawns[this.spawnId].respawn = Math.max(enemySpawns[this.spawnId].respawn, RESPAWN_DELAY);
        }
        this.deadTimer++;
        this.vy += ENEMY_GRAVITY;
        this.y += this.vy;
        this.vx *= 0.92;
        this.x += this.vx;
        return;
      }
      if (this.invuln > 0) this.invuln--;

      const dx = player.x - this.x;
      const dist = Math.abs(dx);
      this.facing = dx >= 0 ? 1 : -1;
      const sameHeight = Math.abs(player.y - this.y) < 100;
      const groundY = (this.platform && this.platform.ground) ? groundHeightAt(this.x) : this.groundY;
      this.groundY = groundY;

      if (!this.onGround) {
        this.vy += ENEMY_GRAVITY;
        this.y += this.vy;
        if (this.y >= groundY) {
          this.y = groundY;
          this.vy = 0;
          this.onGround = true;
        }
      } else {
        this.y = groundY;
      }

      if (this.hitstun > 0) {
        this.hitstun--;
        this.vx *= 0.88;
        this.x += this.vx;
      } else if (this.attackState !== 'idle') {
        if (this.attackState === 'windup') {
          this.attackTimer--;
          this.vx *= 0.8;
          if (this.attackTimer <= 0) {
            this.attackState = 'attack';
            this.attackTimer = 12;
            this.attackHit = false;
          effects.push({ type: 'enemySlash', x: this.x + this.facing * 30, y: this.y - this.height * 0.6, life: 12, maxLife: 12, r: 70, facing: this.facing, color: this.slashColor || '#ff5b5b', angle: -0.25, seed: Math.random() * 10 });
            playSfx('slash');
          }
        } else if (this.attackState === 'attack') {
          this.attackTimer--;
          this.vx += this.facing * 0.9 * (this.speedMul || 1);
          if (this.attackTimer <= 0) {
            this.attackState = 'recover';
            this.attackTimer = 16;
          }
        } else if (this.attackState === 'recover') {
          this.attackTimer--;
          this.vx *= 0.85;
          if (this.attackTimer <= 0) {
            this.attackState = 'idle';
            this.attackCooldown = this.attackCooldownBase || 35;
          }
        }
      } else {
        if (this.attackCooldown > 0) this.attackCooldown--;
        if (this.stateTimer > 0) this.stateTimer--;

        if (playerOffenseTimer > 0 && dist < 240) {
          if (this.state !== 'evade') {
            this.state = 'evade';
            this.stateTimer = 24;
            this.strafeDir = Math.random() > 0.5 ? 1 : -1;
          }
        } else if (dist > 520) {
          this.state = 'patrol';
          this.stateTimer = 0;
        } else if (this.stateTimer <= 0 && sameHeight && dist < 420) {
          const roll = Math.random();
          if (dist < 120 && roll < 0.7) {
            this.state = 'retreat';
            this.stateTimer = 18;
          } else if (roll < 0.35) {
            this.state = 'chase';
            this.stateTimer = 28;
          } else if (roll < 0.55) {
            this.state = 'strafe';
            this.stateTimer = 24;
            this.strafeDir = Math.random() > 0.5 ? 1 : -1;
          } else if (roll < 0.7) {
            this.state = 'feint';
            this.stateTimer = 18;
          } else {
            this.state = 'wait';
            this.stateTimer = 16;
          }
        }

        if (sameHeight && dist < this.attackRange && this.attackCooldown <= 0 && playerOffenseTimer <= 0 && this.state !== 'evade' && this.state !== 'retreat') {
          this.attackState = 'windup';
          this.attackTimer = 18;
          effects.push({ type: 'ring', x: this.x, y: this.y - this.height * 0.5, life: 12, maxLife: 12, r: 18, color: this.ringColor || '#ff5b5b' });
        } else {
          if (this.state === 'chase') {
            this.vx += Math.sign(dx) * 0.5 * (this.speedMul || 1);
          } else if (this.state === 'strafe') {
            this.vx += this.strafeDir * 0.4 * (this.speedMul || 1);
            if (dist < 140) this.vx += -Math.sign(dx) * 0.25 * (this.speedMul || 1);
          } else if (this.state === 'retreat' || this.state === 'evade') {
            this.vx += -Math.sign(dx) * 0.55 * (this.speedMul || 1);
          } else if (this.state === 'feint') {
            const toward = this.stateTimer > 10 ? 1 : -1;
            this.vx += Math.sign(dx) * 0.45 * toward * (this.speedMul || 1);
          } else if (this.state === 'wait') {
            this.vx *= 0.7;
          } else {
            const leftBound = this.spawnX - this.patrolRange;
            const rightBound = this.spawnX + this.patrolRange;
            if (this.x < leftBound) this.patrolDir = 1;
            if (this.x > rightBound) this.patrolDir = -1;
            this.vx += this.patrolDir * 0.3 * (this.speedMul || 1);
          }
        }
      }

      this.vx *= this.onGround ? 0.9 : 0.98;
      this.x += this.vx;

      const minX = (this.platform && this.platform.ground) ? 35 : (this.platform.x + 35);
      const maxX = (this.platform && this.platform.ground) ? (STAGE_LENGTH - 35) : (this.platform.x + this.platform.w - 35);
      if (this.x < minX) { this.x = minX; this.vx = Math.abs(this.vx); }
      if (this.x > maxX) { this.x = maxX; this.vx = -Math.abs(this.vx); }
    }

    draw(ctx) {
      if (this.hp <= 0 && this.deadTimer > 30) return;
      const blink = this.invuln > 0 && Math.floor(this.invuln / 3) % 2 === 0;
      ctx.save();
      ctx.translate(this.x, this.y);

      // 影
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#1b1b1b';
      ctx.beginPath();
      ctx.ellipse(0, 0, this.width * 0.45, this.height * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = blink ? 0.5 : 1.0;
      ctx.translate(0, -this.height);

      const rX = this.width * 0.5;
      const rY = this.height * 0.45;
      const bodyY = this.height;

      const grad = ctx.createLinearGradient(0, bodyY - rY * 1.2, 0, bodyY + rY);
      grad.addColorStop(0, this.bodyTop || '#3b0f1a');
      grad.addColorStop(1, this.bodyBottom || '#120409');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, bodyY - rY, rX, rY, 0, 0, Math.PI * 2);
      ctx.fill();

      const accent = this.accent || this.eyeColor || '#ffffff';
      if (this.style === 'knight') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(accent, 0.9);
        ctx.fillRect(-rX * 0.65, bodyY - rY * 1.05, rX * 1.3, rY * 0.32);
        ctx.fillStyle = colorWithAlpha('#ffffff', 0.35);
        ctx.fillRect(-rX * 0.4, bodyY - rY * 0.86, rX * 0.8, rY * 0.12);
        ctx.fillStyle = colorWithAlpha(accent, 0.85);
        ctx.beginPath();
        ctx.moveTo(-rX * 0.6, bodyY - rY * 1.08);
        ctx.lineTo(-rX * 0.98, bodyY - rY * 1.42);
        ctx.lineTo(-rX * 0.38, bodyY - rY * 1.2);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(rX * 0.6, bodyY - rY * 1.08);
        ctx.lineTo(rX * 0.98, bodyY - rY * 1.42);
        ctx.lineTo(rX * 0.38, bodyY - rY * 1.2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (this.style === 'mage') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(this.bodyBottom, 0.9);
        ctx.beginPath();
        ctx.moveTo(-rX * 0.9, bodyY - rY * 0.2);
        ctx.lineTo(0, bodyY + rY * 0.9);
        ctx.lineTo(rX * 0.9, bodyY - rY * 0.2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = colorWithAlpha(accent, 0.85);
        ctx.beginPath();
        ctx.arc(0, bodyY - rY * 1.05, rX * 0.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (this.style === 'stalker') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(accent, 0.85);
        for (let i = 0; i < 4; i++) {
          const sx = -rX * 0.7 + i * (rX * 0.45);
          const sy = bodyY - rY * 1.15;
          ctx.beginPath();
          ctx.moveTo(sx, sy + 8);
          ctx.lineTo(sx + 12, sy - 12);
          ctx.lineTo(sx + 24, sy + 8);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      } else if (this.style === 'brute') {
        ctx.save();
        ctx.fillStyle = colorWithAlpha(accent, 0.8);
        ctx.fillRect(-rX * 0.95, bodyY - rY * 0.7, rX * 0.42, rY * 0.35);
        ctx.fillRect(rX * 0.53, bodyY - rY * 0.7, rX * 0.42, rY * 0.35);
        ctx.restore();
      } else if (this.style === 'scout') {
        ctx.save();
        ctx.strokeStyle = colorWithAlpha(accent, 0.7);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-rX * 0.2, bodyY - rY * 1.05);
        ctx.lineTo(-rX * 0.35, bodyY - rY * 1.35);
        ctx.moveTo(rX * 0.2, bodyY - rY * 1.05);
        ctx.lineTo(rX * 0.35, bodyY - rY * 1.35);
        ctx.stroke();
        ctx.restore();
      }

      ctx.fillStyle = this.eyeColor || '#ff4d6d';
      ctx.beginPath();
      ctx.arc(-14, bodyY - rY - 8, 5, 0, Math.PI * 2);
      ctx.arc(14, bodyY - rY - 6, 4, 0, Math.PI * 2);
      ctx.fill();

      if (this.attackState === 'windup') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = 'rgba(255, 80, 80, 0.35)';
        ctx.beginPath();
        ctx.ellipse(0, bodyY - rY, rX * 0.9, rY * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // HPバー
      const hpRatio = Math.max(0, this.hpDisplay / this.maxHp);
      const lagRatio = Math.max(0, this.hpLag / this.maxHp);
      const barW = 64;
      const barH = 6;
      const barX = -barW / 2;
      const barY = bodyY - rY - 26;
      ctx.globalAlpha = 1;
      drawKhHpBar(ctx, barX, barY, barW, barH, hpRatio, lagRatio, {
        radius: 3,
        pad: 1,
        ticks: false,
        sheen: false,
        alpha: 0.9
      });

      ctx.restore();
    }
  }

  function triggerDeckRotate(dir = 1, steps = 1) {
    const stepDir = dir >= 0 ? 1 : -1;
    const stepCount = Math.max(1, Math.floor(steps || 1));
    if (commandRotateFrames <= 0) {
      commandRotateFrames = COMMAND_ROTATE_FRAMES;
      commandRotateDir = stepDir;
      commandRotateQueue = stepCount - 1;
      playSfx('rotate');
    } else {
      commandRotateQueue += stepCount;
      commandRotateDir = stepDir;
    }
  }

  function updateCommandDeck() {
    for (let cmd of commandDeck) {
      if (cmd.timer > 0) cmd.timer--;
    }
    if (commandRotateFrames > 0) {
      commandRotateFrames--;
      if (commandRotateFrames === 0) {
        if (commandRotateDir > 0) {
          commandDeck.push(commandDeck.shift());
        } else {
          commandDeck.unshift(commandDeck.pop());
        }
        if (commandRotateQueue > 0) {
          commandRotateQueue--;
          commandRotateFrames = COMMAND_ROTATE_FRAMES;
          playSfx('rotate');
        }
      }
    } else if (commandRotateQueue > 0) {
      commandRotateQueue--;
      commandRotateFrames = COMMAND_ROTATE_FRAMES;
      playSfx('rotate');
    }
  }

  function resolveFxColor(color, fallback) {
    if (Array.isArray(color) && color.length > 0) {
      return color[Math.floor(Math.random() * color.length)];
    }
    return color || fallback;
  }

  function colorWithAlpha(color, alpha) {
    if (!color) return `rgba(255,255,255,${alpha})`;
    const c = String(color).trim();
    if (c.startsWith('#')) {
      let hex = c.slice(1);
      if (hex.length === 3) hex = hex.split('').map(ch => ch + ch).join('');
      if (hex.length === 6) {
        const num = parseInt(hex, 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;
        return `rgba(${r},${g},${b},${alpha})`;
      }
    }
    if (c.startsWith('rgb')) {
      const nums = c.replace(/rgba?\(|\)|\s/g, '').split(',');
      if (nums.length >= 3) {
        return `rgba(${nums[0]},${nums[1]},${nums[2]},${alpha})`;
      }
    }
    return color;
  }

  function spawnSparks(x, y, count, color, spread = Math.PI * 2, speed = 6, life = 18) {
    const density = getFxDensity();
    if (density <= 0) return;
    for (let i = 0; i < count; i++) {
      if (density < 1 && Math.random() > density) continue;
      if (!consumeFxBudget()) break;
      const ang = (Math.random() - 0.5) * spread;
      const spd = speed * (0.4 + Math.random() * 0.8);
      const sparkColor = resolveFxColor(color, '#ffffff');
      effects.push({
        type: 'spark',
        x,
        y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        gravity: 0.12,
        life,
        maxLife: life,
        color: sparkColor,
        size: 2 + Math.random() * 3
      });
    }
  }

  function spawnShockwave(x, y, color) {

  function getFxDensity() {
    const len = effects.length;
    if (len > FX_HARD_CAP) return 0;
    if (len > FX_SOFT_CAP) return 0.4;
    if (len > FX_WARN_CAP) return 0.7;
    return 1;

  function consumeFxBudget() {
    if (effects.length >= FX_HARD_CAP) return false;
    if (fxBudget <= 0) return false;
    fxBudget--;

  function spawnCoinBurst(x, y, enemy = null) {

  function initCoins() {
    coins = [];

    if (ground) {

      for (let x = ground.x + 260; x < ground.x + ground.w - 260; x += spacing) {

          for (let i = 0; i < arcCount; i++) {

            spawnCoin(gx + offset, arcY, { float: true, baseY: arcY, r: 26 });
          }
        }
      }
    }
    const ledges = platforms.filter(p => !p.ground && !p.ramp && p.w >= 180);
    for (let p of ledges) {
      const count = Math.random() < 0.6 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        const t = count === 1 ? 0.5 : (0.3 + i * 0.4);

  function collectCoin(coin) {
    if (!coin || coin.collected) return;
    coin.collected = true;
    coinCount += coin.value || 1;
    coinPulse = Math.min(1.2, coinPulse + 0.35);
    playSfx('coin');
    const cy = coin.renderY !== undefined ? coin.renderY : coin.y;
    effects.push({ type: 'ring', x: coin.x, y: cy, life: 14, maxLife: 14, r: 30, color: '#ffe7a6' });

  function updateCoins() {
    const px = player.x;
    const py = player.y - player.height * 0.55;
    for (let coin of coins) {
      if (coin.collected) continue;
      if (coin.dynamic) {
        const prevY = coin.y;
        coin.vy += COIN_GRAVITY;
        coin.x += coin.vx;
        coin.y += coin.vy;
        coin.vx *= COIN_AIR_DRAG;

        let grounded = false;
        for (let p of platforms) {
          if (p.ground) continue;
          if (coin.x + coin.r < p.x || coin.x - coin.r > p.x + p.w) continue;
          const topY = p.y;
          if (prevY <= topY - coin.r && coin.y >= topY - coin.r) {
            coin.y = topY - coin.r;
            if (Math.abs(coin.vy) > 1.1) {
              coin.vy = -coin.vy * coin.bounce;
              coin.vx *= 0.92;
            } else {
              coin.vy = 0;
              grounded = true;
            }
            break;
          }
        }
        if (!grounded) {
          const groundYAt = groundHeightAt(coin.x);
          if (prevY <= groundYAt - coin.r && coin.y >= groundYAt - coin.r) {
            coin.y = groundYAt - coin.r;
            if (Math.abs(coin.vy) > 1.1) {
              coin.vy = -coin.vy * coin.bounce;
              coin.vx *= 0.92;
            } else {
              coin.vy = 0;
              grounded = true;
            }
          }
        }
        if (grounded) {
          coin.vx *= COIN_GROUND_DRAG;
          if (Math.abs(coin.vx) < 0.05) coin.vx = 0;
          coin.restTimer++;
          if (coin.restTimer > 24) {
            coin.dynamic = false;
            coin.float = true;
            coin.baseY = coin.y;
            coin.vx = 0;
            coin.vy = 0;
          }
        } else {
          coin.restTimer = 0;
        }
      }

      const bob = coin.float ? Math.sin(stageTime * COIN_FLOAT_SPEED + coin.bobPhase) * COIN_FLOAT_AMPLITUDE : 0;
      coin.renderY = (coin.float ? coin.baseY : coin.y) + bob;
      coin.spin += coin.spinSpeed;

      const dxp = coin.x - px;
      const dyp = coin.renderY - py;
      if (Math.hypot(dxp, dyp) <= COIN_COLLECT_RADIUS) {
        collectCoin(coin);
        continue;
      }
      for (let atk of attacks) {
        if (atk.delay && atk.delay > 0) continue;
        const dx = coin.x - atk.x;
        const dy = coin.renderY - atk.y;
        if (Math.hypot(dx, dy) <= atk.r + coin.r) {
          collectCoin(coin);
          break;
        }
      }
    }
    coins = coins.filter(c => !c.collected);
  }

  function updateHpDisplay(entity, fast = 0.24, slow = 0.06, hold = 10) {
    if (entity.hpDisplay === undefined) {
      entity.hpDisplay = entity.hp;
      entity.hpLag = entity.hp;
      entity.hpLagHold = 0;
      entity.lastHp = entity.hp;
      return;
    }
    const hp = entity.hp;
    if (hp < entity.lastHp) {
      entity.hpLagHold = hold;
    }
    entity.lastHp = hp;
    entity.hpDisplay += (hp - entity.hpDisplay) * fast;
    if (entity.hpLag > hp) {
      if (entity.hpLagHold > 0) entity.hpLagHold--;
      else entity.hpLag += (hp - entity.hpLag) * slow;
    } else {
      entity.hpLag += (hp - entity.hpLag) * fast;
    }
    entity.hpDisplay = Math.max(0, Math.min(entity.maxHp, entity.hpDisplay));
    entity.hpLag = Math.max(0, Math.min(entity.maxHp, entity.hpLag));
  }

  function drawRoundedRect(ctx, x, y, w, h, r) {
    const radius = Math.min(r, h / 2, w / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
  }

  function drawKhHpBar(ctx, x, y, w, h, ratio, lagRatio, opts = {}) {
    const radius = opts.radius ?? Math.max(2.5, h * 0.5);
    const pad = opts.pad ?? Math.max(1, Math.floor(h * 0.22));
    const innerX = x + pad;
    const innerY = y + pad;
    const innerW = w - pad * 2;
    const innerH = h - pad * 2;
    if (innerW <= 1 || innerH <= 1) return;
    const innerR = Math.max(1, radius - pad);

    ctx.save();
    if (opts.alpha !== undefined) ctx.globalAlpha *= opts.alpha;

    // Outer shell
    const shellGrad = ctx.createLinearGradient(0, y, 0, y + h);
    shellGrad.addColorStop(0, HP_BAR_COLORS.shellTop);
    shellGrad.addColorStop(0.6, HP_BAR_COLORS.shellMid);
    shellGrad.addColorStop(1, HP_BAR_COLORS.shellBottom);
    ctx.fillStyle = shellGrad;
    drawRoundedRect(ctx, x, y, w, h, radius);
    ctx.fill();

    // Outline
    ctx.strokeStyle = HP_BAR_COLORS.border;
    ctx.lineWidth = 2;
    drawRoundedRect(ctx, x + 1, y + 1, w - 2, h - 2, Math.max(1, radius - 1));
    ctx.stroke();

    // Track
    const trackGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
    trackGrad.addColorStop(0, HP_BAR_COLORS.trackTop);
    trackGrad.addColorStop(1, HP_BAR_COLORS.trackBottom);
    ctx.fillStyle = trackGrad;
    drawRoundedRect(ctx, innerX, innerY, innerW, innerH, innerR);
    ctx.fill();

    const lagW = Math.max(0, Math.min(innerW, innerW * lagRatio));
    if (lagW > 0.25) {
      const lagGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
      lagGrad.addColorStop(0, HP_BAR_COLORS.damageTop);
      lagGrad.addColorStop(1, HP_BAR_COLORS.damageBottom);
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.shadowColor = HP_BAR_COLORS.damageGlow;
      ctx.shadowBlur = 10;
      ctx.fillStyle = lagGrad;
      drawRoundedRect(ctx, innerX, innerY, lagW, innerH, innerR);
      ctx.fill();
      ctx.restore();
    }

    const hpW = Math.max(0, Math.min(innerW, innerW * ratio));
    if (hpW > 0.25) {
      const hpGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
      hpGrad.addColorStop(0, HP_BAR_COLORS.fillTop);
      hpGrad.addColorStop(1, HP_BAR_COLORS.fillBottom);
      ctx.save();
      ctx.shadowColor = HP_BAR_COLORS.fillGlow;
      ctx.shadowBlur = 8;
      ctx.fillStyle = hpGrad;
      drawRoundedRect(ctx, innerX, innerY, hpW, innerH, innerR);
      ctx.fill();
      ctx.restore();

      if (opts.sheen !== false && innerH >= 5) {
        ctx.save();
        ctx.globalAlpha *= 0.45;
        const sheenGrad = ctx.createLinearGradient(innerX, innerY, innerX + innerW, innerY + innerH);
        sheenGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
        sheenGrad.addColorStop(0.35, 'rgba(255,255,255,0.0)');
        ctx.fillStyle = sheenGrad;
        ctx.fillRect(innerX + 1, innerY + 1, Math.max(0, hpW - 2), Math.max(1, innerH * 0.5));
        ctx.restore();
      }
    }

    if (opts.ticks !== false && innerW > 40) {
      ctx.save();
      drawRoundedRect(ctx, innerX, innerY, innerW, innerH, innerR);
      ctx.clip();
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha *= 0.65;
      ctx.strokeStyle = HP_BAR_COLORS.tick;
      ctx.lineWidth = 1;
      ctx.beginPath();
      const segments = opts.segments || 12;
      const step = innerW / segments;
      for (let i = 1; i < segments; i++) {
        const tx = innerX + step * i;
        ctx.moveTo(tx, innerY + 0.5);
        ctx.lineTo(tx, innerY + innerH - 0.5);
      }
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function getBasicSwingRange(stepValue) {
    if (stepValue === 1) return { start: -2.4, end: 0.65 };    // 上から大きく
    if (stepValue === 2) return { start: -0.2, end: 1.25 };    // 横振り
    if (stepValue === 3) return { start: 1.7, end: -0.4 };     // 下から上へ
    return { start: -2.9, end: 0.9 };                          // フィニッシュ：大きく振り下ろし
  }

  function getBasicSwordLocal(pud, stepValue) {
    const topW = 96;
    const botW = 180;
    const h = 136;
    const rightArmBaseX = topW / 2 + ((botW / 2 - topW / 2) * 0.55);
    const rightArmBaseY = h * 0.55;
    const handOffsetX = stepValue === 2 ? 6 : stepValue === 3 ? 2 : stepValue === 4 ? -2 : 4;
    const handOffsetY = stepValue === 1 ? -6 : stepValue === 2 ? 6 : stepValue === 3 ? -10 : -16;
    const handX = rightArmBaseX + 34 + handOffsetX;
    const handY = rightArmBaseY - 30 - pud.rightArmOffset + handOffsetY;
    const bladeLen = stepValue === 4 ? 132 : 112;
    const bladeW = stepValue === 4 ? 22 : 18;
    const { start, end } = getBasicSwingRange(stepValue);
    return { handX, handY, bladeLen, bladeW, start, end, h };
  }

  function getBasicSwing(stepValue, prog) {
    const { start, end } = getBasicSwingRange(stepValue);
    const ease = 1 - Math.pow(1 - Math.min(1, Math.max(0, prog)), 3);
    return start + (end - start) * ease;
  }

  function getBasicSwordTipWorld(stepValue, swing, facingOverride) {
    const sword = getBasicSwordLocal(player, stepValue);
    const tipX = sword.handX + Math.cos(swing) * sword.bladeLen;
    const tipY = sword.handY + Math.sin(swing) * sword.bladeLen;

    const face = facingOverride !== undefined ? facingOverride : (player.facing < 0 ? -1 : 1);
    const hurtRatio = (!deathSequence && player.hurtTimer > 0) ? player.hurtTimer / 18 : 0;
    const hurtRot = hurtRatio * -0.35 * player.hurtDir;
    let lx = tipX;
    let ly = tipY - player.height;
    const skew = -player.skewC * face;
    lx = lx + ly * skew;
    const rot = player.renderRot + hurtRot;
    const cos = Math.cos(rot);
    const sin = Math.sin(rot);
    const rx = lx * cos - ly * sin;
    const ry = lx * sin + ly * cos;
    return {
      x: player.x + rx * face * player.scaleX,
      y: player.y + ry * player.scaleY
    };
  }

  function getBasicSwordTipCurrent(stepValue, facingOverride) {
    const maxT = player.attackTimerMax || 1;
    const prog = 1 - player.attackTimer / maxT;
    const swing = getBasicSwing(stepValue, prog);
    return getBasicSwordTipWorld(stepValue, swing, facingOverride);
  }

  function spawnBasicAttack() {

    const facing = lockTarget ? (lockTarget.x >= player.x ? 1 : -1) : (player.facing || 1);
