      step = Math.min(BASIC_COMBO_MAX, basicComboStep + 1);
    }
    basicComboStep = step;

    const dmg = step === 1 ? 6 : step === 2 ? 7 : step === 3 ? 8 : 12;
    const radius = step === 1 ? 72 : step === 2 ? 82 : step === 3 ? 92 : 112;
    const range = step === 1 ? 80 : step === 2 ? 95 : step === 3 ? 110 : 130;
    const knock = step === 1 ? 4 : step === 2 ? 5 : step === 3 ? 6 : 12;
    const launch = 0;
    const hitStopPower = step === 4 ? 3 : 2;
    const hitstun = step === 4 ? 18 : 12;

    player.attackTimer = step === BASIC_COMBO_MAX ? 22 : (10 + step * 2);
    player.attackTimerMax = player.attackTimer;
    player.attackType = 'basic';
    player.attackDash = facing * (step === BASIC_COMBO_MAX ? 0.6 : (1.1 + step * 0.35));
    player.attackComboStep = step;
    playerOffenseTimer = Math.max(playerOffenseTimer, 10 + step * 2);
    player.slamActive = step === BASIC_COMBO_MAX;
    if (step === BASIC_COMBO_MAX && player.onGround) {
      player.vy = JUMP_FORCE * 0.75;
      player.onGround = false;
      player.scaleVelX -= 0.2;
      player.scaleVelY += 0.26;
    }

    const tip = getBasicSwordTipCurrent(step, facing);
    const attackX = player.x + facing * range;
    const attackY = baseY;

    attacks.push({
      x: attackX,
      y: attackY,
      r: radius,
      damage: dmg,
      frames: 10,
      knockback: knock,
      launch,
      hitStop: hitStopPower,
      hitstun,
      finisher: step === BASIC_COMBO_MAX,
      hitIds: new Set()
    });

    const slashPalette = step === BASIC_COMBO_MAX ? FX_PALETTES.shock : FX_PALETTES.slash;
    const stepColor = resolveFxColor(slashPalette, step === BASIC_COMBO_MAX ? '#fff2a6' : '#aee7ff');
    const stepAccent = resolveFxColor(slashPalette, stepColor);
    effects.push({ type: 'basicSlash', life: 12 + step * 2, maxLife: 12 + step * 2, r: radius, facing, color: stepColor, accent: stepAccent, edge: '#ffffff', seed: Math.random() * 10, delay: 1, step });
    spawnSparks(tip.x + facing * 8, tip.y - 2, 6 + step * 2, slashPalette, Math.PI * 0.8, 4.5, 12);
    spawnShockwave(attackX - facing * 20, baseY, stepAccent);
    if (step === BASIC_COMBO_MAX) {
      effects.push({ type: 'ring', x: tip.x, y: tip.y, life: 16, maxLife: 16, r: 65, color: stepAccent });
      screenFlash = Math.max(screenFlash, 0.22);
      screenShake += 2.2;
      basicComboCooldown = 16;
      basicComboTimer = 0;
      basicComboStep = 0;
      basicChainQueued = false;
    } else {
      basicComboTimer = BASIC_COMBO_WINDOW;
    }
    screenShake += 0.9;
    rumble(step === BASIC_COMBO_MAX ? 0.45 : 0.22, step === BASIC_COMBO_MAX ? 120 : 60);
    playSfx('basic');
  }

  function startCounterAttack() {
    if (player.counterActive) return false;
    if (player.guardSuccessTimer <= 0) return false;
    if (player.dodgeTimer > 0) return false;
    const target = (player.counterTarget && player.counterTarget.hp > 0)
      ? player.counterTarget
      : (lockOnActive ? lockOnTarget : softLockTarget) || findNearestEnemy(COUNTER_TRACK_RANGE, true);
    if (!target) return false;

    player.guardSuccessTimer = 0;
    player.counterActive = true;
    player.counterTimer = COUNTER_HIT_COUNT * COUNTER_HIT_INTERVAL + 12;
    player.counterHitIndex = 0;
    player.counterHitDelay = 0;
    player.counterTarget = target;
    player.counterFlash = 18;
    player.guardTimer = 0;
    player.guardFlash = 0;
    player.attackTimer = player.counterTimer;
    player.attackTimerMax = player.attackTimer;
    player.attackType = 'counter';
    player.attackDash = 0;
    player.attackComboStep = 0;
    player.slamActive = false;
    basicComboStep = 0;
    basicComboTimer = 0;
    basicChainQueued = false;
    basicComboCooldown = 0;
    playerOffenseTimer = Math.max(playerOffenseTimer, player.counterTimer);
    player.invuln = Math.max(player.invuln, 24);

    const guardY = player.y - player.height * 0.55;
    const counterColor = resolveFxColor(FX_PALETTES.guard, '#a6f0ff');
    effects.push({ type: 'guardPulse', x: player.x, y: guardY, life: 18, maxLife: 18, r: 140, color: counterColor });
    effects.push({ type: 'ring', x: player.x, y: guardY, life: 20, maxLife: 20, r: 120, color: counterColor, width: 4, glow: true });
    effects.push({ type: 'impact', x: player.x, y: guardY, life: 14, maxLife: 14, r: 70, color: '#ffffff' });
    spawnSparks(player.x, guardY, 18, [counterColor, '#ffffff'], Math.PI * 2, 7, 20);
    screenShake += 2.2;
    screenFlash = Math.max(screenFlash, 0.25);
    rumble(0.55, 150, 0.35);
    playSfx('slash');
    return true;
  }

  function endCounterAttack() {
    player.counterActive = false;
    player.counterTimer = 0;
    player.counterHitIndex = 0;
    player.counterHitDelay = 0;
    player.counterTarget = null;
    player.counterFlash = 0;
    player.attackTimer = 0;
    player.attackTimerMax = 0;
    player.attackType = '';
    player.attackDash = 0;
    player.attackComboStep = 0;
  }

  function spawnCounterHit(target) {
    if (!target || target.hp <= 0) return;
    const hitIndex = player.counterHitIndex + 1;
    const dir = target.x >= player.x ? 1 : -1;
    player.facing = dir;
    const baseY = target.y - target.height * 0.55;
    const radius = 120 + hitIndex * 6;
    const damage = 14 + hitIndex * 3;
    const knock = hitIndex === COUNTER_HIT_COUNT ? 14 : 6;
    const launch = hitIndex === COUNTER_HIT_COUNT ? 12 : 0;
    attacks.push({
      x: target.x,
      y: baseY,
      r: radius,
      damage,
      frames: 8,
      knockback: knock,
      launch,
      hitStop: hitIndex === COUNTER_HIT_COUNT ? 4 : 3,
      hitstun: 14 + hitIndex,
      finisher: hitIndex === COUNTER_HIT_COUNT,
      hitIds: new Set()
    });
    const counterColor = resolveFxColor(FX_PALETTES.guard, '#a6f0ff');
    const counterAccent = '#ffffff';
    effects.push({ type: 'slash', x: target.x, y: baseY, life: 16, maxLife: 16, r: radius * 1.15, facing: dir, color: counterColor, accent: counterAccent, angle: -0.75 + hitIndex * 0.08, stretch: 1.25, seed: Math.random() * 10 });
    effects.push({ type: 'ring', x: target.x, y: baseY, life: 16, maxLife: 16, r: 70 + hitIndex * 8, color: counterAccent, width: 3, glow: true });
    effects.push({ type: 'guardPulse', x: target.x, y: baseY, life: 12, maxLife: 12, r: 90 + hitIndex * 6, color: counterColor });
    spawnSparks(target.x, baseY, 14 + hitIndex * 2, [counterColor, '#ffffff'], Math.PI * 2, 8, 18);
    spawnShockwave(target.x, baseY, counterColor);
    screenShake += hitIndex === COUNTER_HIT_COUNT ? 2.6 : 1.6;
    screenFlash = Math.max(screenFlash, hitIndex === COUNTER_HIT_COUNT ? 0.28 : 0.18);
    if (hitIndex === COUNTER_HIT_COUNT) {
      rumble(0.6, 160, 0.35);
    } else {
      rumble(0.35, 100, 0.25);
    }
    playSfx('slash');
    player.scaleVelX -= 0.12;
    player.scaleVelY += 0.12;
    player.counterFlash = Math.max(player.counterFlash, 12);
    player.counterHitIndex++;
    player.counterHitDelay = COUNTER_HIT_INTERVAL;
    player.invuln = Math.max(player.invuln, 10);
    if (player.counterHitIndex >= COUNTER_HIT_COUNT) {
      endCounterAttack();
    }
  }

  function updateCounterAttack() {
    if (!player.counterActive) return;
    if (player.counterTimer > 0) player.counterTimer--;
    if (player.counterFlash > 0) player.counterFlash--;
    if (!player.counterTarget || player.counterTarget.hp <= 0) {
      player.counterTarget = findNearestEnemy(COUNTER_TRACK_RANGE, true);
    }
    const target = player.counterTarget;
    if (!target) {
      endCounterAttack();
      return;
    }
    const dir = target.x >= player.x ? 1 : -1;
    player.facing = dir;
    const desiredX = target.x - dir * 90;
    const desiredY = target.y;
    player.x += (desiredX - player.x) * 0.35;
    player.y += (desiredY - player.y) * 0.25;
    player.vx *= 0.35;
    player.vy *= 0.35;
    player.scaleVelX += dir * 0.08;
    player.scaleVelY -= 0.06;

    if (Math.random() < 0.7) {
      effects.push({ type: 'afterimage', x: player.x, y: player.y, life: 10, maxLife: 10, color: '#e8f7ff', scale: 1.35 });
    }
    if (stageTime % 3 === 0) {
      spawnSparks(player.x, player.y - player.height * 0.55, 4, ['#ffffff', '#a6f0ff'], Math.PI * 2, 4.5, 10);
    }

    if (player.counterHitDelay > 0) player.counterHitDelay--;
    if (player.counterHitDelay <= 0) {
      spawnCounterHit(target);
    }
    if (!player.counterActive) return;
    if (player.counterTimer <= 0) {
      endCounterAttack();
    }
  }

  function tryBasicAttack() {
    if (player.guardSuccessTimer > 0) {
      if (startCounterAttack()) return;
    }
    if (basicComboCooldown > 0) return;
    if (player.attackType && player.attackType !== 'basic') {
      if (basicComboTimer > 0 && basicComboStep > 0 && basicComboStep < BASIC_COMBO_MAX) {
        basicChainQueued = true;
      }
      return;
    }
    if (player.attackTimer > 0) {
      if (basicComboTimer > 0 && basicComboStep > 0 && basicComboStep < BASIC_COMBO_MAX) {
        basicChainQueued = true;
      }
      return;
    }
    basicChainQueued = false;
    spawnBasicAttack();
  }

  function findNextReadyCommandSteps() {
    const deckLen = commandDeck.length;
    if (deckLen <= 1) return 0;
    for (let i = 1; i < deckLen; i++) {
      const idx = (COMMAND_ACTIVE_INDEX + i + deckLen) % deckLen;
      const nextCmd = commandDeck[idx];
      if (nextCmd && nextCmd.timer <= 0) return i;
    }
    return 0;
  }

  function tryUseCommand() {
    if (commandRotateFrames > 0) return;
    const cmd = commandDeck[COMMAND_ACTIVE_INDEX] || commandDeck[0];
    if (cmd.timer > 0) return;
    spawnAttack(cmd);
    cmd.timer = cmd.cooldown;
    const steps = findNextReadyCommandSteps();
    triggerDeckRotate(1, steps > 0 ? steps : 1);
  }

  function damageEnemy(enemy, atk) {
    if (enemy.hp <= 0 || enemy.invuln > 0) return;
    enemy.hp = Math.max(0, enemy.hp - atk.damage);
    enemy.invuln = 8;
    enemy.hitstun = atk.hitstun || 12;
    enemy.attackState = 'idle';
    enemy.attackTimer = 0;
    enemy.attackCooldown = 20;
    const dir = enemy.x < atk.x ? -1 : 1;
    enemy.vx += dir * (atk.knockback || 6);
    if (atk.launch) {
      enemy.vy = -atk.launch;
      enemy.onGround = false;
    }
    if (atk.finisher) {
      enemy.vx += dir * 2.5;
      enemy.hitstun = Math.max(enemy.hitstun, 18);
      spawnImpact(enemy.x, enemy.y - enemy.height * 0.6, '#fff1a8');
      screenShake += 1.8;
      rumble(0.45, 120, 0.3);
    }
    effects.push({ type: 'hit', x: enemy.x, y: enemy.y - enemy.height * 0.6, life: 12, maxLife: 12, r: 26 });
    spawnImpact(enemy.x, enemy.y - enemy.height * 0.6, '#ffd3d3');
    spawnSparks(enemy.x, enemy.y - enemy.height * 0.6, 10, '#ffb2b2', Math.PI * 2, 5, 14);
    screenShake += 1.2;
    rumble(0.22, 70, 0.18);
    applyHitStop(atk.hitStop || 2, 0.2);
    playSfx('hit');
    comboCount = comboTimer > 0 ? comboCount + 1 : 1;
    comboTimer = COMBO_WINDOW;
    if (enemy.hp <= 0) {
      spawnCoinBurst(enemy.x, enemy.y - enemy.height * 0.55, enemy);
      effects.push({ type: 'burst', x: enemy.x, y: enemy.y - enemy.height * 0.5, life: 20, maxLife: 20, r: 90 });
      spawnSparks(enemy.x, enemy.y - enemy.height * 0.5, 18, '#ff7aa0', Math.PI * 2, 7, 20);
      screenShake += 3;
      applyHitStop(4, 0.35);
      rumble(0.55, 160, 0.4);
    }
  }

  function damagePlayer(amount, sourceX) {
    if (player.invuln > 0 || gameOver || playerOffenseTimer > 0) return;
    player.hp = Math.max(0, player.hp - amount);
    player.invuln = 50;
    comboCount = 0;
    comboTimer = 0;
    playerOffenseTimer = 0;
    basicComboCooldown = 0;
    basicComboTimer = 0;
    basicComboStep = 0;
    basicChainQueued = false;
    player.attackTimer = 0;
    player.attackType = '';
    player.attackDash = 0;
    player.slamActive = false;
    player.guardSuccessTimer = 0;
    if (player.counterActive) endCounterAttack();
    hpUiPulse = 0.7;
    hpUiShake = HP_SHAKE_FRAMES;
    const dir = player.x < sourceX ? -1 : 1;
    player.vx += dir * 9;
    player.vy = Math.max(0, player.vy);
    player.hurtTimer = 18;
    player.hurtDir = dir;
    effects.push({ type: 'hit', x: player.x, y: player.y - player.height * 0.6, life: 14, maxLife: 14, r: 30 });
    spawnImpact(player.x, player.y - player.height * 0.6, '#ffb9c8');
    spawnSparks(player.x, player.y - player.height * 0.6, 12, '#ffccd0', Math.PI * 2, 6, 16);
    screenShake += 4;
    applyHitStop(4, 0.35);
    rumble(0.8, 200, 0.6);
    playSfx('hurt');
    if (player.hp <= 0) {
      if (!deathSequence) {
        deathSequence = true;
        deathTimer = 0;
        triggerGameOverAudio();
        player.vx = dir * 14;
        player.vy = -6.5;
        player.renderRot = -dir * 0.6;
        player.invuln = 999;
        player.hurtTimer = 0;
        player.attackTimer = 0;
        player.attackType = '';
        player.attackDash = 0;
        player.slamActive = false;
        player.deathFreeze = false;
        player.deathFreezeY = player.y;
        effects.push({ type: 'burst', x: player.x, y: player.y - player.height * 0.6, life: 24, maxLife: 24, r: 120 });
        spawnImpact(player.x, player.y - player.height * 0.6, '#bfe7ff');
        spawnSparks(player.x, player.y - player.height * 0.6, 18, ['#ffffff', '#9fd6ff'], Math.PI * 2, 7, 20);
        screenShake += 8;
        screenFlash = Math.max(screenFlash, 0.45);
        applyHitStop(6, 0.4);
      }
      rumble(1, 280, 0.8);
    }
  }

  function updateAttacks() {
    for (let atk of attacks) {
      if (atk.delay && atk.delay > 0) {
        atk.delay--;
        continue;
      }
      if (atk.type === 'projectile') {
        if (atk.target && atk.target.hp <= 0) atk.target = null;
        if (!atk.target) {
          atk.target = findNearestEnemyTo(atk.x, atk.y, atk.seekRange || 360);
        }
        if (atk.target) {
          const tx = atk.target.x;
          const ty = atk.target.y - atk.target.height * 0.5;
          const desired = Math.atan2(ty - atk.y, tx - atk.x);
          const ang = Math.atan2(atk.vy, atk.vx);
          const diff = normalizeAngle(desired - ang);
          const turn = atk.turn || 0.12;
          const speed = atk.speed || 6;
          const nextAng = ang + diff * turn;
          atk.vx = Math.cos(nextAng) * speed;
          atk.vy = Math.sin(nextAng) * speed;
        }
        atk.x += atk.vx;
        atk.y += atk.vy;
        const trailDensity = getFxDensity();
        const trailChance = 0.5 * trailDensity + 0.05;
        if (trailDensity > 0 && Math.random() < trailChance && consumeFxBudget()) {
          const trailColor = atk.accent || atk.color || (atk.visual === 'fire' ? '#ffb067' : (atk.visual === 'ice' ? '#cfefff' : '#bfe7ff'));
          effects.push({ type: 'spark', x: atk.x + (Math.random() - 0.5) * 6, y: atk.y + (Math.random() - 0.5) * 6, life: 10, maxLife: 10, color: trailColor, size: 2 + Math.random() * 2 });
        }
      }
      for (let e of enemies) {
        if (e.hp <= 0) continue;
        if (atk.hitIds.has(e.id)) continue;
        const ex = e.x;
        const ey = e.y - e.height * 0.5;
        const dx = ex - atk.x;
        const dy = ey - atk.y;
        const dist = Math.hypot(dx, dy);
        const hitRadius = (atk.r || 0) * ATTACK_RADIUS_SCALE;
        if (dist <= hitRadius + ENEMY_HIT_RADIUS) {
          damageEnemy(e, atk);
          atk.hitIds.add(e.id);
          if (atk.type === 'projectile') {
            const hitColor = atk.accent || atk.color || (atk.visual === 'fire' ? '#ffb067' : (atk.visual === 'ice' ? '#cfefff' : '#bfe7ff'));
            effects.push({ type: 'impact', x: atk.x, y: atk.y, life: 12, maxLife: 12, r: 40, color: hitColor });
            effects.push({ type: 'ring', x: atk.x, y: atk.y, life: 12, maxLife: 12, r: 30, color: hitColor });
            atk.frames = 0;
            break;
          }
        }
      }
      atk.frames--;
    }
    attacks = attacks.filter(a => a.frames > 0);
  }

  function updateEnemies() {
    for (let e of enemies) e.update(player);
    updateEnemyRespawns();
    enemies = enemies.filter(e => e.hp > 0 || e.deadTimer < 40);
  }

  function normalizeAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function findNearestEnemyTo(x, y, maxRange) {
    let best = null;
    let bestScore = maxRange;
    for (let e of enemies) {
      if (e.hp <= 0) continue;
      const ex = e.x;
      const ey = e.y - e.height * 0.6;
      const dist = Math.hypot(ex - x, ey - y);
      if (dist > maxRange) continue;
      if (dist < bestScore) {
        bestScore = dist;
        best = e;
      }
    }
    return best;
  }

  function findNearestEnemy(maxRange, preferFront = false) {
    let best = null;
    let bestScore = maxRange;
    const px = player.x;
    const py = player.y - player.height * 0.55;
    const facing = player.facing || 1;
    for (let e of enemies) {
      if (e.hp <= 0) continue;
      const ex = e.x;
      const ey = e.y - e.height * 0.6;
      const dx = ex - px;
      const dy = ey - py;
      const dist = Math.hypot(dx, dy);
      if (dist > maxRange) continue;
      let score = dist;
      if (preferFront && dx * facing < 0) score += 120;
      if (score < bestScore) {
        bestScore = score;
        best = e;
      }
    }
    return best;
  }

  function updateLockTargets() {
    softLockTarget = findNearestEnemy(SOFT_LOCK_RANGE, true);
    if (lockOnActive) {
      if (!lockOnTarget || lockOnTarget.hp <= 0) {
        lockOnActive = false;
        lockOnTarget = null;
      } else {
        const dx = lockOnTarget.x - player.x;
        const dy = (lockOnTarget.y - lockOnTarget.height * 0.6) - (player.y - player.height * 0.55);
        const dist = Math.hypot(dx, dy);
        if (dist > LOCK_BREAK_RANGE) {
          lockOnActive = false;
          lockOnTarget = null;
          playSfx('lockoff');
        }
      }
    }
  }

  function toggleLockOn() {
    if (lockOnActive) {
      lockOnActive = false;
      lockOnTarget = null;
      playSfx('lockoff');
      return;
    }
    const target = findNearestEnemy(LOCK_RANGE, false);
    if (target) {
      lockOnActive = true;
      lockOnTarget = target;
      playSfx('lockon');
    } else {
      playSfx('lockfail');
    }
  }

  function checkEnemyContact() {
    if (player.invuln > 0 || gameOver) return;
    const px = player.x;
    const py = player.y - player.height * 0.5;
    for (let e of enemies) {
      if (e.hp <= 0) continue;
      const ex = e.x;
      const ey = e.y - e.height * 0.5;
      const dx = ex - px;
      const dy = ey - py;
      const dist = Math.hypot(dx, dy);
      if (e.attackState === 'attack' && !e.attackHit && dist <= e.attackRange + PLAYER_HIT_RADIUS) {
        if (player.guardTimer > 0) {
          const guardColor = player.guardColor || '#7ee5ff';
          const guardY = player.y - player.height * 0.55;
          e.attackHit = true;
          player.guardTimer = Math.max(player.guardTimer, GUARD_BONUS_DURATION);
          player.guardTimerMax = Math.max(player.guardTimerMax, GUARD_BONUS_DURATION);
          player.guardFlash = 18;
          player.guardSuccessTimer = COUNTER_WINDOW;
          player.counterTarget = e;
          effects.push({ type: 'guardPulse', x: player.x, y: guardY, life: 18, maxLife: 18, r: 130, color: guardColor });
          effects.push({ type: 'ring', x: player.x, y: guardY, life: 20, maxLife: 20, r: 120, color: guardColor, width: 4, glow: true });
          effects.push({ type: 'ring', x: player.x, y: guardY, life: 26, maxLife: 26, r: 190, color: '#ffffff', width: 2, expand: 90 });
          effects.push({ type: 'impact', x: player.x, y: guardY, life: 12, maxLife: 12, r: 60, color: '#ffffff' });
          spawnSparks(player.x, guardY, 20, [guardColor, '#ffffff'], Math.PI * 2, 8, 20);
          e.hitstun = Math.max(e.hitstun, 12);
          e.vx += Math.sign(e.x - player.x) * 4.2;
          screenShake += 1.6;
          screenFlash = Math.max(screenFlash, 0.2);
          rumble(0.45, 110, 0.32);
          playSfx('guard');
          break;
        }
        damagePlayer(e.damage || 12, e.x);
        e.attackHit = true;
        break;
      }
    }
  }

  function updateEffects() {
    for (let fx of effects) {
      if (fx.delay && fx.delay > 0) {
        fx.delay--;
        continue;
      }
      fx.life--;
      if (fx.vx || fx.vy) {
        fx.x += fx.vx;
        fx.y += fx.vy;
        fx.vx *= 0.9;
        fx.vy *= 0.9;
        if (fx.gravity) fx.vy += fx.gravity;
      }
      if (fx.grow) fx.r += fx.grow;
    }
    effects = effects.filter(fx => fx.life > 0);
  }

  // ステージデータ（横にすごく長い）
  let platforms = [];
  function initPlatforms() {
    const ch = window.innerHeight;
    const groundY = ch - 70;

      platforms.push({ x, y, w, h, ...extra });

      for (let i = 0; i < segments; i++) {
        const bob = Math.sin(i * 0.8) * 6;
        addPlatform(x + i * segW, y + bob, segW - 8, 26);

    };

    // 地面プロファイル（地形）を構築
    groundProfile = buildGroundProfile(groundY);
    groundInfo = { x: 0, y: groundY, w: STAGE_LENGTH, h: 500, ground: true };

    // Zone A: 序盤の段差と高低差
    addPlatform(520, gY(520, 120), 260);
    addPlatform(980, gY(980, 190), 300);
    addPlatform(1480, gY(1480, 260), 260);
    addPlatform(2100, gY(2100, 180), 320);

    addPlatform(4120, gY(4120, 140), 260);
    addPlatform(4700, gY(4700, 320), 220);
    addPlatform(5050, gY(5050, 380), 200);
    addPlatform(5450, gY(5450, 260), 520);
    addBridge(6100, gY(6100, 260), 620, 7);
    addPlatform(6860, gY(6860, 220), 280);
    addPlatform(7320, gY(7320, 140), 320);

    // Zone C: ジグザグ階段と中段の丘

  function clampGroundY(value, baseY) {
    return Math.min(baseY + 120, Math.max(baseY - 320, value));
  }

  function buildGroundProfile(baseY) {
    const nodes = [];
    let x = 0;
    let y = baseY;
    const push = (nx, ny) => {
      x = nx;
      y = clampGroundY(ny, baseY);
      nodes.push({ x, y });
    };
    const addFlat = (len) => {
      push(x + len, y);
    };
    const addSlope = (len, rise, steps = 6) => {
      const dx = len / steps;
      const dy = rise / steps;
      for (let i = 0; i < steps; i++) {
        push(x + dx, y + dy);
      }
    };
    const addHill = (len, amp, steps = 10) => {
      const base = y;
      const dx = len / steps;
      for (let i = 0; i < steps; i++) {
        const t = (i + 1) / steps;
        const ny = base + Math.sin(t * Math.PI) * amp;
        push(x + dx, ny);
      }
    };
    const addWave = (len, amp, cycles = 2, stepsPer = 8) => {
      const base = y;
      const total = cycles * stepsPer;
      const dx = len / total;
      for (let i = 0; i < total; i++) {
        const phase = ((i + 1) / stepsPer) * Math.PI * 2;
        const ny = base + Math.sin(phase) * amp;
        push(x + dx, ny);
      }
    };
    const addTerrace = (len, stepHeight, steps = 4) => {
      const seg = len / steps;
      for (let i = 0; i < steps; i++) {
        addSlope(seg * 0.4, stepHeight, 2);
        addFlat(seg * 0.6);
      }
    };

    nodes.push({ x, y });
    addFlat(600);
    addSlope(800, -120);
    addFlat(400);
    addHill(900, 90);
    addSlope(700, 120);
    addFlat(500);
    addWave(1400, 70, 2);
    addTerrace(1000, -30, 4);
    addFlat(500);
    addSlope(1100, -180);
    addFlat(400);
    addHill(900, -120);
    addSlope(700, 140);
    addFlat(600);
    addWave(1500, 80, 3);
    addSlope(1000, 180);
    addFlat(600);
    addHill(1000, 120);
    addFlat(700);
    addSlope(1200, -220);
    addFlat(500);
    addSlope(1200, 220);
    addFlat(600);
    addWave(1400, 60, 2);
    addFlat(300);
    addSlope(800, -140);
    addFlat(300);
    addSlope(800, 140);
    addFlat(1600);

    if (x < STAGE_LENGTH) addFlat(STAGE_LENGTH - x);
    if (nodes[nodes.length - 1].x < STAGE_LENGTH) {
      nodes.push({ x: STAGE_LENGTH, y });
    }
    return nodes;
  }

  function groundHeightAt(x) {
    if (!groundProfile.length) return window.innerHeight;
    if (x <= groundProfile[0].x) return groundProfile[0].y;
    const last = groundProfile[groundProfile.length - 1];
    if (x >= last.x) return last.y;
    let lo = 0;
    let hi = groundProfile.length - 1;
    while (hi - lo > 1) {
      const mid = (lo + hi) >> 1;
      if (groundProfile[mid].x <= x) lo = mid;
      else hi = mid;
    }
    const a = groundProfile[lo];
    const b = groundProfile[hi];
    const t = (x - a.x) / (b.x - a.x);
    return a.y + (b.y - a.y) * t;
  }

  function liftPlatformsAboveGround(clearance = 36) {
    for (let p of platforms) {
      if (p.ground) continue;
      let minGround = Infinity;
      const step = Math.max(40, p.w / 6);
      for (let sx = p.x; sx <= p.x + p.w; sx += step) {
        minGround = Math.min(minGround, groundHeightAt(sx));
      }
      minGround = Math.min(minGround, groundHeightAt(p.x + p.w));
      const targetY = minGround - clearance;
      if (p.y > targetY) {
        p.y = targetY;
      }
    }
  }

  function getGroundPointsInRange(startX, endX) {
    const pts = [];
    if (!groundProfile.length) return pts;
    pts.push({ x: startX, y: groundHeightAt(startX) });
    for (let i = 0; i < groundProfile.length; i++) {
      const p = groundProfile[i];
      if (p.x > startX && p.x < endX) pts.push(p);
    }
    pts.push({ x: endX, y: groundHeightAt(endX) });
    return pts;
  }

  function drawTerrain(ctx, camX, cw, ch) {
    const startX = Math.max(0, camX - 120);
    const endX = camX + cw + 120;
    const pts = getGroundPointsInRange(startX, endX);
    if (pts.length < 2) return;

    ctx.save();
    const soilGrad = ctx.createLinearGradient(0, 0, 0, ch + 200);
    soilGrad.addColorStop(0, '#d9a066');
    soilGrad.addColorStop(1, '#b87940');
    ctx.fillStyle = soilGrad;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[pts.length - 1].x, ch + 200);
    ctx.lineTo(pts[0].x, ch + 200);
    ctx.closePath();
    ctx.fill();

    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#7CFC00';
    ctx.lineWidth = 18;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();

    ctx.strokeStyle = '#b7ff6a';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y - 2);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y - 2);
    ctx.stroke();

    ctx.fillStyle = '#63e84b';
    const bladeStep = 22;
    const bladeStart = Math.floor(startX / bladeStep) * bladeStep;
    for (let gx = bladeStart; gx < endX; gx += bladeStep) {
      const gy = groundHeightAt(gx);
      ctx.beginPath();
      ctx.moveTo(gx, gy + 2);
      ctx.lineTo(gx + 6, gy - 10);
      ctx.lineTo(gx + 12, gy + 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function addEnemySpawn(x, y, platform, kind) {
    const spawn = { id: enemySpawns.length, x, y, platform, kind, respawn: 0 };
    enemySpawns.push(spawn);
    enemies.push(new Enemy(x, y, platform, kind, spawn.id));
  }

  function updateEnemyRespawns() {
    if (!enemySpawns.length) return;
    for (let spawn of enemySpawns) {
      if (spawn.respawn > 0) {
        spawn.respawn--;
        if (spawn.respawn === 0) {
          const exists = enemies.some(e => e.spawnId === spawn.id && e.hp > 0);
          if (!exists) {
            const jitter = (Math.random() - 0.5) * 60;
            enemies.push(new Enemy(spawn.x + jitter, spawn.y, spawn.platform, spawn.kind, spawn.id));
          }
        }
      }
    }
  }

  function initEnemies() {
    enemies = [];
    enemySpawns = [];
    const ground = groundInfo;
    if (ground) {
      const spacing = 700;
      const groundCount = Math.max(16, Math.floor(ground.w / spacing));
      for (let i = 0; i < groundCount; i++) {
        const ex = ground.x + 240 + i * spacing + Math.random() * 120;
        const roll = Math.random();
        let kind = 'grunt';
        if (roll < 0.12) kind = 'knight';
        else if (roll < 0.26) kind = 'brute';
        else if (roll < 0.42) kind = 'mage';
        else if (roll < 0.6) kind = 'stalker';
        else if (roll < 0.8) kind = 'scout';
        addEnemySpawn(ex, groundHeightAt(ex), ground, kind);
      }
    }
    const ledges = platforms.filter(p => !p.ground && !p.ramp && p.w >= 200);
    for (let i = 0; i < ledges.length; i++) {
      if (Math.random() < 0.85) {
        const p = ledges[i];
        const ex = p.x + p.w * (0.25 + Math.random() * 0.5);
        const roll = Math.random();
        let kind = roll < 0.25 ? 'stalker' : (roll < 0.5 ? 'scout' : (roll < 0.7 ? 'mage' : 'grunt'));
        addEnemySpawn(ex, p.y, p, kind);
      }
    }
  }

  function updateGimmicks() {
    for (let g of gimmicks) {
      if (g.type === 'spring') {
        if (g.cooldown > 0) g.cooldown--;
        if (g.cooldown > 0) continue;
        const inX = player.x >= g.x && player.x <= g.x + g.w;
        const closeY = Math.abs(player.y - g.y) <= 8;
        if (player.onGround && inX && closeY) {
          player.vy = JUMP_FORCE * (g.power || 1.3);
          player.onGround = false;
          player.jumpCount = Math.min(player.maxJumps, 1);
          player.scaleVelX -= 0.12;
          player.scaleVelY += 0.25;
          g.cooldown = 24;
          spawnShockwave(player.x, g.y, '#d6f7ff');
          spawnSparks(player.x, g.y - 8, 10, ['#ffffff', '#9fe9ff'], Math.PI, 6, 14);
          screenShake += 1.2;
          rumble(0.35, 90, 0.22);
          playSfx('jump');
        }
      } else if (g.type === 'wind') {
        const inX = player.x >= g.x && player.x <= g.x + g.w;
        const topY = g.y - g.h;
        const inY = player.y >= topY && player.y <= g.y + 20;
        if (inX && inY) {
          player.vy -= g.strength || 0.35;
          if (player.vy < -9) player.vy = -9;
          if (Math.random() < 0.25 && consumeFxBudget()) {
            effects.push({

              life: 16,
              maxLife: 16,
              color: 'rgba(200,240,255,0.8)',
              size: 2 + Math.random() * 2

          }
        }
      }
    }
  }

  function drawBackground(ctx, camX, cw, ch) {

      ctx.save();

      ctx.arc(0, 0, 40, 0, Math.PI * 2);

    // 遠景の山

    // 中景の丘

    // 街のシルエット

  function drawPuddingCoin(ctx, x, y, r, spin, options = {}) {
    const shadow = options.shadow !== false;
    const pulse = 0.5 + 0.5 * Math.sin(stageTime * 0.12 + (options.pulsePhase || 0));
    const tilt = Math.cos(spin || 0);
    const scaleX = 0.35 + 0.65 * Math.abs(tilt);
    const shine = 0.55 + 0.45 * Math.max(0, tilt);

    if (shadow) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.78, r * 0.9, r * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scaleX, 1);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const glow = ctx.createRadialGradient(0, -r * 0.2, r * 0.2, 0, 0, r * 1.6);
    glow.addColorStop(0, `rgba(255,245,200,${0.6 * shine})`);
    glow.addColorStop(0.4, `rgba(255,210,130,${0.35 * shine})`);
    glow.addColorStop(1, 'rgba(255,200,120,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 1.6, r * 1.15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    const topW = r * 1.1;
    const botW = r * 2.0;
    const h = r * 1.35;
    const grad = ctx.createLinearGradient(-r, -h, r, h);
    grad.addColorStop(0, '#fff7d6');
    grad.addColorStop(0.35, '#ffd98a');
    grad.addColorStop(0.65, '#d2a258');
    grad.addColorStop(1, '#8b5d20');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-topW / 2, -h * 0.55);
    ctx.lineTo(topW / 2, -h * 0.55);
    ctx.lineTo(botW / 2, h * 0.45);
    ctx.quadraticCurveTo(0, h * 0.7, -botW / 2, h * 0.45);
    ctx.closePath();
    ctx.fill();

    ctx.lineWidth = 2.2;
    ctx.strokeStyle = `rgba(255,255,255,${0.55 + 0.2 * shine})`;
    ctx.stroke();

    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    ctx.strokeStyle = `rgba(255,255,255,${0.22 + 0.18 * pulse})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const yy = -h * 0.25 + i * (h * 0.25);
      ctx.beginPath();
      ctx.moveTo(-topW * 0.45, yy);
      ctx.lineTo(topW * 0.45, yy);
      ctx.stroke();
    }
    ctx.restore();

    const iconW = r * 1.1;
    const iconH = r * 0.9;
    const iconTop = iconW * 0.5;
    const iconBot = iconW * 0.95;
    const drawIcon = (dx, dy, fill, mode = 'source-over') => {
      ctx.save();
      ctx.translate(dx, dy);
      ctx.globalCompositeOperation = mode;
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.moveTo(-iconTop / 2, -iconH * 0.45);
      ctx.lineTo(iconTop / 2, -iconH * 0.45);
      ctx.lineTo(iconBot / 2, iconH * 0.4);
      ctx.quadraticCurveTo(0, iconH * 0.62, -iconBot / 2, iconH * 0.4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    };
    drawIcon(1.2, 1.2, 'rgba(90,60,20,0.35)', 'multiply');
    drawIcon(-1.2, -1.2, `rgba(255,255,255,${0.5 * shine})`, 'screen');

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.strokeStyle = `rgba(255,255,255,${0.5 + 0.2 * pulse})`;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(-r * 0.4, -h * 0.5);
    ctx.lineTo(r * 0.1, h * 0.5);
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawEffects(ctx) {
    // 魔法・投射体
    for (let atk of attacks) {
      if (atk.type !== 'projectile') continue;
      const t = atk.maxFrames ? atk.frames / atk.maxFrames : 1;
      const ang = Math.atan2(atk.vy, atk.vx);
      ctx.save();
      ctx.translate(atk.x, atk.y);
      ctx.rotate(ang);
      ctx.globalCompositeOperation = 'lighter';
      if (atk.visual === 'fire') {
        const main = atk.color || '#ffb067';
        const accent = atk.accent || '#ffd36b';
        const coreR = Math.max(10, atk.r * 0.28);

        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.lineTo(18, 0);
        ctx.moveTo(0, -18);
        ctx.lineTo(0, 18);
        ctx.stroke();
        ctx.globalAlpha = t * 0.8;
        ctx.strokeStyle = healColor;
        ctx.lineWidth = 2;
        for (let i = 0; i < 6; i++) {
          const ang = spin + (Math.PI * 2 * i) / 6;
          const r0 = r * 0.4;
          const r1 = r * 0.9;
          ctx.beginPath();
          ctx.moveTo(Math.cos(ang) * r0, Math.sin(ang) * r0);
          ctx.lineTo(Math.cos(ang) * r1, Math.sin(ang) * r1);
          ctx.stroke();
        }
        ctx.restore();
      } else if (fx.type === 'hit') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const hitColor = fx.color || '#ff7aa0';
        ctx.fillStyle = colorWithAlpha(hitColor, t);
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, fx.r * (1 - t * 0.4), 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = colorWithAlpha('#ffffff', t);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(fx.x - 10, fx.y - 10);
        ctx.lineTo(fx.x + 10, fx.y + 10);
        ctx.moveTo(fx.x + 10, fx.y - 10);
        ctx.lineTo(fx.x - 10, fx.y + 10);
        ctx.stroke();
        ctx.restore();
      } else if (fx.type === 'burst') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = `rgba(255, 120, 200, ${t})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, fx.r * (0.75 + (1 - t) * 0.5), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else if (fx.type === 'spark') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t;
        ctx.fillStyle = fx.color || `rgba(255,255,255,1)`;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, fx.size * (0.6 + (1 - t) * 0.5), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (fx.type === 'ring') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t;
        const expand = fx.expand !== undefined ? fx.expand : 50;
        const radius = fx.r + (1 - t) * expand;
        const ringColor = fx.color || '#ffffff';
        if (fx.glow) {
          ctx.shadowColor = colorWithAlpha(ringColor, 0.7 * t);
          ctx.shadowBlur = 14;
        }
        ctx.strokeStyle = colorWithAlpha(ringColor, t);
        ctx.lineWidth = fx.width || 3;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else if (fx.type === 'guardPulse') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const prog = 1 - t;
        const r = fx.r * (0.65 + prog * 0.7);
        const pulseColor = fx.color || '#7ee5ff';
        const glow = ctx.createRadialGradient(fx.x, fx.y, r * 0.1, fx.x, fx.y, r);
        glow.addColorStop(0, colorWithAlpha(pulseColor, 0.75 * t));
        glow.addColorStop(0.5, colorWithAlpha(pulseColor, 0.35 * t));
        glow.addColorStop(1, colorWithAlpha(pulseColor, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = colorWithAlpha('#ffffff', 0.8 * t);
        ctx.lineWidth = 3 + prog * 2;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, r * 0.85, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else if (fx.type === 'impact') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t;
        const impactColor = fx.color || '#ffffff';
        ctx.strokeStyle = colorWithAlpha(impactColor, t);
        ctx.lineWidth = 3;
        for (let i = 0; i < 8; i++) {
          const ang = (Math.PI * 2 * i) / 8;
          const r0 = fx.r * 0.3;
          const r1 = fx.r * (0.9 + (1 - t) * 0.4);
          ctx.beginPath();
          ctx.moveTo(fx.x + Math.cos(ang) * r0, fx.y + Math.sin(ang) * r0);
          ctx.lineTo(fx.x + Math.cos(ang) * r1, fx.y + Math.sin(ang) * r1);
          ctx.stroke();
        }
        ctx.restore();
      } else if (fx.type === 'pillar') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t;
        const h = fx.height || 140;
        const w = 28 + (1 - t) * 10;
        const grad = ctx.createLinearGradient(fx.x, fx.y - h, fx.x, fx.y);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.3, fx.color || 'rgba(140,255,180,0.8)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(fx.x - w / 2, fx.y - h, w, h);
        ctx.strokeStyle = `rgba(255,255,255,${0.4 * t})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(fx.x, fx.y - h);
        ctx.lineTo(fx.x, fx.y);
        ctx.stroke();
        ctx.restore();
      } else if (fx.type === 'dash') {
        ctx.save();
        ctx.translate(fx.x, fx.y);
        ctx.rotate(fx.angle || 0);
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t;
        const len = fx.len || 140;
        const dashColor = fx.color || '#7de3ff';
        const dashAccent = fx.accent || '#ffffff';
        ctx.strokeStyle = colorWithAlpha(dashColor, 0.9 * t);
        ctx.lineWidth = 4;
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.moveTo(-len * (0.4 + (1 - t) * 0.2), i * 6);
          ctx.lineTo(len * (0.6 + (1 - t) * 0.2), i * 2);
          ctx.stroke();
        }
        ctx.strokeStyle = colorWithAlpha(dashAccent, 0.7 * t);
        ctx.lineWidth = 2;
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath();
          ctx.moveTo(-len * 0.35, i * 4);
          ctx.lineTo(len * 0.55, i * 1.4);
          ctx.stroke();
        }
        ctx.restore();
      } else if (fx.type === 'afterimage') {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = t * 0.8;
        ctx.fillStyle = fx.color || '#b9f1ff';
        ctx.beginPath();
        ctx.ellipse(fx.x, fx.y - 40, 40 * (fx.scale || 1), 24 * (fx.scale || 1), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function drawCoinCounter(ctx, cw, ch) {
    const panelW = 140;
    const panelH = 40;
    const x = 20;
    const y = 20;
    const pulse = coinPulse;

    ctx.save();
    drawRoundedRect(ctx, x, y, panelW, panelH, 10);
    const glassGrad = ctx.createLinearGradient(x, y, x, y + panelH);
    glassGrad.addColorStop(0, `rgba(255,255,255,${0.18 + 0.15 * pulse})`);
    glassGrad.addColorStop(1, 'rgba(255,255,255,0.06)');
    ctx.fillStyle = glassGrad;
    ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${0.35 + 0.2 * pulse})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    drawPuddingCoin(ctx, x + 24, y + panelH / 2 + 1, 16, stageTime * 0.08, { shadow: false, pulsePhase: 1.2 });
    ctx.font = '600 16px Orbitron, sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000000';
    ctx.fillText(`x${coinCount}`, x + 58, y + panelH / 2 + 1);
    ctx.restore();
  }

  function drawCommandDeck(ctx, cw, ch) {
    const slotW = 150;
    const slotH = COMMAND_SLOT_H;
    const slotGap = COMMAND_SLOT_GAP;
    const paddingX = 12;
    const paddingY = 12;
    const listH = slotH * 3 + slotGap * 2;
    const panelW = slotW + paddingX * 2;
    const panelH = listH + paddingY * 2;
    const deckX = 20;
    const deckY = ch - panelH - 20;
    const deckLen = commandDeck.length;
    const progress = commandRotateFrames > 0 ? (COMMAND_ROTATE_FRAMES - commandRotateFrames) / COMMAND_ROTATE_FRAMES : 0;
    const ease = progress * progress * (3 - 2 * progress);
    const offsetY = ease * (slotH + slotGap) * (commandRotateFrames > 0 ? commandRotateDir : 0);
    const pulse = 0.5 + 0.5 * Math.sin(stageTime * 0.08);

    function drawRoundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    ctx.save();
    ctx.textBaseline = 'middle';
    ctx.font = '12px Orbitron, sans-serif';

    // グラス風コンパクトパネル
    drawRoundedRect(deckX, deckY, panelW, panelH, 10);
    const glassGrad = ctx.createLinearGradient(deckX, deckY, deckX, deckY + panelH);
    glassGrad.addColorStop(0, 'rgba(255,255,255,0.16)');
    glassGrad.addColorStop(1, 'rgba(255,255,255,0.04)');
    ctx.fillStyle = glassGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(180, 230, 255, 0.45)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.moveTo(deckX + 8, deckY + 8);
    ctx.lineTo(deckX + panelW - 8, deckY + 8);
    ctx.stroke();

    const listX = deckX + paddingX;
    const listY = deckY + paddingY;
    const listW = slotW;
    const listCenterY = listY + listH / 2 - slotH / 2;

    ctx.save();
    ctx.beginPath();
    ctx.rect(listX, listY, listW, listH);
    ctx.clip();

    for (let i = -1; i <= 1; i++) {
      if (deckLen <= 0) continue;
      const idx = (COMMAND_ACTIVE_INDEX + i + deckLen) % deckLen;
      const cmd = commandDeck[idx];
      const slide = offsetY / (slotH + slotGap);
      const depth = Math.abs(i - slide);
      const scale = 1 - Math.min(0.22, depth * 0.12);
      const y = listCenterY + i * (slotH + slotGap) - offsetY;
      const isSelected = i === 0;
      const w = (isSelected ? slotW + 12 : slotW) * scale;
      const h = (isSelected ? slotH + 6 : slotH) * scale;
      const x = listX + (slotW - w) / 2 + (isSelected ? -2 : 0);

      if (y < deckY - slotH * 2 || y > ch + slotH) continue;

      const glowAlpha = isSelected ? 0.18 + pulse * 0.25 : 0.05;
      ctx.globalAlpha = 0.85 - depth * 0.25;
      ctx.fillStyle = `rgba(100, 210, 255, ${glowAlpha})`;
      ctx.fillRect(x - 4, y - 4, w + 8, h + 8);

      const grad = ctx.createLinearGradient(x, y, x + w, y);
      grad.addColorStop(0, cmd.color);
      grad.addColorStop(1, '#111');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, h);

      if (cmd.timer > 0) {
        const coolRatio = cmd.timer / cmd.cooldown;
        ctx.fillStyle = `rgba(0,0,0,${0.4 + coolRatio * 0.4})`;
        ctx.fillRect(x, y, w, h);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x, y + h - 4, w * (1 - coolRatio), 4);
      }

      ctx.strokeStyle = isSelected ? '#ffffff' : 'rgba(255,255,255,0.35)';
      ctx.lineWidth = isSelected ? 2 : 1;
      ctx.strokeRect(x, y, w, h);

      // アイコン
      ctx.save();
      ctx.translate(x + 14, y + h / 2);
      ctx.fillStyle = '#ffffff';
      if (cmd.type === 'heal') {
        ctx.fillRect(-4, -10, 8, 20);
        ctx.fillRect(-10, -4, 20, 8);
      } else {
        ctx.beginPath();
        ctx.moveTo(-5, -9);
        ctx.lineTo(7, 0);
        ctx.lineTo(-5, 9);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      ctx.fillStyle = '#ffffff';
      ctx.font = isSelected ? '13px Orbitron, sans-serif' : '11px Orbitron, sans-serif';
      ctx.fillText(cmd.name, x + 30, y + h / 2);
    }

    ctx.restore();
    ctx.restore();
  }

  function drawHPGauge(ctx, cw, ch) {
    const barW = 240;
    const barH = 18;
    let x = cw - barW - 24;
    let y = ch - barH - 24;
    const hpRatio = Math.max(0, player.hpDisplay / player.maxHp);
    const lagRatio = Math.max(0, player.hpLag / player.maxHp);

    let shakeX = 0;
    let shakeY = 0;
    if (hpUiShake > 0) {
      const t = hpUiShake / HP_SHAKE_FRAMES;
      const amp = 4 + 6 * t;
      shakeX = Math.sin(stageTime * 0.6) * amp;
    }
    x += shakeX;
    y += shakeY;

    ctx.save();
    if (hpUiPulse > 0) {
      ctx.globalAlpha = Math.min(0.7, hpUiPulse);
      ctx.shadowColor = 'rgba(16, 168, 110, 0.6)';
      ctx.shadowBlur = 18;
      ctx.fillStyle = 'rgba(16, 168, 110, 0.18)';
      drawRoundedRect(ctx, x - 2, y - 2, barW + 4, barH + 4, 5);
      ctx.fill();
    }
    ctx.restore();

    drawKhHpBar(ctx, x, y, barW, barH, hpRatio, lagRatio, {
      radius: 4,
      pad: 2,
      ticks: false,
      segments: 12,
      sheen: false
    });
  }

  function drawCombo(ctx, cw, ch) {
    if (comboCount <= 1 || comboTimer <= 0) return;
    const alpha = Math.min(1, comboTimer / COMBO_WINDOW);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.font = '28px Orbitron, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.fillText(`COMBO x${comboCount}`, cw / 2, 70);
    ctx.font = '14px Orbitron, sans-serif';
    if (comboCount >= 3) {
      ctx.fillStyle = 'rgba(255, 220, 120, 0.95)';
      ctx.fillText('FINISHER READY', cw / 2, 92);
    } else {
      ctx.fillStyle = 'rgba(160, 220, 255, 0.9)';
      ctx.fillText('KEEP THE RHYTHM', cw / 2, 92);
    }
    ctx.restore();
    ctx.textAlign = 'left';
  }

  function drawLockOnMarker(ctx, target, strong) {
    if (!target || target.hp <= 0) return;
    const x = target.x;
    const y = target.y - target.height * 0.7;
    const pulse = Math.sin(stageTime * 0.12) * 2;
    const r = (strong ? 42 : 30) + pulse;
    const alpha = strong ? 0.9 : 0.45;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = strong ? `rgba(120,220,255,${alpha})` : `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = strong ? 2.4 : 1.4;

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y - r * 0.42);
    ctx.lineTo(x + r * 0.42, y);
    ctx.lineTo(x, y + r * 0.42);
    ctx.lineTo(x - r * 0.42, y);
    ctx.closePath();
    ctx.stroke();

    const bracketR = r + 6;
    const bracketLen = strong ? 12 : 8;
    const spin = stageTime * 0.03;
    for (let i = 0; i < 4; i++) {
      const ang = spin + i * (Math.PI / 2);
      const bx = Math.cos(ang) * bracketR;
      const by = Math.sin(ang) * bracketR;
      const tx = Math.cos(ang) * (bracketR + bracketLen);
      const ty = Math.sin(ang) * (bracketR + bracketLen);
      ctx.beginPath();
      ctx.moveTo(x + bx, y + by);
      ctx.lineTo(x + tx, y + ty);
      ctx.stroke();
    }

    if (strong) {
      ctx.strokeStyle = `rgba(120,220,255,${0.35 + 0.2 * Math.sin(stageTime * 0.1)})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(player.x, player.y - player.height * 0.6);
      ctx.lineTo(x, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawLockOn(ctx) {
    if (lockOnActive && lockOnTarget) {
      drawLockOnMarker(ctx, lockOnTarget, true);
    } else if (softLockTarget) {
      drawLockOnMarker(ctx, softLockTarget, false);
    }
  }

  function drawTargetHP(ctx, cw, ch) {
    const target = lockOnActive && lockOnTarget ? lockOnTarget : softLockTarget;
    if (!target || target.hp <= 0) return;
    const strong = lockOnActive && lockOnTarget;
    const barW = 240;
    const barH = 16;
    const x = cw - barW - 24;
    const y = 20;
    const hpRatio = Math.max(0, target.hpDisplay / target.maxHp);
    const lagRatio = Math.max(0, target.hpLag / target.maxHp);

    drawKhHpBar(ctx, x, y, barW, barH, hpRatio, lagRatio, {
      radius: 4,
      pad: 2,
      ticks: false,
      segments: 12,
      sheen: false,
      alpha: strong ? 1 : 0.7
    });
  }

  function drawGameOver(ctx, cw, ch) {
    const t = Math.min(1, gameOverTimer / 90);
    const pulse = 0.5 + 0.5 * Math.sin(gameOverTimer * 0.05);
    const cx = cw / 2;
    const cy = ch / 2;
    ctx.save();
    ctx.fillStyle = `rgba(4,6,12,${0.6 + t * 0.28})`;
    ctx.fillRect(0, 0, cw, ch);

    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(cw, ch) * 0.65);
    glow.addColorStop(0, `rgba(80,140,255,${0.2 + 0.2 * pulse})`);
    glow.addColorStop(0.45, 'rgba(20,30,50,0)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, cw, ch);

    for (let i = 0; i < 4; i++) {
      const x = cx + (i - 1.5) * 120 + Math.sin(gameOverTimer * 0.02 + i) * 30;
      const beam = ctx.createLinearGradient(x, cy - 220, x, cy + 220);
      beam.addColorStop(0, 'rgba(120,180,255,0)');
      beam.addColorStop(0.5, `rgba(120,180,255,${0.18 + 0.12 * pulse})`);
      beam.addColorStop(1, 'rgba(120,180,255,0)');
      ctx.fillStyle = beam;
      ctx.fillRect(x - 18, cy - 220, 36, 440);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#e9f4ff';
    ctx.shadowColor = 'rgba(120,180,255,0.85)';
    ctx.shadowBlur = 26;
    ctx.font = '700 56px Orbitron, sans-serif';
    ctx.fillText('GAME OVER', cx, cy - 20);
    ctx.shadowBlur = 0;
    ctx.font = '16px Orbitron, sans-serif';
    ctx.fillStyle = `rgba(210,235,255,${0.75 + 0.2 * pulse})`;
    ctx.fillText('Rキーで再開', cx, cy + 22);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  function drawDeathOverlay(ctx, cw, ch) {
    if (!deathSequence || gameOver) return;
    const t = Math.min(1, deathTimer / 90);
    const pulse = 0.5 + 0.5 * Math.sin(deathTimer * 0.18);
    const px = player.x - cameraX;
    const py = player.y - player.height * 0.6;
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'screen';
    ctx.filter = `blur(${6 + 6 * t}px)`;
    const glow = ctx.createRadialGradient(px, py, 20, px, py, Math.max(cw, ch) * (0.35 + 0.2 * t));
    glow.addColorStop(0, `rgba(255,255,255,${0.45 + 0.25 * t})`);
    glow.addColorStop(0.4, `rgba(140,210,255,${0.35 * t})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, cw, ch);
    ctx.filter = 'none';

    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = `rgba(160,220,255,${0.25 + 0.3 * pulse})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      const ang = (Math.PI * 2 * i) / 4 + deathTimer * 0.02;
      const r0 = 60;
      const r1 = 220 + 80 * t;
      ctx.beginPath();
      ctx.moveTo(px + Math.cos(ang) * r0, py + Math.sin(ang) * r0);
      ctx.lineTo(px + Math.cos(ang) * r1, py + Math.sin(ang) * r1);
      ctx.stroke();
    }
    ctx.restore();
  }

  function applyPostEffects() {
    if (BLOOM_ENABLED) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.filter = `blur(${BLOOM_SOFT_BLUR}px)`;
      ctx.globalAlpha = BLOOM_SOFT_ALPHA;
      ctx.drawImage(canvas, 0, 0);

      ctx.filter = `blur(${BLOOM_CORE_BLUR}px)`;
      ctx.globalAlpha = BLOOM_CORE_ALPHA;
      ctx.drawImage(canvas, 0, 0);
      ctx.restore();
    }
  }

  function drawUI(ctx, cw, ch) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    drawCoinCounter(ctx, cw, ch);
    drawCommandDeck(ctx, cw, ch);
    drawHPGauge(ctx, cw, ch);
    drawCombo(ctx, cw, ch);
    drawTargetHP(ctx, cw, ch);
    if (gameOver) {
      drawGameOver(ctx, cw, ch);
    }
    ctx.restore();
  }

  function loop() {
    stageTime++;
    const cw = canvas.width;
    const ch = canvas.height;
    const frozen = hitStop > 0;
    fxBudget = FX_FRAME_BUDGET;
    if (hitStop > 0) hitStop--;
    pollGamepad();
    updateBgmFade();
    if (gameOver) gameOverTimer++;
    let simStep = true;
    if (deathSequence && !gameOver) {
      deathTimer++;
      const slowStep = deathTimer < 20 ? 1 : (deathTimer < 60 ? 2 : 3);
      simStep = stageTime % slowStep === 0;
      if (deathTimer > 90) {
        gameOver = true;
        gameOverTimer = 0;
        deathSequence = false;
      }
    }

    if (restartQueued) {
      if (gameOver) resetGame();
      restartQueued = false;
    }
    if (rumbleToggleQueued) {
      toggleRumbleTest();
      rumbleToggleQueued = false;
    }
    if (rumbleStrengthQueued) {
      bumpRumbleStrength();
      rumbleStrengthQueued = false;
      rumbleTestClock = 0;
    }
    if (rumblePatternQueued) {
      cycleRumblePattern();
      rumblePatternQueued = false;
    }

    if (!gameOver && !frozen && simStep) {
      if (lockQueued && !player.counterActive) toggleLockOn();
      updateLockTargets();
      player.update(platforms);
      if (!deathSequence) updateGimmicks();
      if (!deathSequence) updateCounterAttack();
      if (lockOnActive && lockOnTarget && !player.counterActive) {
        player.facing = lockOnTarget.x >= player.x ? 1 : -1;
      }
      if (!deathSequence && !player.counterActive) {
        if (basicQueued) tryBasicAttack();
        if (actionQueued) tryUseCommand();
        if (rotateQueued !== 0 && commandRotateFrames <= 0) {
          const dir = rotateQueued > 0 ? 1 : -1;
          triggerDeckRotate(dir);
          rotateQueued += dir > 0 ? -1 : 1;
        }
        if (dodgeQueued) {
          const inputLeft = keys.Left || gpKeys.Left;
          const inputRight = keys.Right || gpKeys.Right;
          if (!inputLeft && !inputRight && player.onGround) {
            tryGuard();
          } else {
            const dir = inputLeft ? -1 : (inputRight ? 1 : player.facing);
            tryDodge(dir);
          }
        }
        if (basicChainQueued && player.attackTimer <= 3 && basicComboTimer > 0 && basicComboStep > 0 && basicComboStep < BASIC_COMBO_MAX && basicComboCooldown <= 0) {
          basicChainQueued = false;
          spawnBasicAttack();
        }
      }
    }
    actionQueued = false;
    // rotateQueued is a queue; do not clear here.
    dodgeQueued = false;
    lockQueued = false;
    basicQueued = false;

    if (!frozen && simStep) updateCommandDeck();
    if (!gameOver && !frozen && simStep) {
      updateEnemies();
      updateLockTargets();
      updateAttacks();
      updateCoins();
      checkEnemyContact();
    }
    if (!frozen && simStep) updateEffects();
    if (!frozen && simStep) {
      updateHpDisplay(player, 0.26, 0.06, 12);
      for (let e of enemies) updateHpDisplay(e, 0.22, 0.05, 10);
      hpUiPulse = Math.max(0, hpUiPulse - 0.03);
      coinPulse = Math.max(0, coinPulse - 0.04);
      if (hpUiShake > 0) hpUiShake--;
    }
    if (player.invuln > 0 && !frozen && simStep) player.invuln--;
    if (!frozen && simStep) {
      if (comboTimer > 0) comboTimer--;
      else comboCount = 0;
      if (slashComboTimer > 0) slashComboTimer--;
      else slashComboStep = 0;
      if (basicComboTimer > 0) basicComboTimer--;
      else basicComboStep = 0;
      if (basicComboCooldown > 0) basicComboCooldown--;
      if (playerOffenseTimer > 0) playerOffenseTimer--;
      if (player.guardSuccessTimer > 0) player.guardSuccessTimer--;
    }

    updateRumbleTest();

    // カメラの滑らかな追従（プレイヤーを画面中央付近に捉えるように）
    // プレイヤーが画面の中心より右にいる時だけスクロールさせる（左端にいるときは固定）
    let targetCamX = player.x - cw / 2.5;
    if (lockOnActive && lockOnTarget) {
      const midX = (player.x + lockOnTarget.x) * 0.5;
      targetCamX = midX - cw / 2.5;
    }
    if (targetCamX < 0) targetCamX = 0; // 左端の制限

    cameraX += (targetCamX - cameraX) * 0.1;

    let shakeX = 0;
    let shakeY = 0;
    if (screenShake > 0) {
      shakeX = (Math.random() - 0.5) * screenShake;
      shakeY = (Math.random() - 0.5) * screenShake * 0.4;
      screenShake *= 0.88;
    }

    // 背景のパララックス描画
    drawBackground(ctx, cameraX, cw, ch);

    // --- カメラ位置を適用して地形やキャラクターを描画 ---
    ctx.save();
    ctx.translate(-cameraX + shakeX, shakeY);

    // 地形（地面）の描画
    drawTerrain(ctx, cameraX, cw, ch);

    // ギミックの描画
    drawGimmicks(ctx, cameraX, cw);

    // 足場の描画
    platforms.forEach(p => {
      if (p.ground) return;
      // 画面内に見えている足場だけを描画する最適化
      if (p.x + p.w < cameraX || p.x > cameraX + cw) return;

      const visStart = Math.max(p.x, cameraX - 80);
      const visEnd = Math.min(p.x + p.w, cameraX + cw + 80);

      // 段差足場（石造り）
      const platGrad = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
      platGrad.addColorStop(0, '#f6e6cc');
      platGrad.addColorStop(1, '#c9b08f');
      ctx.fillStyle = platGrad;
      ctx.fillRect(p.x, p.y, p.w, p.h);

      ctx.fillStyle = 'rgba(120, 90, 60, 0.35)';
      ctx.fillRect(p.x, p.y + p.h - 8, p.w, 8);

      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      for (let px = Math.floor(visStart / 40) * 40; px < visEnd; px += 40) {
        ctx.beginPath();
        ctx.moveTo(px, p.y + 6);
        ctx.lineTo(px + 20, p.y + p.h - 6);
        ctx.stroke();
      }
    });

    // コイン
    drawCoins(ctx, cameraX, cw);

    // 敵
    for (let e of enemies) {
      if (e.x + e.width < cameraX || e.x - e.width > cameraX + cw) continue;
      e.draw(ctx);
    }

    // ロックオン表示
    drawLockOn(ctx);

    // プレイヤー
    player.draw(ctx);

    // エフェクト（前面）
    drawEffects(ctx);

    ctx.restore();

    drawDeathOverlay(ctx, cw, ch);
    applyPostEffects();
    drawUI(ctx, cw, ch);

    if (screenFlash > 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
      ctx.fillRect(0, 0, cw, ch);
      ctx.restore();
      screenFlash = Math.max(0, screenFlash - 0.08);
    }

    requestAnimationFrame(loop);
  }

  loop();
</script>

</body>
